// 统计
const totalMcap = companies.reduce((s, c) => s + c.mcap, 0);
const totalRev = companies.reduce((s, c) => s + c.rev, 0);
const totalNetInc = companies.reduce((s, c) => s + c.netincome, 0);
const peValues = companies.filter(c => c.pe !== null).map(c => c.pe);
const medianPe = peValues.sort((a, b) => a - b)[Math.floor(peValues.length / 2)];

document.getElementById('stats').innerHTML = `
  <div class="stat"><div class="v">${companies.length}</div><div class="l">公司数</div></div>

`;

// 行业 filter
const sectors = [...new Set(companies.map(c => c.sector).filter(s => s))].sort();
const sectorSelect = document.getElementById('sector-filter');
sectors.forEach(s => {
  const opt = document.createElement('option');
  opt.value = s; opt.textContent = s;
  sectorSelect.appendChild(opt);
});

let currentTab = 'all';
let searchTerm = '';
let sectorFilter = '';
let esgFilter = '';
let expanded = new Set();

function getFiltered() {
  let filtered = [...companies];
  if (searchTerm) {
    const s = searchTerm.toLowerCase();
    filtered = filtered.filter(c => c.ticker.toLowerCase().includes(s) || c.name.toLowerCase().includes(s) || (c.sector && c.sector.toLowerCase().includes(s)));
  }
  if (sectorFilter) filtered = filtered.filter(c => c.sector === sectorFilter);
  if (esgFilter) {
    const order = ['CCC', 'B', 'BB', 'BBB', 'A', 'AA', 'AAA'];
    const minIdx = order.indexOf(esgFilter);
    filtered = filtered.filter(c => order.indexOf(c.esg) >= minIdx);
  }
  return filtered;
}

// 比较两个数值的增减方向（字符串格式如 "$416,161,000"）
function getDeltaClass(curr, prev) {
  if (!curr || !prev || curr === '-' || prev === '-') return '';
  const c = parseFloat(curr.replace(/[$,()%]/g, ''));
  const p = parseFloat(prev.replace(/[$,()%]/g, ''));
  if (isNaN(c) || isNaN(p)) return '';
  if (c > p) return 'metric-up';
  if (c < p) return 'metric-down';
  return '';
}

function renderFinancials(ticker) {
  const s = summaries[ticker];
  if (!s) return '<div class="no-data">该公司财务数据未抓取到 (Nasdaq 公开 API 无数据或公司不在 NQ-100)</div>';

  const periods = s.periods;
  const periodHeader = '<th></th>' + periods.map(p => '<th>' + p + '</th>').join('');

  function buildTable(title, rows) {
    let html = '<div class="fin-card"><h4>' + title + '</h4><table>';
    html += '<thead><tr>' + periodHeader + '</tr></thead><tbody>';
    for (const [name, vals] of Object.entries(rows)) {
      const cls = getDeltaClass(vals[0], vals[1]);
      html += '<tr><td class="fin-row-name">' + name + '</td>';
      vals.forEach((v, i) => {
        const c = i === 0 ? cls : (i >= 1 ? getDeltaClass(vals[i-1], v) : '');
        html += '<td class="num ' + c + '">' + (v || '-') + '</td>';
      });
      html += '</tr>';
    }
    html += '</tbody></table></div>';
    return html;
  }

  let html = '<div class="fin-grid">';
  html += buildTable('💰 Income Statement (利润表) · 4 财年', s.income);
  html += buildTable('🏛️ Balance Sheet (资产负债表) · 4 财年', s.balance);
  html += buildTable('💵 Cash Flow (现金流量表) · 4 财年', s.cashflow);
  html += buildTable('📊 Financial Ratios (财务比率) · 4 财年', s.ratios);
  html += '</div>';
  return html;
}

function renderTable(data) {
  if (!data.length) return '<p style="color: var(--text-muted); padding: 2rem; text-align: center;">无数据</p>';
  let html = '<div class="section"><table><thead><tr>';
  html += '<th></th><th>Ticker</th><th>名称</th><th>行业</th>';
  html += '<th class="sortable num" data-sort="price">价格</th>';
  html += '<th class="sortable num" data-sort="mcap">市值($B)</th>';
  html += '<th class="sortable num" data-sort="rev">营收($B)</th>';
  html += '<th class="sortable num" data-sort="netincome">净利($B)</th>';
  html += '<th class="sortable num" data-sort="pe">PE</th>';
  html += '<th class="sortable num" data-sort="growth">增速</th>';
  html += '<th class="sortable num" data-sort="margin">净利率</th>';
  html += '<th>ESG</th><th class="sortable num" data-sort="52w_high">52w 高</th>';
  html += '<th class="sortable num" data-sort="52w_low">52w 低</th>';
  html += '</tr></thead><tbody>';
  data.forEach(c => {
    const isExp = expanded.has(c.ticker);
    html += '<tr class="expandable" data-ticker="' + c.ticker + '">';
    html += '<td><span class="expand-icon">' + (isExp ? '▼' : '▶') + '</span></td>';
    html += '<td><strong>' + c.ticker + '</strong></td>';
    html += '<td>' + (c.name || '').substring(0, 30) + '</td>';
    html += '<td><span class="sector-tag" style="background:' + (sectorColors[c.sector] || '#666') + '">' + (c.sector || '?') + '</span></td>';
    html += '<td class="num">$' + (c.price || 0).toFixed(2) + '</td>';
    html += '<td class="num">' + (c.mcap || 0).toFixed(0) + '</td>';
    html += '<td class="num">' + (c.rev || 0).toFixed(1) + '</td>';
    html += '<td class="num">' + (c.netincome || 0).toFixed(1) + '</td>';
    html += '<td class="num">' + (c.pe !== null ? c.pe.toFixed(1) : '-') + '</td>';
    const gc = (c.growth || 0) > 0.2 ? '#00e472' : (c.growth || 0) < 0 ? '#ef4444' : 'inherit';
    html += '<td class="num" style="color:' + gc + '">' + (c.growth ? (c.growth * 100).toFixed(1) + '%' : '-') + '</td>';
    html += '<td class="num">' + (c.margin ? (c.margin * 100).toFixed(1) + '%' : '-') + '</td>';
    html += '<td><span class="badge" style="background:' + (esgColors[c.esg] || '#666') + '">' + c.esg + '</span></td>';
    html += '<td class="num">$' + (c['52w_high'] || 0).toFixed(0) + '</td>';
    html += '<td class="num">$' + (c['52w_low'] || 0).toFixed(0) + '</td>';
    html += '</tr>';
    if (isExp) {
      html += '<tr class="expanded-row"><td colspan="14">';
      html += '<div style="margin-bottom: 0.5rem; font-size: 0.9rem; color: var(--accent);">📋 <b>' + c.ticker + '</b> · ' + (c.name || '') + ' · ' + (c.sector || '') + '</div>';
      html += renderFinancials(c.ticker);
      html += '</td></tr>';
    }
  });
  html += '</tbody></table></div>';
  return html;
}

function render() {
  const data = getFiltered();
  let display = data;
  if (currentTab === 'mcap') display = data.sort((a, b) => b.mcap - a.mcap).slice(0, 20);
  else if (currentTab === 'growth') display = data.sort((a, b) => b.growth - a.growth).slice(0, 20);
  else if (currentTab === 'value') display = data.filter(c => c.pe !== null).sort((a, b) => a.pe - b.pe).slice(0, 20);
  else if (currentTab === 'esg') display = data.filter(c => c.esg === 'AAA' || c.esg === 'AA');
  const html = currentTab === 'strategies' ? renderStrategies() : renderTable(display);
  document.getElementById('tab-content').innerHTML = html;

  // 绑定行点击
  document.querySelectorAll('tr.expandable').forEach(tr => {
    tr.addEventListener('click', () => {
      const t = tr.dataset.ticker;
      if (expanded.has(t)) expanded.delete(t);
      else expanded.add(t);
      render();
    });
  });
  // 表头排序
  document.querySelectorAll('th.sortable').forEach(th => {
    th.addEventListener('click', e => {
      e.stopPropagation();
      const key = th.dataset.sort;
      const asc = !th.classList.contains('sorted-asc');
      document.querySelectorAll('th.sortable').forEach(h => h.className = 'sortable');
      th.className = asc ? 'sortable sorted-asc' : 'sortable sorted-desc';
      const data = getFiltered();
      data.sort((a, b) => {
        const av = a[key], bv = b[key];
        if (av == null) return 1;
        if (bv == null) return -1;
        return asc ? av - bv : bv - av;
      });
      document.getElementById('tab-content').innerHTML = renderTable(data);
    });
  });
}

document.getElementById('search').addEventListener('input', e => { searchTerm = e.target.value; render(); });
document.getElementById('sector-filter').addEventListener('change', e => { sectorFilter = e.target.value; render(); });
document.getElementById('esg-filter').addEventListener('change', e => { esgFilter = e.target.value; render(); });
document.querySelectorAll('.tabs .btn[data-tab]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tabs .btn[data-tab]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentTab = btn.dataset.tab;
    render();
  });
});

function resetFilters() {
  document.getElementById('search').value = '';
  document.getElementById('sector-filter').value = '';
  document.getElementById('esg-filter').value = '';
  searchTerm = ''; sectorFilter = ''; esgFilter = '';
  expanded.clear();
  render();
}

function expandAll() {
  const data = getFiltered();
  data.forEach(c => expanded.add(c.ticker));
  render();
}

function collapseAll() {
  expanded.clear();
  render();
}

render();
</script>
