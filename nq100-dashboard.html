const sectors = [...new Set(companies.map(c => c.sector).filter(s => s))].sort();

});

let currentTab = 'all';
let searchTerm = '';
let sectorFilter = '';
let esgFilter = '';

function getFiltered() {
  let filtered = [...companies];
  if (searchTerm) {
    const s = searchTerm.toLowerCase();
    filtered = filtered.filter(c =>
      c.ticker.toLowerCase().includes(s) ||
      c.name.toLowerCase().includes(s) ||
      (c.sector && c.sector.toLowerCase().includes(s))
    );
  }
  if (sectorFilter) filtered = filtered.filter(c => c.sector === sectorFilter);
  if (esgFilter) {
    const order = ['CCC', 'B', 'BB', 'BBB', 'A', 'AA', 'AAA'];
    const minIdx = order.indexOf(esgFilter);
    filtered = filtered.filter(c => {
      const idx = order.indexOf(c.esg);
      return idx >= minIdx;
    });
  }
  return filtered;
}

            <th class="sortable" data-sort="ticker">Ticker</th>
            <th>名称</th>
            <th>行业</th>
            <th class="sortable num" data-sort="price">价格</th>
            <th class="sortable num" data-sort="mcap">市值($B)</th>
            <th class="sortable num" data-sort="rev">营收($B)</th>
            <th class="sortable num" data-sort="netincome">净利($B)</th>
            <th class="sortable num" data-sort="pe">PE</th>
            <th class="sortable num" data-sort="growth">增速</th>
            <th class="sortable num" data-sort="margin">净利率</th>
            <th>ESG</th>
            <th class="sortable num" data-sort="52w_high">52w 高</th>
            <th class="sortable num" data-sort="52w_low">52w 低</th>
          </tr>
        </thead>
        <tbody>
        ${data.map(c => `
          <tr>
            <td><strong>${c.ticker}</strong></td>
            <td>${(c.name || '').substring(0, 30)}</td>
            <td><span class="sector-tag" style="background:${sectorColors[c.sector] || '#666'}">${c.sector || '?'}</span></td>
            <td class="num">$${(c.price || 0).toFixed(2)}</td>
            <td class="num">${(c.mcap || 0).toFixed(0)}</td>
            <td class="num">${(c.rev || 0).toFixed(1)}</td>
            <td class="num">${(c.netincome || 0).toFixed(1)}</td>
            <td class="num">${c.pe !== null ? c.pe.toFixed(1) : '-'}</td>
            <td class="num" style="color: ${(c.growth || 0) > 0.2 ? '#00e472' : (c.growth || 0) < 0 ? '#ef4444' : 'inherit'}">${c.growth ? (c.growth * 100).toFixed(1) + '%' : '-'}</td>
            <td class="num">${c.margin ? (c.margin * 100).toFixed(1) + '%' : '-'}</td>
            <td><span class="badge" style="background: ${esgColors[c.esg] || '#666'}; color: #000;">${c.esg}</span></td>
            <td class="num">$${(c['52w_high'] || 0).toFixed(0)}</td>
            <td class="num">$${(c['52w_low'] || 0).toFixed(0)}</td>
          </tr>
        `).join('')}
        </tbody>
      </table>
    </div>
  `;
}

function renderStrategies() {

  const b = companies.filter(c => c.pe !== null).sort((x, y) => x.pe - y.pe).slice(0, 20);

  const d = companies.filter(c => ['AAA', 'AA', 'A'].includes(c.esg)).sort((x, y) => y.mcap - x.mcap).slice(0, 50);

  return `
    <div class="section">
      <h2>💰 Plan A: 分散等权 (80 家公司) — 被动跟踪</h2>
      <p>模仿 QQQ ETF 等权, 剔除高风险 25 家 (BB 评级/低 PE 价值陷阱/Q1 财年无数据)。80 只各 1.25%</p>
      <p style="margin-top:0.5rem; color: var(--text-dim); font-size: 0.85rem;">持仓: ${a.slice(0, 10).map(c => c.ticker).join(', ')}, ... (共 80)</p>
    </div>

    <div class="section">
      <h2>💎 Plan B: 价值集中 (20 家最低 PE) — 深度价值</h2>
      <p>PE 12-16x 区间 + ESG 良好 + 营收增长 > 0。20 只各 5%</p>
      <p style="margin-top:0.5rem; color: var(--text-dim); font-size: 0.85rem;">持仓: ${b.map(c => `${c.ticker}(PE=${c.pe.toFixed(1)})`).join(', ')}</p>
    </div>

    <div class="section">
      <h2>🚀 Plan C: 增长冲刺 (15 家高增速) — AI + Biotech + 新兴市场</h2>
      <p>营收增速 > 30% YoY, 接受高 PE。15 只各 6.67%</p>
      <p style="margin-top:0.5rem; color: var(--text-dim); font-size: 0.85rem;">持仓: ${c.map(x => `${x.ticker}(+${(x.growth*100).toFixed(0)}%)`).join(', ')}</p>
    </div>

    <div class="section">
      <h2>🌟 Plan D: ESG 整合 (50 家 AAA/AA/A) — 治理优先</h2>
      <p>排除 BB 以下 (PDD, INTC, WBA, BIDU, NTES, FANG, SIRI, WBD, SMCI)。50 只各 2%</p>
      <p style="margin-top:0.5rem; color: var(--text-dim); font-size: 0.85rem;">持仓: ${d.slice(0, 10).map(x => `${x.ticker}(${x.esg})`).join(', ')}, ... (共 50)</p>
    </div>

    <div class="section">
      <h2>⚠️ 5 个 Falsification / 风险</h2>
      <ul class="falsif-list">
        <li>前 7 家公司占 53% 权重 — 集中度风险, 任何 1 家出问题 = 整个 QQQ 暴跌</li>
        <li>PE 中位 29.5x vs 历史平均 16x — AI 推高估值, 收益未必兑现</li>
        <li>AI capex 2024-2026 累计 > $500B — 2026 H2 可能出现 "AI 折旧潮"</li>
        <li>TSLA PE=316x 严重高估 — 估值回归随时可能</li>
        <li>INTC/WBD/RIVN 营收负增长 — 价值陷阱风险, 已从 Plan A/B 排除</li>
      </ul>
    </div>

    <div class="section">
      <h2>🧠 与你 4 研究方向的关联</h2>
      <p><strong>AI Agent 经济学</strong>: 核心持仓 NVDA + MSFT + META + GOOGL + AMZN. 占比 50%+</p>
      <p><strong>世界模型 / 具身智能</strong>: NVDA Cosmos + META V-JEPA + GOOGL RT-2. 押注 NVDA/META/AVGO/ARM</p>
      <p><strong>个人 AI OS / 认知增强</strong>: MSFT Copilot + AAPL Intelligence + GOOGL Workspace. 押注 AAPL/MSFT/GOOGL/CRWD/ZS</p>
      <p><strong>量化 + AI</strong>: INTU/ADP/PYPL. 押注 INTU/ADP/SNPS/CDNS</p>
    </div>
  `;
}

function render() {
  const data = getFiltered();
  let display = data;
  if (currentTab === 'mcap') display = data.sort((a, b) => b.mcap - a.mcap).slice(0, 20);
  else if (currentTab === 'growth') display = data.sort((a, b) => b.growth - a.growth).slice(0, 20);
  else if (currentTab === 'value') display = data.filter(c => c.pe !== null).sort((a, b) => a.pe - b.pe).slice(0, 20);
  else if (currentTab === 'esg') display = data.filter(c => c.esg === 'AAA' || c.esg === 'AA');
  const html = currentTab === 'strategies' ? renderStrategies() : renderTable(display);
  document.getElementById('tab-content').innerHTML = html;
}

// 事件
document.getElementById('search').addEventListener('input', e => {
  searchTerm = e.target.value;
  render();
});
document.getElementById('sector-filter').addEventListener('change', e => {
  sectorFilter = e.target.value;
  render();
});
document.getElementById('esg-filter').addEventListener('change', e => {
  esgFilter = e.target.value;
  render();
});
document.querySelectorAll('.tab-btn[data-tab]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn[data-tab]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentTab = btn.dataset.tab;
    render();
  });
});

function resetFilters() {
  document.getElementById('search').value = '';
  document.getElementById('sector-filter').value = '';
  document.getElementById('esg-filter').value = '';
  searchTerm = '';
  sectorFilter = '';
  esgFilter = '';
  render();
}

render();
</script>

</body>
</html>
