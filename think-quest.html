  <!-- 顶部状态栏 -->
  <header class="card mb-4 flex flex-wrap items-center justify-between gap-3">
    <div class="flex items-center gap-3">
      <span class="text-4xl">🧠</span>
      <div>
        <h1 class="text-2xl sm:text-3xl font-extrabold text-orange-600">Think & Quest</h1>

  <!-- 提示音（可选 - 用 Web Audio 简单合成） -->
  <script>
    // =================== 0. 全局状态 + localStorage ===================
    const STORAGE_KEY = 'think_quest_state_v1';
    const DEFAULT_STATE = {
      stars: 0,
      exp: 0,
      level: 1,
      streak: 0,
      lastDate: null,        // 上次签到日期 YYYY-MM-DD
      streakUpdatedOn: null, // 连续签到上次更新的日期
      currentDay: 0,         // 当前关卡索引（0-based）
      challengeStates: {},    // {dayIdx: {A: {completed, guess, chat}, B: {...}, C: {...}}}
      parentPassword: '1234', // 默认家长密码
      difficulty: 'normal',  // easy | normal | hard
      aiMode: 'simulated',    // simulated | openai
      apiKey: '',
      badges: [],             // 解锁的勋章名
      childName: '小冒险家',
      voiceInputEnabled: true,   // 语音输入开关
      voiceOutputEnabled: true,  // 语音输出开关
      voiceLang: 'zh-CN',         // 识别/朗读语言
      voiceName: '',              // 朗读声音（中文女声优先）
      voiceRate: 0.95,            // 朗读速度（适合儿童）
      voicePitch: 1.1,            // 音调
    };

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return structuredClone(DEFAULT_STATE);
        return Object.assign(structuredClone(DEFAULT_STATE), JSON.parse(raw));
      } catch (e) {
        return structuredClone(DEFAULT_STATE);
      }
    }
    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }
    let state = loadState();

    // =================== 1. 关卡数据（初始 3 关 + 之后可扩展） ===================
    const LEVELS = [
      // Day 1: 神奇的影子
      {
        id: 0,
        title: '神奇的影子',
        icon: '🔦',
        hint: '为什么影子会偷偷跟着你，又偷偷跑掉？',
        category: 'physics-light',
        challenges: {
          C: {  // 提问升级
            title: '提问挑战 · 升级你的问题',
            original: '为什么影子会变长变短？',
            prompt: '这是个不错的问题！但它还可以变得更"尖锐"。来，试试看：',
            example: '如果地球是立方体，影子会长什么样？'
          },
          A: {  // 侦探挑战
            title: '侦探挑战 · 影子中午最短吗？',
            original: '我猜影子中午最短。',
            topic: 'shadows'
          },
          B: {  // 反驳挑战
            title: '反驳挑战 · 影子真的没用吗？',
            original: '影子是没有用的东西。',
            topic: 'shadows-useful'
          }
        }
      },
      // Day 2: 动物的超能力
      {
        id: 1,
        title: '动物的超能力',
        icon: '🦎',
        hint: '变色龙会变颜色，蝙蝠会"看见"声音，下一个超能力会是什么？',
        category: 'biology-animals',
        challenges: {
          C: {
            title: '提问挑战 · 升级你的问题',
            original: '为什么变色龙会变色？',
            prompt: '这是一个关于"原因"的问题。我们能不能问得更深？',
            example: '假如人类也能像变色龙一样变色，世界会变成什么样？'
          },
          A: {
            title: '侦探挑战 · 变色龙是看到什么就变什么吗？',
            original: '我猜变色龙是看到什么颜色就变成什么颜色。',
            topic: 'chameleon-color'
          },
          B: {
            title: '反驳挑战 · 蝙蝠的眼睛是多余的？',
            original: '蝙蝠既然能用"耳朵"看东西，眼睛就没用了。',
            topic: 'bat-eyes-useless'
          }
        }
      },
      // Day 3: 为什么是圆的
      {
        id: 2,
        title: '为什么是圆的',
        icon: '⚽',
        hint: '球、太阳、月亮、甜甜圈、泡泡……为什么这么多东西都是圆的？',
        category: 'geometry-shapes',
        challenges: {
          C: {
            title: '提问挑战 · 升级你的问题',
            original: '为什么球是圆的？',
            prompt: '"圆的"背后藏着什么秘密？',
            example: '假如水珠不是圆的，世界会怎样？'
          },
          A: {
            title: '侦探挑战 · 泡泡一定是圆的吗？',
            original: '我猜泡泡一定是圆的。',
            topic: 'bubble-shape'
          },
          B: {
            title: '反驳挑战 · 圆就是最完美的形状？',
            original: '圆形是世界上最好的形状。',
            topic: 'circle-perfect'
          }
        }
      }
    ];

    // =================== 2. 模拟 AI 引擎（核心教育逻辑） ===================
    /*
     * 三种模式必须严格遵守：
     *  - 模式 A（侦探）：肯定 → 2-3 线索 → 1 个动手任务 → 开放问题
     *  - 模式 B（反驳）：开场 → 2 条"但是" → 追问 → 不站队
     *  - 模式 C（提问升级）：重复原问题 → 3 个引导问题（事实/假设/价值）→ 邀请改写
     *
     * 难度影响：easy 用词更直白，hard 加深一点。
     * 关键词检测 → 命中主题后插入具体素材。
     */
    const KEYWORD_HINTS = {
      'shadows': {
        clues: [
          '影子需要"光"和"挡光的东西"，缺一不可。',
          '影子是"形状"，不是"颜色"——它会保留挡光物体的轮廓。',
          '光源越高、越近（比如正午太阳），影子越短；光源越斜、越远，影子越长。',
        ],
        experiment: '用手电筒 + 一支铅笔模拟太阳和旗杆。把手电筒从正上方慢慢倾斜到侧面，观察铅笔影子的长度变化。',
        openQuestion: '你做完后，影子的"长度"和手电筒的"倾斜角度"有什么关系？'
      },
      'shadows-useful': {
        rebuttals: [
          '古人用日晷（"太阳的影子钟"）来计时。没有影子，就没有日晷。',
          '皮影戏用影子讲故事，影子是主角，演员反而躲在幕后。',
          '有些动物会躲在影子下避暑，影子是它们的"遮阳伞"。',
        ],
        refine: '你还想说"影子没用"吗？如果改一改，你会怎么说？'
      },
      'chameleon-color': {
        clues: [
          '变色龙变色的主要原因是"情绪"和"温度"，不是"看到什么颜色就变成什么颜色"。',
          '它们的皮肤里有特殊的"光子晶体"，通过改变结构来反射不同颜色的光。',
          '科学家发现，有些变色龙在"完全黑暗"里也能变色——这说明不是模仿背景。',
        ],
        experiment: '用白色和黑色的纸各做一只"小变色龙"。在房间里开灯、关灯，看看纸的颜色变了吗？（提示：变色龙变色的不是颜料，是皮肤里的特殊结构。）',
        openQuestion: '如果变色龙变色的目的不是"隐藏自己"，你觉得可能是为了什么？'
      },
      'bat-eyes-useless': {
        rebuttals: [
          '蝙蝠在光线明亮时确实主要用眼睛看东西，回声定位只在黑暗中启动。',
          '很多蝙蝠视力很好，能在日间捕食蝴蝶、飞蛾。',
          '只用一种感官很危险——如果回声被什么挡住了（柔软的毛、蛾子的绒毛），眼睛就是"备份系统"。',
        ],
        refine: '现在你觉得蝙蝠的眼睛是"没用"还是"重要备份"？'
      },
      'bubble-shape': {
        clues: [
          '泡泡里面的东西（气体）在"用力"往外推，这就是"气压"。',
          '液体表面有一种力量叫"表面张力"，它喜欢让液体"缩成最小"。',
          '在同样体积下，"球形"是表面积最小的形状——所以泡泡总是圆的（或近似圆）。',
        ],
        experiment: '用铁丝做一个正方体框，蘸上肥皂水。慢慢拿出来，观察：它一定会变成球吗？如果是，为什么？',
        openQuestion: '为什么水滴、星星（大多数）、行星也几乎都是球形？和泡泡是同一个原因吗？'
      },
      'circle-perfect': {
        rebuttals: [
          '圆不能"堆叠"——球和球之间会有空隙，所以装水果用方盒子反而更省空间。',
          '圆形的东西"滚动容易，停止难"——轮子省力，但桌面、书本、砖块不能是圆的。',
          '在不同方向上，圆"每个方向都一样"——这有时是优点（比如车轮），有时是缺点（比如没有"头"和"尾"指向）。',
        ],
        refine: '你还想说圆形是"最好的"形状吗？换一种说法你会怎么说？'
      }
    };

    function pickTopicFromText(text) {
      const t = (text || '').toLowerCase();
      for (const key of Object.keys(KEYWORD_HINTS)) {
        if (t.includes(key.split('-')[0])) return key;
      }
      return null;
    }

    const SIMULATED_AI = {
      // 模式 A：侦探挑战
      async handleDetective(userText, ctx) {
        const hint = KEYWORD_HINTS[ctx.topic] || {
          clues: [
            '好的猜想是科学的第一步——你已经迈出这一步了。',
            '把问题拆成"看得见"和"看不见"两个部分，往往能找到线索。',
            '记录下"什么变了"和"什么没变"，这是侦探的核心技能。',
          ],
          experiment: '找两样家里的东西（比如一杯水和一本厚书），分别放在灯光下。猜猜谁的影子更深？为什么？',
          openQuestion: '你做完实验，最让你惊讶的是什么？'
        };
        const difficulty = ctx.difficulty || 'normal';
        const extra = difficulty === 'hard' ? '（提示：想想"控制变量"——一次只改一个因素。）' : '';
        const lines = [
          `🤔 这个猜想很有意思！${userText ? `你说："${userText}"。` : ''}`,
          '',
          '🔍 侦探线索：',
          ...hint.clues.map((c, i) => `  ${i + 1}. ${c}`),
          '',
          `🛠️ 动手小任务：${hint.experiment}${extra}`,
          '',
          `❓ ${hint.openQuestion}`
        ];
        return lines.join('\n');
      },

      // 模式 B：反驳挑战
      async handleDebate(userText, ctx) {
        const hint = KEYWORD_HINTS[ctx.topic] || {
          rebuttals: [
            '但如果所有东西都是这样的，世界会缺少"变化"——有时候不同才有趣。',
            '但你可能忽略了一个角度：它对某些人有用，对另一些人却没用。',
          ],
          refine: '看了这两条反驳，你想怎么修改你的观点？'
        };
        const lines = [
          '🤺 让我试着反驳你的观点，只是为了帮你想得更全面。',
          '',
          ...hint.rebuttals.map(r => `  • ${r}`),
          '',
          `❓ ${hint.refine}`
        ];
        return lines.join('\n');
      },

      // 模式 C：提问升级
      async handleQuestion(userText, ctx) {
        const levelQ = ctx.difficulty === 'easy' ? [
          '这是个关于"事实"的问题：是什么？在哪里？什么时候？',
          '这是个关于"原因"的问题：为什么这样？是什么让它这样？',
          '这是个关于"假如"的问题：如果情况变了，会怎样？',
        ] : ctx.difficulty === 'hard' ? [
          '事实型：这件事客观上是什么样的？有没有数字或证据？',
          '因果型：背后的机制是什么？哪些因素在起作用？',
          '价值型：如果这件事变了，对谁有益？对谁有害？',
        ] : [
          '事实型：它具体是什么？长什么样？在哪里？',
          '原因型：为什么是这样？是什么导致了它？',
          '价值型：这重要吗？对谁重要？好的方面和不好的方面？',
        ];
        const lines = [
          `📝 你原来的问题是："${userText}"`,
          '',
          '🤔 这个问题可以走三个方向，你想往哪个方向走？',
          ...levelQ.map(q => `  → ${q}`),
          '',
          '你可以把原问题改成上面任意一个更具体的问题，我会继续陪你思考。'
        ];
        return lines.join('\n');
      },

      // 通用：没识别到模式时
      async handleGeneric(userText) {
        return [
          `你说："${userText}"`,
          '',
          '👀 我注意到了。让我陪你再想想：',
          '  • 你观察到的"事实"是什么？',
          '  • 你猜测的"原因"是什么？',
          '  • 如果这样，有没有什么"小实验"可以验证？',
          '',
          '告诉我你想到的，我们继续~'
        ].join('\n');
      }
    };

    // 模式路由器
    async function aiRespond(mode, userText, ctx) {
      // 如果用户配了 OpenAI Key，用真 AI
      if (state.aiMode === 'openai' && state.apiKey) {
        try {
          return await callOpenAI(mode, userText, ctx);
        } catch (e) {
          return `（真实 AI 调用失败，已自动切换到模拟模式。错误：${e.message}）\n\n` + await pickSimulated(mode, userText, ctx);
        }
      }
      return await pickSimulated(mode, userText, ctx);
    }

    async function pickSimulated(mode, userText, ctx) {
      if (mode === 'A') return SIMULATED_AI.handleDetective(userText, ctx);
      if (mode === 'B') return SIMULATED_AI.handleDebate(userText, ctx);
      if (mode === 'C') return SIMULATED_AI.handleQuestion(userText, ctx);
      return SIMULATED_AI.handleGeneric(userText);
    }

    // 真实 AI 调用（OpenAI 兼容）
    async function callOpenAI(mode, userText, ctx) {
      const sysPrompts = {
        A: '你是一位"思考导师"，正在帮 7-12 岁的孩子做侦探挑战。规则：1) 先肯定孩子的猜想；2) 给 2-3 条简短线索；3) 给一个可在家用常见材料（手电筒/纸/水杯）做的小实验；4) 结尾问一个开放问题。绝不直接给答案。',
        B: '你是一位"思考导师"，正在帮 7-12 岁孩子练习反驳。规则：1) 开场说"让我试着反驳你的观点"；2) 列出 2 条以"但是"开头的反驳；3) 询问孩子如何修正观点；4) 严禁说"你是对的"或"你是错的"。',
        C: '你是一位"思考导师"，正在帮 7-12 岁孩子升级问题。规则：1) 重复孩子原问题；2) 给出 3 个引导性问题（事实/原因/价值）；3) 邀请孩子改写问题。',
      };
      const res = await fetch('https://api.openai.com/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${state.apiKey}`
        },
        body: JSON.stringify({
          model: 'gpt-3.5-turbo',
          messages: [
            { role: 'system', content: sysPrompts[mode] || sysPrompts.A },
            { role: 'user', content: userText }
          ],
          temperature: 0.7,
          max_tokens: 500
        })
      });
      if (!res.ok) throw new Error(`OpenAI ${res.status}`);
      const data = await res.json();
      return data.choices[0].message.content;
    }

    // =================== 3. 游戏化 ===================
    function addExp(n) {
      state.exp += n;
      // 等级 = 1 + exp / 100
      state.level = 1 + Math.floor(state.exp / 100);
    }
    function addStars(n) {
      state.stars += n;
    }
    function checkBadges() {
      const earned = new Set(state.badges);
      if (state.stars >= 3) earned.add('🌟 新手侦探');
      if (state.stars >= 10) earned.add('🥉 初级思考者');
      if (state.stars >= 20) earned.add('🥈 中级思考者');
      if (state.stars >= 50) earned.add('🥇 金牌反驳手');
      if (state.streak >= 7) earned.add('🔥 七日坚持');
      if (state.streak >= 30) earned.add('🏆 月度大师');
      // 统计反驳挑战
      let debateCount = 0;
      Object.values(state.challengeStates).forEach(d => {
        if (d.B && d.B.completed) debateCount++;
      });
      if (debateCount >= 5) earned.add('💬 反驳高手');
      // 统计提问升级
      let questionCount = 0;
      Object.values(state.challengeStates).forEach(d => {
        if (d.C && d.C.completed) questionCount++;
      });
      if (questionCount >= 5) earned.add('❓ 问题大师');
      state.badges = Array.from(earned);
    }
    function updateStreak() {
      const today = new Date().toISOString().slice(0, 10);
      if (state.streakUpdatedOn === today) return;
      if (!state.streakUpdatedOn) {
        state.streak = 1;
      } else {
        const last = new Date(state.streakUpdatedOn);
        const now = new Date(today);
        const diff = Math.round((now - last) / (1000 * 60 * 60 * 24));
        if (diff === 1) state.streak += 1;
        else if (diff > 1) state.streak = 1;
      }
      state.streakUpdatedOn = today;
      saveState();
    }

    function celebrate() {
      // 撒花动画 - iOS 性能考虑减少到 15 个
      const emojis = ['🎉', '⭐', '🌟', '✨', '💫', '🎊', '🏆'];
      const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
      const count = isIOS ? 15 : 30;
      for (let i = 0; i < count; i++) {
        const c = document.createElement('div');
        c.className = 'confetti';
        c.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        c.style.left = Math.random() * 100 + 'vw';
        c.style.animationDelay = (Math.random() * 0.5) + 's';
        c.style.animationDuration = (2 + Math.random() * 2) + 's';
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 4000);
      }
    }

    function beep() {
      try {
        const AudioCtor = window.AudioContext || window.webkitAudioContext;
        if (!AudioCtor) return;
        const ctx = new AudioCtor();
        // iOS Safari: AudioContext 默认 suspended，需要用户交互
        if (ctx.state === 'suspended') ctx.resume().catch(() => {});
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = 880;
        gain.gain.setValueAtTime(0.1, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
        osc.start();
        osc.stop(ctx.currentTime + 0.3);
        // iOS: 立即关闭释放资源
        setTimeout(() => { try { ctx.close(); } catch(e){} }, 500);
      } catch (e) {}
    }

    // =================== 4. 视图渲染 ===================
    function render() {
      // iOS 友好：首次 render 隐藏 boot-loading
      const boot = document.getElementById('boot-loading');
      if (boot) boot.style.display = 'none';
      updateStreak();
      saveState();
      updateHeader();
      const main = document.getElementById('main-content');
      const raw = location.hash.slice(1) || 'home';
      // 路由: 拿 ? 前的路径（避免 "challenge?mode=A" 不匹配 "challenge"）
      const hash = raw.split('?')[0];
      if (hash === 'home') main.innerHTML = viewHome();
      else if (hash === 'challenge') main.innerHTML = viewChallenge();
      else if (hash === 'history') main.innerHTML = viewHistory();
      else if (hash === 'parent') main.innerHTML = viewParent();
      else if (hash === 'badges') main.innerHTML = viewBadges();
      else if (hash === 'settings') main.innerHTML = viewSettings();
      else main.innerHTML = viewHome();
      bindViewEvents();
    }

    function updateHeader() {
      document.getElementById('stat-stars').textContent = state.stars;
      document.getElementById('stat-level').textContent = state.level;
      document.getElementById('stat-streak').textContent = state.streak;
      document.getElementById('stat-exp').textContent = state.exp;

        </div>

        <div class="card flex flex-wrap gap-3 justify-center">

          <button class="btn-primary" onclick="goChallenge('A')">${A.completed ? '✅ 再看一次' : '开始侦探挑战'}</button>
          <button class="btn-primary" onclick="goChallenge('B')">${B.completed ? '✅ 再看一次' : '开始反驳挑战'}</button>
          ${allDone ? `<button class="btn-ghost" onclick="nextDay()">➡️ 下一关</button>` : ''}

        <div class="card mt-4">
          <h3 class="font-bold text-lg mb-3">📅 过往关卡</h3>
          ${pastDays.length === 0
            ? '<p class="text-sm text-gray-500">还没有完成的关卡。完成今天的 3 个挑战后会出现在这里。</p>'
            : `<div class="flex flex-wrap gap-2">${pastDays.map(d => {
                const ld = LEVELS[d];
                if (!ld) return '';
                return `<button class="btn-ghost text-sm" onclick="goDay(${d})">${ld.icon} Day ${d + 1}: ${ld.title}</button>`;
              }).join('')}</div>`
          }
          <div class="mt-4 flex gap-2">

            <button class="btn-ghost text-sm" onclick="goHash('badges')">🏅 勋章</button>
            <button class="btn-ghost text-sm" onclick="unlockParent()">🔒 家长入口</button>
          </div>
        </div>
      `;
    }

    function challengeCard(mode, title, desc, def, st) {
      const modeName = mode === 'A' ? '模式 A' : mode === 'B' ? '模式 B' : '模式 C';
      const cls = `mode-${mode}`;

    // =================== 4.2 挑战界面 ===================

      return `
        <section class="card mb-3">
          <button class="btn-ghost text-sm mb-2" onclick="goHash('home')">← 返回首页</button>

          <h3 class="text-lg font-bold mt-2">${def.title}</h3>
          <p class="text-sm text-gray-600 mt-2">
            ${mode === 'A'
              ? '提出你的猜想，思考导师会给你 3 条线索 + 1 个小实验。'

    function renderChat(messages) {
      if (messages.length === 0) {
        return '<p class="text-sm text-gray-500 text-center py-4">还没开始对话。先说点什么吧 👇</p>';
      }
      return messages.map(m => {
        if (m.from === 'ai') return `<div class="chat-bubble-ai"><pre class="whitespace-pre-wrap font-sans text-sm">${escapeHtml(m.text)}</pre></div>`;
        if (m.from === 'child') return `<div class="chat-bubble-child"><pre class="whitespace-pre-wrap font-sans text-sm">${escapeHtml(m.text)}</pre></div>`;
        return `<div class="chat-bubble-user"><pre class="whitespace-pre-wrap font-sans text-sm">${escapeHtml(m.text)}</pre></div>`;
      }).join('');
    }

    function escapeHtml(s) {
      return (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

              <select onchange="state.aiMode=this.value;saveState()">
                <option value="simulated" ${state.aiMode==='simulated'?'selected':''}>模拟 AI（离线可用）</option>
                <option value="openai" ${state.aiMode==='openai'?'selected':''}>OpenAI 真实 API</option>
              </select>
            </label>
            <label class="block mb-2 text-sm">OpenAI API Key:
              <input type="password" value="${escapeHtml(state.apiKey)}" placeholder="sk-..." oninput="state.apiKey=this.value;saveState()" />
            </label>
            <p class="text-xs text-gray-500 mt-1">💡 留空 = 总是用模拟 AI。Key 只存在浏览器本地，不会上传。</p>
          </div>

          <h3 class="font-bold mt-4 mb-2">🗣️ 语音设置</h3>
          <div class="bg-orange-50 p-3 rounded-xl">
            <label class="block mb-2 text-sm flex items-center gap-2">
              <input type="checkbox" ${state.voiceInputEnabled ? 'checked' : ''} onchange="state.voiceInputEnabled=this.checked;saveState()" />
              <span>🎤 启用语音输入（麦克风按钮）</span>
            </label>
            <label class="block mb-2 text-sm flex items-center gap-2">
              <input type="checkbox" ${state.voiceOutputEnabled ? 'checked' : ''} onchange="state.voiceOutputEnabled=this.checked;saveState()" />
              <span>🔊 启用语音输出（AI 回复自动朗读）</span>
            </label>
            <label class="block mb-2 text-sm">语言:
              <select onchange="state.voiceLang=this.value;if(recognition)recognition.lang=this.value;saveState()">
                <option value="zh-CN" ${state.voiceLang==='zh-CN'?'selected':''}>中文（简体）</option>
                <option value="zh-TW" ${state.voiceLang==='zh-TW'?'selected':''}>中文（繁體）</option>
                <option value="en-US" ${state.voiceLang==='en-US'?'selected':''}>English (US)</option>
              </select>
            </label>
            <label class="block mb-2 text-sm">朗读速度: ${state.voiceRate.toFixed(2)}x
              <input type="range" min="0.5" max="1.5" step="0.05" value="${state.voiceRate}" oninput="state.voiceRate=parseFloat(this.value);saveState();this.previousSibling.textContent='朗读速度: '+state.voiceRate.toFixed(2)+'x'" />
            </label>
            <button class="btn-ghost text-sm mt-2" onclick="testSpeak()">🔊 测试声音</button>
            <p class="text-xs text-gray-500 mt-2">💡 浏览器支持：Chrome / Edge / Safari 14.5+ / 微信内置浏览器（部分）。如不支持，🎤 按钮会显示但提示不可用。</p>
          </div>

          <h3 class="font-bold mt-4 mb-2">🗓️ 关卡管理</h3>
          <div class="bg-orange-50 p-3 rounded-xl">
            <p class="text-sm mb-2">当前关卡: <b>Day ${state.currentDay + 1} - ${(LEVELS[state.currentDay % LEVELS.length] || LEVELS[0]).title}</b></p>
            <div class="flex gap-2 flex-wrap">
              <button class="btn-ghost text-sm" onclick="resetToday()">🔄 重置今天的关卡</button>
              <button class="btn-ghost text-sm" onclick="resetAll()">⚠️ 重置全部数据</button>
              <button class="btn-primary text-sm" onclick="exportReport()">📥 导出学习报告</button>
            </div>
          </div>
        </div>
      `;
    }

    // =================== 4.5 勋章 ===================
    function viewBadges() {
      const all = ['🌟 新手侦探', '🥉 初级思考者', '🥈 中级思考者', '🥇 金牌反驳手', '🔥 七日坚持', '🏆 月度大师', '💬 反驳高手', '❓ 问题大师'];
      return `
        <div class="card">
          <button class="btn-ghost text-sm mb-3" onclick="goHash('home')">← 返回</button>
          <h2 class="text-2xl font-extrabold mb-3">🏅 勋章墙</h2>
          <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
            ${all.map(b => {
              const has = state.badges.includes(b);
              return `
                <div class="card text-center ${has ? '' : 'opacity-30 grayscale'}" style="padding: 0.75rem;">
                  <div class="text-3xl mb-1">${b.split(' ')[0]}</div>
                  <div class="text-xs font-bold">${b.split(' ').slice(1).join(' ')}</div>
                </div>
              `;
            }).join('')}
          </div>
          <p class="text-sm text-gray-500 mt-4">已解锁 ${state.badges.length} / ${all.length}</p>
        </div>
      `;
    }

    // =================== 4.6 设置 ===================
    function viewSettings() {
      return viewParent();
    }

    // =================== 5. 事件处理 ===================
    function bindViewEvents() {
      // 自动滚动聊天到底部
      const cc = document.getElementById('chat-container');
      if (cc) cc.scrollTop = cc.scrollHeight;
    }

    function goHash(h) {
      location.hash = h;
    }
    function goChallenge(mode) {
      location.hash = `challenge?mode=${mode}`;
    }
    function goDay(d) {
      state.currentDay = d;
      saveState();
      goHash('home');
    }
    function nextDay() {
      state.currentDay = (state.currentDay + 1) % LEVELS.length;
      saveState();
      goHash('home');
    }
    function unlockParent() {
      const pw = prompt('请输入家长密码（默认 1234）：');
      if (pw === state.parentPassword) {
        goHash('parent');
      } else {
        alert('密码错误');
      }
    }
    function resetToday() {
      if (!confirm('确认重置今天关卡的所有猜想、对话、完成状态？')) return;
      delete state.challengeStates[state.currentDay];
      saveState();
      render();
    }
    function resetAll() {
      if (!confirm('⚠️ 确认重置全部数据？这会清空星星、等级、所有关卡记录。')) return;
      state = structuredClone(DEFAULT_STATE);
      saveState();
      render();
    }
    function exportReport() {
      const lines = [
        '═══════════════════════════════',
        '  Think & Quest 学习报告',
        `  孩子: ${state.childName}`,
        `  导出日期: ${new Date().toLocaleString()}`,
        '═══════════════════════════════',
        '',
        `等级: Lv.${state.level} (${state.exp} EXP)`,
        `总星星: ⭐ ${state.stars}`,
        `连续签到: 🔥 ${state.streak} 天`,
        `已解锁勋章: ${state.badges.join(' ') || '无'}`,
        '',
        '───────────────────────────────────',
        '关卡详情',
        '───────────────────────────────────',
      ];
      const days = Object.keys(state.challengeStates).map(k => parseInt(k)).sort((a, b) => a - b);
      days.forEach(d => {
        const ld = LEVELS[d];
        if (!ld) return;
        lines.push('');
        lines.push(`📅 Day ${d + 1}: ${ld.title} ${ld.icon}`);
        lines.push('─'.repeat(40));
        const st = state.challengeStates[d];
        ['C', 'A', 'B'].forEach(m => {
          const cs = st[m];
          if (!cs) return;
          const label = m === 'A' ? '侦探挑战' : m === 'B' ? '反驳挑战' : '提问挑战';
          lines.push(`\n【${label}】 ${cs.completed ? '✅ 已完成' : '⏳ 未完成'}`);
          if (cs.guess) lines.push(`  ${m === 'B' ? '修正观点' : '猜想/结论'}: ${cs.guess}`);
          if (cs.chat && cs.chat.length) {
            lines.push('  对话:');
            cs.chat.forEach(c => {
              lines.push(`    ${c.from === 'ai' ? '🤖' : '🧒'} ${c.text.replace(/\n/g, '\n      ')}`);
            });
          }
        });
      });
      const text = lines.join('\n');
      const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `think-quest-report-${new Date().toISOString().slice(0, 10)}.txt`;
      a.click();
    }

    async function sendChat(mode) {
      const input = document.getElementById('chat-input');
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      const day = LEVELS[state.currentDay % LEVELS.length];
      if (!state.challengeStates[day.id]) state.challengeStates[day.id] = {};
      if (!state.challengeStates[day.id][mode]) state.challengeStates[day.id][mode] = { chat: [] };
      const cs = state.challengeStates[day.id][mode];
      cs.chat.push({ from: 'child', text });
      saveState();
      // 显示"AI 思考中"
      cs.chat.push({ from: 'ai', text: '🤔 思考中…' });
      render();
      // 调用 AI
      const ctx = {
        topic: def_to_topic(day.challenges[mode]),
        difficulty: state.difficulty
      };
      try {
        const reply = await aiRespond(mode, text, ctx);
        cs.chat[cs.chat.length - 1] = { from: 'ai', text: reply };
        // 自动朗读 AI 回复（如果用户开启了 TTS）
        if (state.voiceOutputEnabled) speak(reply);
      } catch (e) {
        cs.chat[cs.chat.length - 1] = { from: 'ai', text: `（出错了：${e.message}）` };
      }
      saveState();
      render();
    }

    function def_to_topic(def) {
      // 提取关键词作为 topic hint
      if (!def) return null;
      const text = (def.original || '') + ' ' + (def.title || '');
      return pickTopicFromText(text);
    }

    function saveGuess(mode) {
      const input = document.getElementById('guess-input');
      if (!input) return;
      const day = LEVELS[state.currentDay % LEVELS.length];
      if (!state.challengeStates[day.id]) state.challengeStates[day.id] = {};
      if (!state.challengeStates[day.id][mode]) state.challengeStates[day.id][mode] = { chat: [] };
      state.challengeStates[day.id][mode].guess = input.value;
      saveState();
    }

    function completeChallenge(mode) {
      const day = LEVELS[state.currentDay % LEVELS.length];
      if (!state.challengeStates[day.id]) state.challengeStates[day.id] = {};
      if (!state.challengeStates[day.id][mode]) state.challengeStates[day.id][mode] = { chat: [] };
      const cs = state.challengeStates[day.id][mode];
      if (cs.completed) return;
      cs.completed = true;
      addStars(1);
      addExp(10);
      checkBadges();
      saveState();
      celebrate();
      beep();
      render();
      setTimeout(() => alert(`🎉 恭喜！挑战完成！\n+1⭐ +10 EXP\n当前: Lv.${state.level} · ${state.exp} EXP · ${state.stars}⭐`), 100);
    }

    // =================== 5.7 语音输入 + 输出 (Web Speech API) ===================
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    const TTS = window.speechSynthesis;
    let recognition = null;
    let isRecording = false;

    function ensureRecognition() {
      if (!SR) return null;
      if (recognition) return recognition;
      recognition = new SR();
      recognition.lang = state.voiceLang || 'zh-CN';
      recognition.continuous = false;
      recognition.interimResults = true;
      recognition.maxAlternatives = 1;
      recognition.onresult = (event) => {
        let final = '';
        let interim = '';
        for (let i = event.resultIndex; i < event.results.length; i++) {
          const t = event.results[i][0].transcript;
          if (event.results[i].isFinal) final += t;
          else interim += t;
        }
        const input = document.getElementById('chat-input');
        if (input) {
          // 保留已输入 + 追加识别结果
          const existing = input.dataset.baseText || '';
          input.value = existing + (existing && final ? ' ' : '') + (final + interim);
        }
      };
      recognition.onerror = (e) => {
        console.warn('SpeechRecognition error:', e.error);
        setMicState(false);
        if (e.error === 'not-allowed' || e.error === 'service-not-allowed') {
          alert('麦克风权限被拒绝。请在浏览器设置中允许麦克风访问。');
        } else if (e.error === 'no-speech') {
          // 静默 — 用户没说话
        } else if (e.error !== 'aborted') {
          alert('语音识别出错: ' + e.error);
        }
      };
      recognition.onend = () => {
        setMicState(false);
      };
      return recognition;
    }

    function setMicState(recording) {
      isRecording = recording;
      const btn = document.getElementById('mic-btn');
      if (!btn) return;
      if (recording) {
        btn.textContent = '🔴 停止';
        btn.style.background = '#fee2e2';
        btn.style.borderColor = '#dc2626';
        btn.style.color = '#dc2626';
      } else {
        btn.textContent = '🎤';
        btn.style.background = '';
        btn.style.borderColor = '';
        btn.style.color = '';
      }
    }

    function toggleMic(mode) {
      if (!SR) {
        alert('你的浏览器不支持语音输入。\n建议用 Chrome / Edge / Safari 14.5+');
        return;
      }
      if (isRecording) {
        if (recognition) {
          // 保存已确认文字作 base，下次继续追加
          const input = document.getElementById('chat-input');
          if (input) {
            // 提取 final 部分作为 base
            input.dataset.baseText = input.value.trim();
          }
          recognition.stop();
        }
        setMicState(false);
        return;
      }
      const rec = ensureRecognition();
      if (!rec) return;
      try {
        // 清空 input 之前的 base（开启新一次录音）
        const input = document.getElementById('chat-input');
        if (input) input.dataset.baseText = '';
        rec.start();
        setMicState(true);
      } catch (e) {
        console.warn('recognition.start failed:', e);
        setMicState(false);
      }
    }

    // ---- TTS ----
    let cachedVoices = null;
    function getVoices() {
      if (cachedVoices) return cachedVoices;
      if (!TTS) return [];
      cachedVoices = TTS.getVoices();
      return cachedVoices;
    }
    // 某些浏览器 voices 异步加载
    if (TTS) {
      TTS.onvoiceschanged = () => { cachedVoices = TTS.getVoices(); };
    }

    function pickChineseVoice() {
      const voices = getVoices();
      if (!voices.length) return null;
      // 优先选择中文女声
      const zh = voices.filter(v => /zh|cmn|chinese/i.test(v.lang) || /chinese|mandarin/i.test(v.name));
      if (!zh.length) return voices[0];
      // 优先 female
      const female = zh.find(v => /female|woman|girl|tingting|xiaoxiao|yunxi|yunyang/i.test(v.name));
      if (female) return female;
      // 其次: Microsoft / Google 中文
      const ms = zh.find(v => /microsoft|google/i.test(v.name));
      if (ms) return ms;
      return zh[0];
    }

    function cleanTextForSpeech(text) {
      if (!text) return '';
      // 去掉 markdown / emoji / 标点噪音，让朗读更自然
      return text
        .replace(/[🔦🛠️🤔❓✅💬📝🎉⭐🧠🤖🎤🔊⏹🔍💫💡🦎⚽🌟🥉🥈🥇🏆🔥💎]/g, ' ')
        .replace(/[*_`#]/g, '')
        .replace(/\n+/g, '。')
        .replace(/\s+/g, ' ')
        .replace(/。+/g, '。')
        .trim();
    }

    function speak(text) {
      if (!TTS || !state.voiceOutputEnabled) return;
      TTS.cancel();
      const cleaned = cleanTextForSpeech(text);
      if (!cleaned) return;
      const utter = new SpeechSynthesisUtterance(cleaned);
      utter.lang = state.voiceLang || 'zh-CN';
      utter.rate = state.voiceRate || 0.95;
      utter.pitch = state.voicePitch || 1.1;
      const v = pickChineseVoice();
      if (v) utter.voice = v;
      TTS.speak(utter);
    }

    function testSpeak() {
      if (!TTS) { alert('你的浏览器不支持语音输出。'); return; }
      // 临时强制开启
      const wasEnabled = state.voiceOutputEnabled;
      state.voiceOutputEnabled = true;
      speak('你好！我是思考导师。今天我们来玩一个有趣的思考游戏吧。');
      state.voiceOutputEnabled = wasEnabled;
    }

    function stopSpeak() {
      if (TTS) TTS.cancel();
    }

    // =================== 6. 路由 ===================
    window.addEventListener('hashchange', render);
    window.goHash = goHash;
    window.goChallenge = goChallenge;
    window.goDay = goDay;
    window.nextDay = nextDay;
    window.unlockParent = unlockParent;
    window.resetToday = resetToday;
    window.resetAll = resetAll;
    window.exportReport = exportReport;
    window.sendChat = sendChat;
    window.saveGuess = saveGuess;
    window.completeChallenge = completeChallenge;
    window.toggleMic = toggleMic;
    window.speak = speak;
    window.stopSpeak = stopSpeak;
    window.testSpeak = testSpeak;

    // ====== iOS Safari 解锁 AudioContext（必须在用户首次触摸时） ======
    (function unlockAudio() {
      const AudioCtor = window.AudioContext || window.webkitAudioContext;
      if (!AudioCtor) return;
      const tryUnlock = () => {
        try {
          const tmp = new AudioCtor();
          if (tmp.state === 'suspended') tmp.resume();
          // 静默 0.01s 音 + 立即关闭（iOS 解锁机制）
          const osc = tmp.createOscillator();
          const gain = tmp.createGain();
          gain.gain.value = 0;
          osc.connect(gain);
          gain.connect(tmp.destination);
          osc.start();
          osc.stop(tmp.currentTime + 0.001);
          setTimeout(() => { try { tmp.close(); } catch(e){} }, 100);
        } catch (e) {}
      };
      document.addEventListener('touchstart', tryUnlock, { once: true, passive: true });
      document.addEventListener('click', tryUnlock, { once: true });
    })();

    // 首次渲染
    render();
  </script>
</body>
</html>
