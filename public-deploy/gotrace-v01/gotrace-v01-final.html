<style>
:root{
  --navy:#1B2A41;
  --navy-dk:#13202F;
  --terra:#D9723F;
  --gold:#E3B23C;
  --cream:#F6F3EC;
  --ink:#27221B;
  --muted:#8A8272;
  --line:#E7E1D4;
  --green:#3E7A4C;
  --bar-h:60px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
html,body{height:100%;}
body{
  font-family:"PingFang SC","Hiragino Sans GB","Microsoft YaHei","Helvetica Neue",Arial,sans-serif;
  background:var(--cream);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
  -webkit-tap-highlight-color:transparent;
  overscroll-behavior-y:contain;
  padding-top:env(safe-area-inset-top,0);
  padding-bottom:env(safe-area-inset-bottom,0);
  padding-left:env(safe-area-inset-left,0);
  padding-right:env(safe-area-inset-right,0);
}

/* Boot loader — visible until first render */
#boot-loading{
  position:fixed;inset:0;
  background:var(--navy);
  color:#fff;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  z-index:9999;
  font-size:14px;letter-spacing:1px;
}
#boot-loading .mark{
  width:54px;height:54px;border-radius:50%;
  background:linear-gradient(135deg,var(--terra),var(--gold));
  margin-bottom:18px;
  box-shadow:0 8px 24px rgba(217,114,63,0.4);
  animation:pulse 1.4s ease-in-out infinite;
}
@keyframes pulse{
  0%,100%{transform:scale(1);opacity:1;}
  50%{transform:scale(0.85);opacity:0.7;}
}

/* App shell */
.app{
  max-width:560px;
  margin:0 auto;
  min-height:100vh;
  background:var(--cream);
  position:relative;
  display:flex;flex-direction:column;
}

/* Status bar mock (visible in browser; ignored in real PWA) */
.statusbar{
  height:24px;display:flex;align-items:center;justify-content:space-between;
  padding:0 18px;font-size:11px;font-weight:700;color:var(--ink);
  background:var(--cream);flex-shrink:0;
}
.statusbar .dot{width:5px;height:5px;border-radius:50%;background:var(--ink);margin-left:3px;}

/* View area */
#main-content{
  flex:1;padding:8px 16px calc(var(--bar-h) + env(safe-area-inset-bottom,0px) + 16px);
  overflow-y:auto;
}
.view{animation:fadeIn .18s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}

.view-head{padding:8px 0 14px;}
.view-title{
  font-size:22px;font-weight:800;color:var(--navy);
  margin:0;letter-spacing:0.5px;
}
.view-sub{font-size:12px;color:var(--muted);margin:4px 0 0;}

.placeholder{
  background:#fff;border:1px dashed var(--line);
  border-radius:14px;padding:24px 16px;
  color:var(--muted);font-size:12.5px;text-align:center;
  margin-top:10px;
}

/* Bottom tab bar */
.tabbar{
  position:fixed;left:0;right:0;bottom:0;
  height:calc(var(--bar-h) + env(safe-area-inset-bottom,0px));
  padding-bottom:env(safe-area-inset-bottom,0px);
  background:rgba(246,243,236,0.94);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  border-top:1px solid var(--line);
  display:flex;justify-content:space-around;align-items:flex-start;
  z-index:50;
}
.tabbar a{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;padding-top:8px;
  text-decoration:none;color:var(--muted);
  font-size:11px;font-weight:700;
  height:100%;
}
.tabbar a svg{
  width:22px;height:22px;
  stroke:var(--muted);fill:none;stroke-width:1.8;
  stroke-linecap:round;stroke-linejoin:round;
  transition:.15s;
}
.tabbar a.active{color:var(--terra);}
.tabbar a.active svg{stroke:var(--terra);fill:rgba(217,114,63,0.08);}
.tabbar a:active{opacity:0.6;}

/* Reduce motion */
@media (prefers-reduced-motion: reduce){
  .view,#boot-loading .mark{animation:none;}
}

/* ─── L2 home-specific CSS ─── */

/* home-specific CSS — prefixed .home- to avoid collision with skeleton/viewMe */
/* Re-uses design tokens from prototype:
   --navy:#1B2A41; --navy-dk:#13202F; --terra:#D9723F; --gold:#E3B23C;
   --cream:#F6F3EC; --ink:#27221B; --muted:#8A8272; --line:#E7E1D4; --green:#3E7A4C
*/

.home-wrap{
  display:block;
  width:100%;
}

/* ---------- Hero greeting ---------- */
.home-hero{
  margin:6px 0 16px;
  padding:0;
}
.home-hero .greet{
  font-size:22px;
  font-weight:800;
  color:var(--navy);
  letter-spacing:.3px;
  margin:2px 0 4px;
  line-height:1.25;
}
.home-hero .greet .wave{
  display:inline-block;
  transform-origin:70% 70%;
  animation:home-wave 2.4s ease-in-out infinite;
}
@keyframes home-wave{
  0%,100%{transform:rotate(0);}
  20%,60%{transform:rotate(-8deg);}
  40%,80%{transform:rotate(10deg);}
}
@media (prefers-reduced-motion: reduce){
  .home-hero .greet .wave{animation:none;}
}
.home-hero .sub{
  font-size:12px;
  color:var(--muted);
  margin:0;
  line-height:1.5;
}
.home-hero .sub b{
  color:var(--terra);
  font-weight:700;
}

/* ---------- AI banner (entry to plan) ---------- */
.home-banner{
  position:relative;
  background:linear-gradient(135deg,var(--navy),#2C4363);
  border-radius:18px;
  padding:16px 18px;
  color:#fff;
  margin-bottom:18px;
  overflow:hidden;
  display:block;
  text-decoration:none;
  cursor:pointer;
  transition:transform .15s ease;
}
.home-banner:hover{transform:translateY(-1px);}
.home-banner::after{
  content:"";
  position:absolute;
  right:-32px;top:-32px;
  width:130px;height:130px;
  border-radius:50%;
  background:rgba(227,178,60,0.16);
}
.home-banner .k{
  font-size:10.5px;
  letter-spacing:1px;
  color:var(--gold);
  font-weight:700;
  position:relative;
}
.home-banner .t{
  font-size:16px;
  font-weight:800;
  margin:6px 0 4px;
  position:relative;
  line-height:1.3;
}
.home-banner .p{
  font-size:11.5px;
  color:#C9D2E0;
  margin:0;
  position:relative;
  line-height:1.5;
}
.home-banner .arrow{
  position:absolute;
  right:16px;top:50%;
  transform:translateY(-50%);
  width:28px;height:28px;
  border-radius:50%;
  background:rgba(255,255,255,0.16);
  display:flex;align-items:center;justify-content:center;
}
.home-banner .arrow svg{
  width:14px;height:14px;
  stroke:#fff;fill:none;stroke-width:2.2;
  stroke-linecap:round;stroke-linejoin:round;
}

/* ---------- Section label ---------- */
.home-section{
  font-size:12.5px;
  font-weight:800;
  color:var(--navy);
  margin:16px 0 10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.home-section small{
  font-size:10px;
  color:var(--muted);
  font-weight:600;
}
.home-section small a{
  color:var(--muted);
  text-decoration:none;
}
.home-section small a:hover{color:var(--terra);}

/* ---------- Recommended trip card (with big gradient cover) ---------- */
.home-trips{
  display:flex;
  flex-direction:column;
  gap:10px;
  margin-bottom:6px;
}
.home-trip{
  display:block;
  background:#fff;
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 4px 14px rgba(27,42,65,0.06);
  text-decoration:none;
  color:inherit;
  cursor:pointer;
  transition:transform .15s ease, box-shadow .15s ease;
}
.home-trip:hover{
  transform:translateY(-1px);
  box-shadow:0 6px 18px rgba(27,42,65,0.10);
}
.home-trip .cover{
  height:96px;
  position:relative;
  display:flex;
  align-items:flex-end;
  padding:10px 12px;
  color:#fff;
  overflow:hidden;
}
.home-trip .cover::before{
  content:"";
  position:absolute;inset:0;
  background:linear-gradient(180deg,transparent 30%,rgba(0,0,0,0.32));
  pointer-events:none;
}
.home-trip .cover .badge{
  position:absolute;
  top:10px;right:10px;
  background:rgba(255,255,255,0.92);
  color:var(--navy);
  font-size:9.5px;
  font-weight:800;
  padding:4px 8px;
  border-radius:10px;
  letter-spacing:.5px;
  box-shadow:0 2px 6px rgba(0,0,0,0.15);
}
.home-trip .cover .emoji{
  position:absolute;
  top:10px;left:12px;
  font-size:22px;
  filter:drop-shadow(0 2px 4px rgba(0,0,0,0.35));
}
.home-trip .cover .cover-title{
  position:relative;
  font-size:13px;
  font-weight:800;
  line-height:1.3;
  text-shadow:0 1px 3px rgba(0,0,0,0.4);
}
.home-trip .body{
  padding:11px 13px 12px;
}
.home-trip .meta{
  display:flex;
  align-items:center;
  gap:10px;
  font-size:10.5px;
  color:var(--muted);
  margin-bottom:8px;
  flex-wrap:wrap;
}
.home-trip .meta .km{
  font-size:13px;
  font-weight:800;
  color:var(--terra);
}
.home-trip .meta .dot{
  width:3px;height:3px;
  border-radius:50%;
  background:var(--muted);
}
.home-trip .tags{
  display:flex;
  flex-wrap:wrap;
  gap:5px;
  margin-bottom:10px;
}
.home-trip .tag{
  font-size:10px;
  font-weight:700;
  color:var(--terra);
  background:#FBE9DF;
  border-radius:20px;
  padding:3px 9px;
  white-space:nowrap;
}
.home-trip .tag.green{color:var(--green);background:#E5EFE6;}
.home-trip .tag.gold{color:#9C7A1A;background:#FAEFCF;}
.home-trip .tag.navy{color:var(--navy);background:#E2E8EF;}
.home-trip .more{
  display:flex;
  align-items:center;
  justify-content:space-between;
  font-size:11.5px;
  font-weight:700;
  color:var(--navy);
  padding-top:8px;
  border-top:1px dashed var(--line);
}
.home-trip .more .arrow{
  color:var(--terra);
  transition:transform .15s ease;
}
.home-trip:hover .more .arrow{transform:translateX(2px);}

/* ---------- Inspiration chips (horizontal scroll) ---------- */
.home-inspire-row{
  position:relative;
  margin:0 -16px 6px;
  padding:0 16px;
}
.home-inspire{
  display:flex;
  gap:8px;
  overflow-x:auto;
  overflow-y:hidden;
  scroll-behavior:smooth;
  -webkit-overflow-scrolling:touch;
  padding:2px 0 6px;
  scrollbar-width:none;
}
.home-inspire::-webkit-scrollbar{display:none;}
.home-inspire .chip{
  flex-shrink:0;
  display:inline-flex;
  align-items:center;
  gap:5px;
  background:#fff;
  color:var(--navy);
  border:1.2px solid var(--line);
  border-radius:20px;
  padding:8px 14px;
  font-size:11.5px;
  font-weight:700;
  cursor:pointer;
  white-space:nowrap;
  transition:all .15s ease;
  text-decoration:none;
}
.home-inspire .chip:hover{
  border-color:var(--terra);
  color:var(--terra);
  background:#FFF7F1;
}
.home-inspire .chip.active{
  background:var(--navy);
  color:#fff;
  border-color:var(--navy);
}
.home-inspire .chip .emoji{
  font-size:13px;
  line-height:1;
}

/* ---------- Route plaza entry (large card) ---------- */
.home-plaza{
  display:block;
  position:relative;
  margin-top:18px;
  padding:18px 18px 16px;
  border-radius:18px;
  background:linear-gradient(135deg,#FFF6EC 0%,#FBE9DF 100%);
  border:1.4px solid #F2D8C4;
  text-decoration:none;
  color:inherit;
  cursor:pointer;
  overflow:hidden;
  transition:transform .15s ease, box-shadow .15s ease;
}
.home-plaza:hover{
  transform:translateY(-1px);
  box-shadow:0 8px 20px rgba(217,114,63,0.15);
}
.home-plaza::before{
  content:"";
  position:absolute;
  right:-40px;bottom:-40px;
  width:160px;height:160px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(217,114,63,0.18) 0%,transparent 70%);
  pointer-events:none;
}
.home-plaza .label{
  font-size:10.5px;
  font-weight:800;
  color:var(--terra);
  letter-spacing:1px;
  margin-bottom:4px;
  position:relative;
}
.home-plaza .stat{
  font-size:20px;
  font-weight:800;
  color:var(--navy);
  margin:0 0 4px;
  line-height:1.2;
  position:relative;
}
.home-plaza .stat .num{color:var(--terra);}
.home-plaza .desc{
  font-size:11.5px;
  color:var(--ink);
  margin:0 0 14px;
  line-height:1.5;
  position:relative;
  opacity:.78;
}
.home-plaza .cta{
  display:inline-flex;
  align-items:center;
  gap:6px;
  background:var(--terra);
  color:#fff;
  font-size:12.5px;
  font-weight:700;
  padding:10px 16px;
  border-radius:12px;
  position:relative;
  box-shadow:0 4px 10px rgba(217,114,63,0.35);
}
.home-plaza .cta svg{
  width:13px;height:13px;
  stroke:#fff;fill:none;stroke-width:2.2;
  stroke-linecap:round;stroke-linejoin:round;
}
.home-plaza .meta-row{
  display:flex;
  gap:14px;
  margin-top:14px;
  padding-top:12px;
  border-top:1px dashed #F2D8C4;
  position:relative;
}
.home-plaza .meta-row .m{
  display:flex;
  flex-direction:column;
}
.home-plaza .meta-row .m .v{
  font-size:14px;
  font-weight:800;
  color:var(--navy);
}
.home-plaza .meta-row .m .k{
  font-size:9.5px;
  color:var(--muted);
  margin-top:1px;
}

/* ─── L3 me-specific CSS ─── */

/* me-specific CSS — prefixed .me- to avoid collision with skeleton/viewHome */
/* Re-uses design tokens from prototype:
   --navy:#1B2A41; --navy-dk:#13202F; --terra:#D9723F; --gold:#E3B23C;
   --cream:#F6F3EC; --ink:#27221B; --muted:#8A8272; --line:#E7E1D4; --green:#3E7A4C
*/

.me-wrap{
  display:block;
  width:100%;
  padding-bottom:8px;
}

/* ---------- Profile header ---------- */
.me-head{
  display:flex;
  align-items:center;
  gap:14px;
  background:linear-gradient(135deg,#FFF6EC 0%,#FBE9DF 100%);
  border:1.4px solid #F2D8C4;
  border-radius:18px;
  padding:16px;
  margin:4px 0 16px;
  position:relative;
  overflow:hidden;
}
.me-head::before{
  content:"";
  position:absolute;
  right:-30px;top:-30px;
  width:100px;height:100px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(217,114,63,0.18) 0%,transparent 70%);
  pointer-events:none;
}
.me-avatar{
  width:56px;height:56px;
  border-radius:50%;
  background:linear-gradient(135deg,var(--terra) 0%,var(--gold) 100%);
  display:flex;align-items:center;justify-content:center;
  font-size:24px;font-weight:800;color:#fff;
  font-family:"PingFang SC","Hiragino Sans GB",sans-serif;
  flex-shrink:0;
  box-shadow:0 4px 10px rgba(217,114,63,0.25);
  position:relative;
  z-index:1;
}
.me-profile{
  flex:1;min-width:0;
  position:relative;
  z-index:1;
}
.me-name-row{
  display:flex;align-items:center;gap:6px;flex-wrap:wrap;
}
.me-name{
  font-size:18px;font-weight:800;color:var(--navy);
  letter-spacing:.3px;
  line-height:1.25;
  cursor:text;
  padding:2px 4px;
  border-radius:6px;
  max-width:200px;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
  transition:background .15s ease;
}
.me-name:hover{background:rgba(255,255,255,0.5);}
.me-name-edit{
  font-size:14px;
  border:1.4px solid var(--terra);
  border-radius:6px;
  padding:3px 8px;
  outline:none;
  font-family:inherit;
  font-weight:700;
  color:var(--navy);
  background:#fff;
  width:180px;
  max-width:100%;
}
.me-edit-hint{
  display:inline-flex;
  align-items:center;gap:2px;
  font-size:10px;color:var(--muted);
  margin-top:4px;
  font-weight:600;
}
.me-edit-hint svg{
  width:10px;height:10px;stroke:var(--muted);fill:none;stroke-width:2;
}
.me-bio{
  font-size:11.5px;
  color:var(--muted);
  margin-top:5px;
  line-height:1.4;
  letter-spacing:.2px;
}

/* ---------- Stats row (4 boxes) ---------- */
.me-stats{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
  margin-bottom:18px;
}
.me-stat{
  background:#fff;
  border-radius:12px;
  padding:10px 4px 9px;
  text-align:center;
  box-shadow:0 3px 10px rgba(27,42,65,0.05);
  border:1px solid transparent;
  transition:transform .15s ease, border-color .15s ease;
}
.me-stat:active{
  transform:scale(.97);
  border-color:var(--line);
}
.me-stat .num{
  font-size:16px;
  font-weight:800;
  color:var(--navy);
  line-height:1.2;
  letter-spacing:.3px;
}
.me-stat .num.terra{color:var(--terra);}
.me-stat .num.green{color:var(--green);}
.me-stat .num.gold{color:#9C7A1A;}
.me-stat .lbl{
  font-size:10px;
  color:var(--muted);
  margin-top:3px;
  font-weight:600;
  letter-spacing:.5px;
}

/* ---------- Section label (re-uses prototype pattern) ---------- */
.me-section{
  font-size:12.5px;
  font-weight:800;
  color:var(--navy);
  margin:14px 0 10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.me-section small{
  font-size:10px;
  color:var(--muted);
  font-weight:600;
}
.me-section small a{
  color:var(--muted);
  text-decoration:none;
  cursor:pointer;
}
.me-section small a:hover{color:var(--terra);}

/* ---------- 8-grid media library ---------- */
.me-media{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:6px;
  margin-bottom:14px;
}
.me-media-tile{
  position:relative;
  aspect-ratio:1;
  border-radius:10px;
  overflow:hidden;
  display:flex;
  align-items:center;justify-content:center;
  font-size:26px;
  cursor:pointer;
  box-shadow:0 2px 6px rgba(27,42,65,0.08);
  transition:transform .15s ease;
  -webkit-tap-highlight-color:transparent;
  text-decoration:none;
}
.me-media-tile:active{transform:scale(.94);}
.me-media-tile::after{
  content:"";
  position:absolute;inset:0;
  background:linear-gradient(180deg,transparent 55%,rgba(0,0,0,0.32));
  pointer-events:none;
}
.me-media-tile .emoji{
  position:relative;
  z-index:1;
  filter:drop-shadow(0 2px 4px rgba(0,0,0,0.25));
}

/* ---------- 4 menu rows ---------- */
.me-menus{
  display:flex;
  flex-direction:column;
  gap:8px;
  margin-bottom:18px;
}
.me-menu-row{
  display:flex;
  align-items:center;
  gap:12px;
  background:#fff;
  border-radius:14px;
  padding:13px 14px;
  text-decoration:none;
  color:inherit;
  cursor:pointer;
  box-shadow:0 3px 10px rgba(27,42,65,0.05);
  transition:transform .15s ease, box-shadow .15s ease;
  -webkit-tap-highlight-color:transparent;
}
.me-menu-row:active{
  transform:scale(.99);
  box-shadow:0 2px 6px rgba(27,42,65,0.08);
}
.me-menu-icon{
  width:34px;height:34px;
  border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;
  flex-shrink:0;
}
.me-menu-icon.terra{background:#FBE9DF;color:var(--terra);}
.me-menu-icon.green{background:#E5EFE6;color:var(--green);}
.me-menu-icon.gold{background:#FAEFCF;color:#9C7A1A;}
.me-menu-icon.navy{background:#E2E8EF;color:var(--navy);}
.me-menu-body{flex:1;min-width:0;}
.me-menu-t{
  font-size:13px;
  font-weight:700;
  color:var(--ink);
  line-height:1.3;
}
.me-menu-m{
  font-size:10.5px;
  color:var(--muted);
  margin-top:2px;
  line-height:1.4;
}
.me-menu-arrow{
  width:18px;height:18px;
  color:var(--muted);
  flex-shrink:0;
  font-size:14px;
  font-weight:700;
}
.me-menu-badge{
  background:var(--terra);
  color:#fff;
  font-size:9px;
  font-weight:800;
  padding:3px 7px;
  border-radius:10px;
  margin-right:4px;
  flex-shrink:0;
}

/* ---------- Bottom actions ---------- */
.me-foot{
  display:flex;
  gap:8px;
  margin-top:8px;
  padding-top:14px;
  border-top:1px dashed var(--line);
}
.me-foot a{
  flex:1;
  text-align:center;
  padding:11px 0;
  border-radius:12px;
  font-size:12.5px;
  font-weight:700;
  text-decoration:none;
  cursor:pointer;
  transition:transform .15s ease, background .15s ease;
  -webkit-tap-highlight-color:transparent;
}
.me-foot a:active{transform:scale(.98);}
.me-foot .me-set{
  background:#fff;
  color:var(--navy);
  border:1.2px solid var(--line);
}
.me-foot .me-set:hover{border-color:var(--navy);}
.me-foot .me-logout{
  background:#fff;
  color:#c4302b;
  border:1.2px solid #F2D8D6;
}
.me-foot .me-logout:hover{background:#FFF5F4;}

/* ---------- Reduce motion ---------- */
@media (prefers-reduced-motion: reduce){
  .me-stat,.me-media-tile,.me-menu-row,.me-foot a{transition:none;}
}

<script>
(function () {
  'use strict';

  // ─── Default state (will be migrated / extended by L2/L3 loops) ──────────
  var DEFAULT_STATE = {
    _v: 1,
    trip: {
      currentId: null,
      drafts: {},         // id -> { title, days, createdAt }
      history: []         // [id, ...] most-recent first
    },
    media: {
      items: {},          // id -> { type: 'photo'|'voice', dataUrl, ts, lat, lng }
      byTrip: {}           // tripId -> [mediaId, ...]
    },
    routes: {
      list: {},           // id -> { title, days, km, style }
      byTrip: {}          // tripId -> routeId
    },
    profile: {
      name: '旅人',
      avatar: null,
      plan: 'free',
      stats: { trips: 0, km: 0, routes: 0 }
    }
  };
  var STORAGE_KEY = 'gotrace_state_v1';

  // ─── Load with auto-migration ────────────────────────────────────────────
  function loadState() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return deepClone(DEFAULT_STATE);
      var saved = JSON.parse(raw);
      var base = deepClone(DEFAULT_STATE);
      // shallow merge top-level
      for (var k in saved) { if (Object.prototype.hasOwnProperty.call(saved, k)) base[k] = saved[k]; }
      // schema migrations
      if (saved && saved._v === undefined) { base._v = 1; }
      if (saved && saved.trip && Array.isArray(saved.trip.history) === false) { base.trip.history = []; }
      return base;
    } catch (e) {
      console.warn('[gotrace] loadState failed, using defaults', e);
      return deepClone(DEFAULT_STATE);
    }
  }

  function deepClone(o) {
    if (typeof structuredClone === 'function') return structuredClone(o);
    return JSON.parse(JSON.stringify(o));
  }

  function saveState() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(_state));
    } catch (e) {
      console.warn('[gotrace] saveState failed', e);
    }
  }

  // ─── State Proxy ─────────────────────────────────────────────────────────
  var _state = loadState();

  function getPath(path) {
    var parts = path.split('.');
    var cur = _state;
    for (var i = 0; i < parts.length; i++) {
      if (cur == null) return undefined;
      cur = cur[parts[i]];
    }
    return cur;
  }

  function setPath(path, value) {
    var parts = path.split('.');
    var cur = _state;
    for (var i = 0; i < parts.length - 1; i++) {
      if (cur[parts[i]] == null) cur[parts[i]] = {};
      cur = cur[parts[i]];
    }
    cur[parts[parts.length - 1]] = value;
  }

  var state = new Proxy({}, {
    get: function (_, key) {
      if (typeof key !== 'string') return undefined;
      if (key.indexOf('.') !== -1) return getPath(key);
      return _state[key];
    },
    set: function (_, key, value) {
      if (typeof key !== 'string') return true;
      if (key.indexOf('.') !== -1) { setPath(key, value); return true; }
      _state[key] = value;
      return true;
    }
  });

  // ─── Hash routing with ? query support ───────────────────────────────────
  var TABS = ['home', 'plan', 'trip', 'book', 'me'];
  var TAB_LABELS = { home: '首页', plan: '规划', trip: '行程', book: '路书', me: '我的' };

  function parseHash() {
    var raw = (location.hash || '#home').slice(1);
    var qIdx = raw.indexOf('?');
    var hash = qIdx === -1 ? raw : raw.slice(0, qIdx);
    var qs = qIdx === -1 ? '' : raw.slice(qIdx + 1);
    var params = {};
    if (qs) {
      qs.split('&').forEach(function (kv) {
        if (!kv) return;
        var eq = kv.indexOf('=');
        var k = eq === -1 ? kv : kv.slice(0, eq);
        var v = eq === -1 ? '' : kv.slice(eq + 1);
        try { params[decodeURIComponent(k)] = decodeURIComponent(v); }
        catch (e) { params[k] = v; }
      });
    }
    if (TABS.indexOf(hash) === -1) hash = 'home';
    return { hash: hash, params: params };
  }

  function activeTab() {
    var p = parseHash();
    // map aliases: "book" = 路书, query tripId allowed
    return p.hash;
  }

  // ─── View functions (placeholders only — L2/L3 fill real content) ────────

  function viewPlan(p) {
    return ''
      + '<section class="view view-plan" data-tab="plan">'
      + '  <header class="view-head"><h1 class="view-title">规划</h1>'
      + '    <p class="view-sub">AI 智能规划师</p></header>'
      + '  <div class="placeholder">L1 skeleton · 规划 · 待 L2 填充'
      + (p.params.tripId ? ' · tripId=' + escapeHtml(p.params.tripId) : '')
      + '</div>'

  }

  function viewTrip(p) {
    return ''
      + '<section class="view view-trip" data-tab="trip">'
      + '  <header class="view-head"><h1 class="view-title">行程</h1>'
      + '    <p class="view-sub">实时轨迹 · 当日时间轴</p></header>'
      + '  <div class="placeholder">L1 skeleton · 行程 · 待 L3 填充'
      + (p.params.day != null ? ' · day=' + escapeHtml(p.params.day) : '')
      + '</div>'
      + '</section>';
  }

  function viewBook(p) {
    return ''
      + '<section class="view view-book" data-tab="book">'
      + '  <header class="view-head"><h1 class="view-title">路书</h1>'
      + '    <p class="view-sub">智能路书生成 · 多风格模板</p></header>'
      + '  <div class="placeholder">L1 skeleton · 路书 · 待 L3 填充'
      + (p.params.tripId ? ' · tripId=' + escapeHtml(p.params.tripId) : '')
      + '</div>'
      + '</section>';
  }


  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, function (c) {
      return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c];
    });
  }

  // ─── Render ──────────────────────────────────────────────────────────────
  function render() {
    var boot = document.getElementById('boot-loading');
    if (boot) boot.style.display = 'none';

    var main = document.getElementById('main-content');
    if (!main) return;
    var p = parseHash();
    var html = '';
    if (p.hash === 'home') html = viewHome(p);
    else if (p.hash === 'plan') html = viewPlan(p);
    else if (p.hash === 'trip') html = viewTrip(p);
    else if (p.hash === 'book') html = viewBook(p);
    else if (p.hash === 'me') html = viewMe(p);
    else html = viewHome(p);

    main.innerHTML = html;

    // Update tab nav active state
    var links = document.querySelectorAll('.tabbar a');
    for (var i = 0; i < links.length; i++) {
      var linkHash = links[i].getAttribute('data-tab');
      links[i].classList.toggle('active', linkHash === p.hash);
      links[i].setAttribute('aria-current', linkHash === p.hash ? 'page' : 'false');
    }

    // Update document title
    document.title = TAB_LABELS[p.hash] + ' · 驾迹 GoTrace';

    // Scroll to top on tab switch
    window.scrollTo(0, 0);
  }

  window.addEventListener('hashchange', render);

  // ─── PWA Service Worker (Blob URL) ───────────────────────────────────────

    var swCode = [
      "var CACHE='gotrace-v0.1';",
      "var ASSETS=['./'];",
      "self.addEventListener('install',function(e){",

      "  self.skipWaiting();",

      "self.addEventListener('activate',function(e){",
      "  e.waitUntil(caches.keys().then(function(keys){",
      "    return Promise.all(keys.filter(function(k){return k!==CACHE;}).map(function(k){return caches.delete(k);}));",
      "  }));",
      "  self.clients.claim();",
      "});",
      "self.addEventListener('fetch',function(e){",
      "  if(e.request.method!=='GET') return;",
      "  e.respondWith(",
      "    caches.match(e.request).then(function(r){",
      "      return r || fetch(e.request).then(function(resp){",
      "        if(resp && resp.status===200){",
      "          var copy=resp.clone();",
      "          caches.open(CACHE).then(function(c){return c.put(e.request,copy).catch(function(){});});",
      "        }",
      "        return resp;",
      "      }).catch(function(){return caches.match('./');})",
      "    })",
      "  );",
      "});"
    ].join('\n');

    try {
      var swBlob = new Blob([swCode], { type: 'application/javascript' });
      var swUrl = URL.createObjectURL(swBlob);
      navigator.serviceWorker.register(swUrl).then(function (reg) {
        console.log('[gotrace] SW registered, scope=', reg.scope);
      }).catch(function (err) {
        console.warn('[gotrace] SW registration failed:', err);
      });
    } catch (e) {
      console.warn('[gotrace] SW setup error:', e);
    }
  }

  // ─── Boot ────────────────────────────────────────────────────────────────
  window._state = _state;
  window.state = state;
  window.GT = { render: render, save: saveState, tabs: TABS, labels: TAB_LABELS };

  // Ensure default hash

  // First render after DOM ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', render);
  } else {
    render();
  }
})();

}

/* Read state.profile with safe defaults — never throws if state.profile is undefined */
function _meProfile(){
  try {
    var p = (window.state && window.state.profile) || {};
    return {
      nickname:     (p.nickname     != null && p.nickname     !== '') ? p.nickname     : 'GoTrace 用户',
      avatarLetter: (p.avatarLetter != null && p.avatarLetter !== '') ? p.avatarLetter : '驾',
      bio:          (p.bio          != null && p.bio          !== '') ? p.bio          : '记录每一次出发 · 拍成片 · 留路书',
      routes:    (typeof p.routes    === 'number') ? p.routes    : 12,
      media:     (typeof p.media     === 'number') ? p.media     : 86,
      books:     (typeof p.books     === 'number') ? p.books     : 8,
      followers: (typeof p.followers === 'number') ? p.followers : 1200
    };
  } catch (e) {
    return { nickname:'GoTrace 用户', avatarLetter:'驾', bio:'记录每一次出发 · 拍成片 · 留路书',
             routes:12, media:86, books:8, followers:1200 };
  }
}

/* Format followers: 1200 → "1.2k", 3480 → "3.5k" */
function _meFmtFollowers(n){
  if (n >= 10000) return (n / 10000).toFixed(1).replace(/\.0$/,'') + 'w';
  if (n >= 1000)  return (n / 1000).toFixed(1).replace(/\.0$/,'')  + 'k';
  return String(n);
}

/* ---------- Edit nickname: in-place swap <span> → <input> ----------
 * Bound by onclick="meBeginEditNickname(event)" on the rendered <span>.
 * On blur → meCommitNickname() → updates state.profile.nickname + saves
 *          + triggers global re-render (if GT.render exists in skeleton).
 * Uses event delegation on the input so blur fires after the swap.
 */
function meBeginEditNickname(ev){
  try { ev && ev.stopPropagation && ev.stopPropagation(); } catch(_){ }
  var span = document.getElementById('me-name-span');
  if (!span) return;
  var input = document.getElementById('me-name-input');
  if (!input) return;
  span.style.display = 'none';
  input.style.display = 'inline-block';
  // focus + select all
  try { input.focus(); input.setSelectionRange(0, input.value.length); }
  catch(_){ input.focus(); }
}

function meCommitNickname(ev){
  var span = document.getElementById('me-name-span');
  var input = document.getElementById('me-name-input');
  if (!span || !input) return;
  var raw = (input.value || '').trim();
  // Reject empty → snap back to previous value
  var prof = _meProfile();
  var next = raw || prof.nickname;
  // Persist to state via Proxy (window.state provided by skeleton)
  try {
    if (window.state && typeof window.state.profile === 'object') {
      window.state.profile.nickname = next;
    } else if (window.state) {
      // Fallback: set via profile path through skeleton's proxy
      try { window.state['profile.nickname'] = next; } catch(_){}
    }
  } catch(e){ console.warn('[me] nickname save failed', e); }
  // Persist to localStorage
  try {
    if (typeof window.saveState === 'function') window.saveState();
    else if (window._state) localStorage.setItem('gotrace_state_v1', JSON.stringify(window._state));
  } catch(e){ console.warn('[me] saveState failed', e); }
  // Trigger skeleton re-render if exposed, else manually swap DOM back
  if (window.GT && typeof window.GT.render === 'function') {
    window.GT.render();
  } else {
    input.style.display = 'none';
    span.style.display  = 'inline-block';
    span.textContent    = next;
  }
}
