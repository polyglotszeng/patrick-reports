<style>
/* home-specific CSS — prefixed .home- to avoid collision with skeleton/viewMe */
/* Re-uses design tokens from prototype:
   --navy:#1B2A41; --navy-dk:#13202F; --terra:#D9723F; --gold:#E3B23C;
   --cream:#F6F3EC; --ink:#27221B; --muted:#8A8272; --line:#E7E1D4; --green:#3E7A4C
*/

.home-wrap{
  display:block;
  width:100%;
}

/* ---------- Hero greeting ---------- */
.home-hero{
  margin:6px 0 16px;
  padding:0;
}
.home-hero .greet{
  font-size:22px;
  font-weight:800;
  color:var(--navy);
  letter-spacing:.3px;
  margin:2px 0 4px;
  line-height:1.25;
}
.home-hero .greet .wave{
  display:inline-block;
  transform-origin:70% 70%;
  animation:home-wave 2.4s ease-in-out infinite;
}
@keyframes home-wave{
  0%,100%{transform:rotate(0);}
  20%,60%{transform:rotate(-8deg);}
  40%,80%{transform:rotate(10deg);}
}
@media (prefers-reduced-motion: reduce){
  .home-hero .greet .wave{animation:none;}
}
.home-hero .sub{
  font-size:12px;
  color:var(--muted);
  margin:0;
  line-height:1.5;
}
.home-hero .sub b{
  color:var(--terra);
  font-weight:700;
}

/* ---------- AI banner (entry to plan) ---------- */
.home-banner{
  position:relative;
  background:linear-gradient(135deg,var(--navy),#2C4363);
  border-radius:18px;
  padding:16px 18px;
  color:#fff;
  margin-bottom:18px;
  overflow:hidden;
  display:block;
  text-decoration:none;
  cursor:pointer;
  transition:transform .15s ease;
}
.home-banner:hover{transform:translateY(-1px);}
.home-banner::after{
  content:"";
  position:absolute;
  right:-32px;top:-32px;
  width:130px;height:130px;
  border-radius:50%;
  background:rgba(227,178,60,0.16);
}
.home-banner .k{
  font-size:10.5px;
  letter-spacing:1px;
  color:var(--gold);
  font-weight:700;
  position:relative;
}
.home-banner .t{
  font-size:16px;
  font-weight:800;
  margin:6px 0 4px;
  position:relative;
  line-height:1.3;
}
.home-banner .p{
  font-size:11.5px;
  color:#C9D2E0;
  margin:0;
  position:relative;
  line-height:1.5;
}
.home-banner .arrow{
  position:absolute;
  right:16px;top:50%;
  transform:translateY(-50%);
  width:28px;height:28px;
  border-radius:50%;
  background:rgba(255,255,255,0.16);
  display:flex;align-items:center;justify-content:center;
}
.home-banner .arrow svg{
  width:14px;height:14px;
  stroke:#fff;fill:none;stroke-width:2.2;
  stroke-linecap:round;stroke-linejoin:round;
}

/* ---------- Section label ---------- */
.home-section{
  font-size:12.5px;
  font-weight:800;
  color:var(--navy);
  margin:16px 0 10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.home-section small{
  font-size:10px;
  color:var(--muted);
  font-weight:600;
}
.home-section small a{
  color:var(--muted);
  text-decoration:none;
}
.home-section small a:hover{color:var(--terra);}

/* ---------- Recommended trip card (with big gradient cover) ---------- */
.home-trips{
  display:flex;
  flex-direction:column;
  gap:10px;
  margin-bottom:6px;
}
.home-trip{
  display:block;
  background:#fff;
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 4px 14px rgba(27,42,65,0.06);
  text-decoration:none;
  color:inherit;
  cursor:pointer;
  transition:transform .15s ease, box-shadow .15s ease;
}
.home-trip:hover{
  transform:translateY(-1px);
  box-shadow:0 6px 18px rgba(27,42,65,0.10);
}
.home-trip .cover{
  height:96px;
  position:relative;
  display:flex;
  align-items:flex-end;
  padding:10px 12px;
  color:#fff;
  overflow:hidden;
}
.home-trip .cover::before{
  content:"";
  position:absolute;inset:0;
  background:linear-gradient(180deg,transparent 30%,rgba(0,0,0,0.32));
  pointer-events:none;
}
.home-trip .cover .badge{
  position:absolute;
  top:10px;right:10px;
  background:rgba(255,255,255,0.92);
  color:var(--navy);
  font-size:9.5px;
  font-weight:800;
  padding:4px 8px;
  border-radius:10px;
  letter-spacing:.5px;
  box-shadow:0 2px 6px rgba(0,0,0,0.15);
}
.home-trip .cover .emoji{
  position:absolute;
  top:10px;left:12px;
  font-size:22px;
  filter:drop-shadow(0 2px 4px rgba(0,0,0,0.35));
}
.home-trip .cover .cover-title{
  position:relative;
  font-size:13px;
  font-weight:800;
  line-height:1.3;
  text-shadow:0 1px 3px rgba(0,0,0,0.4);
}
.home-trip .body{
  padding:11px 13px 12px;
}
.home-trip .meta{
  display:flex;
  align-items:center;
  gap:10px;
  font-size:10.5px;
  color:var(--muted);
  margin-bottom:8px;
  flex-wrap:wrap;
}
.home-trip .meta .km{
  font-size:13px;
  font-weight:800;
  color:var(--terra);
}
.home-trip .meta .dot{
  width:3px;height:3px;
  border-radius:50%;
  background:var(--muted);
}
.home-trip .tags{
  display:flex;
  flex-wrap:wrap;
  gap:5px;
  margin-bottom:10px;
}
.home-trip .tag{
  font-size:10px;
  font-weight:700;
  color:var(--terra);
  background:#FBE9DF;
  border-radius:20px;
  padding:3px 9px;
  white-space:nowrap;
}
.home-trip .tag.green{color:var(--green);background:#E5EFE6;}
.home-trip .tag.gold{color:#9C7A1A;background:#FAEFCF;}
.home-trip .tag.navy{color:var(--navy);background:#E2E8EF;}
.home-trip .more{
  display:flex;
  align-items:center;
  justify-content:space-between;
  font-size:11.5px;
  font-weight:700;
  color:var(--navy);
  padding-top:8px;
  border-top:1px dashed var(--line);
}
.home-trip .more .arrow{
  color:var(--terra);
  transition:transform .15s ease;
}
.home-trip:hover .more .arrow{transform:translateX(2px);}

/* ---------- Inspiration chips (horizontal scroll) ---------- */
.home-inspire-row{
  position:relative;
  margin:0 -16px 6px;
  padding:0 16px;
}
.home-inspire{
  display:flex;
  gap:8px;
  overflow-x:auto;
  overflow-y:hidden;
  scroll-behavior:smooth;
  -webkit-overflow-scrolling:touch;
  padding:2px 0 6px;
  scrollbar-width:none;
}
.home-inspire::-webkit-scrollbar{display:none;}
.home-inspire .chip{
  flex-shrink:0;
  display:inline-flex;
  align-items:center;
  gap:5px;
  background:#fff;
  color:var(--navy);
  border:1.2px solid var(--line);
  border-radius:20px;
  padding:8px 14px;
  font-size:11.5px;
  font-weight:700;
  cursor:pointer;
  white-space:nowrap;
  transition:all .15s ease;
  text-decoration:none;
}
.home-inspire .chip:hover{
  border-color:var(--terra);
  color:var(--terra);
  background:#FFF7F1;
}
.home-inspire .chip.active{
  background:var(--navy);
  color:#fff;
  border-color:var(--navy);
}
.home-inspire .chip .emoji{
  font-size:13px;
  line-height:1;
}

/* ---------- Route plaza entry (large card) ---------- */
.home-plaza{
  display:block;
  position:relative;
  margin-top:18px;
  padding:18px 18px 16px;
  border-radius:18px;
  background:linear-gradient(135deg,#FFF6EC 0%,#FBE9DF 100%);
  border:1.4px solid #F2D8C4;
  text-decoration:none;
  color:inherit;
  cursor:pointer;
  overflow:hidden;
  transition:transform .15s ease, box-shadow .15s ease;
}
.home-plaza:hover{
  transform:translateY(-1px);
  box-shadow:0 8px 20px rgba(217,114,63,0.15);
}
.home-plaza::before{
  content:"";
  position:absolute;
  right:-40px;bottom:-40px;
  width:160px;height:160px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(217,114,63,0.18) 0%,transparent 70%);
  pointer-events:none;
}
.home-plaza .label{
  font-size:10.5px;
  font-weight:800;
  color:var(--terra);
  letter-spacing:1px;
  margin-bottom:4px;
  position:relative;
}
.home-plaza .stat{
  font-size:20px;
  font-weight:800;
  color:var(--navy);
  margin:0 0 4px;
  line-height:1.2;
  position:relative;
}
.home-plaza .stat .num{color:var(--terra);}
.home-plaza .desc{
  font-size:11.5px;
  color:var(--ink);
  margin:0 0 14px;
  line-height:1.5;
  position:relative;
  opacity:.78;
}
.home-plaza .cta{
  display:inline-flex;
  align-items:center;
  gap:6px;
  background:var(--terra);
  color:#fff;
  font-size:12.5px;
  font-weight:700;
  padding:10px 16px;
  border-radius:12px;
  position:relative;
  box-shadow:0 4px 10px rgba(217,114,63,0.35);
}
.home-plaza .cta svg{
  width:13px;height:13px;
  stroke:#fff;fill:none;stroke-width:2.2;
  stroke-linecap:round;stroke-linejoin:round;
}
.home-plaza .meta-row{
  display:flex;
  gap:14px;
  margin-top:14px;
  padding-top:12px;
  border-top:1px dashed #F2D8C4;
  position:relative;
}
.home-plaza .meta-row .m{
  display:flex;
  flex-direction:column;
}
.home-plaza .meta-row .m .v{
  font-size:14px;
  font-weight:800;
  color:var(--navy);
}
.home-plaza .meta-row .m .k{
  font-size:9.5px;
  color:var(--muted);
  margin-top:1px;
}
</style>
<script>
/* ================================================================
 * viewHome — 驾迹 GoTrace v0.1 首页
 * OWNER: Loop L2 (only viewHome in this file)
 * Returns HTML string; skeleton handles DOM injection + hash routing
 * No AI calls — all data is mock below
 * ================================================================ */

/* Mock recommended trips (cover = CSS gradient, NO external image URLs) */
const MOCK_TRIPS = [
  {
    id:'tibet-318',
    title:'318 川藏南线 14 日',
    days:14,
    km:2400,
    tags:['雪山','朝圣','摄影'],
    gradient:'linear-gradient(135deg,#2c3e50 0%,#4a6378 60%,#7a8ea3 100%)',
    emoji:'🏔️',
    badge:'经典',
    badgeKind:''
  },
  {
    id:'xjb-bigloop',
    title:'新疆大环线 12 日',
    days:12,
    km:3200,
    tags:['硬核','无人区','秋色'],
    gradient:'linear-gradient(135deg,#D9723F 0%,#E3B23C 100%)',
    emoji:'🏜️',
    badge:'推荐',
    badgeKind:'gold'
  },
  {
    id:'chuanxi-loop',
    title:'川西小环线 4 日',
    days:4,
    km:880,
    tags:['入门','摄影','短假'],
    gradient:'linear-gradient(135deg,#3E7A4C 0%,#7BA47E 100%)',
    emoji:'🌲',
    badge:'短假',
    badgeKind:'green'
  },
  {
    id:'hainan-loop',
    title:'海南环岛 6 日',
    days:6,
    km:1080,
    tags:['海岸','亲子','温暖'],
    gradient:'linear-gradient(135deg,#2B7BB9 0%,#5BA8D6 60%,#F6D08C 100%)',
    emoji:'🌊',
    badge:'热门',
    badgeKind:''
  }
];

/* Inspiration chips (horizontal scroll) */
const MOCK_INSPIRE = [
  { id:'xj-duku-7',     label:'新疆独库 7 日',   emoji:'🛣️', active:false },
  { id:'chuanxi-4',     label:'川西小环线 4 日', emoji:'🏔️', active:false },
  { id:'tibet-318-14',  label:'318 进藏 14 日',  emoji:'🛕', active:false },
  { id:'yunnan-yubeng', label:'云南雨崩徒步',    emoji:'🥾', active:false },
  { id:'hainan-loop-6', label:'海南环岛 6 日',   emoji:'🏖️', active:false },
  { id:'dianxi-mijing', label:'滇西秘境',         emoji:'🌫️', active:true  }
];

/* Helpers (small, self-contained — only used by viewHome) */
function _homeTagKind(tag){
  if (['摄影','朝圣','雪山'].includes(tag)) return 'navy';
  if (['硬核','无人区','入门','亲子','温暖'].includes(tag)) return 'green';
  if (['短假','热门','推荐'].includes(tag)) return 'gold';
  return '';
}
function _homeFmtKm(km){
  return km.toLocaleString('zh-CN') + ' km';
}
function _homeEsc(s){
  /* Minimal HTML escape — title/label may contain user-facing Chinese */
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

/* viewHome() — main entry point. Returns HTML string. */
function viewHome(){
  /* Hero greeting */
  const hero = `
    <section class="home-hero">
      <div class="greet">今天想去哪？<span class="wave">🌄</span></div>
      <p class="sub"><b>AI</b> 帮你规划每一条自驾路线</p>
    </section>
  `;

  /* AI banner — tap → #plan */
  const banner = `
    <a class="home-banner" href="#plan" aria-label="打开 AI 规划">
      <span class="k">AI 智能规划</span>
      <h3 class="t">说出你的自驾灵感</h3>
      <p class="p">"7 天川西环线 · 摄影向 · 预算 8000" 试试看</p>
      <span class="arrow" aria-hidden="true">
        <svg viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
      </span>
    </a>
  `;

  /* Recommended trips */
  const tripCards = MOCK_TRIPS.map(function(t){
    const tags = t.tags.map(function(tag){
      const k = _homeTagKind(tag);
      return `<span class="home-trip tag${k ? ' ' + k : ''}">${_homeEsc(tag)}</span>`;
    }).join('');
    /* distance label: trip km + days note (per spec: "5-day distance km" → show days + km) */
    return `
      <a class="home-trip" href="#trip?id=${_homeEsc(t.id)}" aria-label="${_homeEsc(t.title)}">
        <div class="cover" style="background:${t.gradient};">
          <span class="emoji" aria-hidden="true">${t.emoji}</span>
          ${t.badge ? `<span class="badge">${_homeEsc(t.badge)}</span>` : ''}
          <span class="cover-title">${_homeEsc(t.title)}</span>
        </div>
        <div class="body">
          <div class="meta">
            <span class="km">${_homeFmtKm(t.km)}</span>
            <span class="dot" aria-hidden="true"></span>
            <span>${t.days} 日 ${Math.round(t.km / t.days)} km / 日</span>
          </div>
          <div class="tags">${tags}</div>
          <div class="more">
            <span>查看详情</span>
            <span class="arrow">→</span>
          </div>
        </div>
      </a>
    `;
  }).join('');

  const tripsSection = `
    <div class="home-section">
      <span>推荐路线</span>
      <small><a href="#plaza">查看全部 ›</a></small>
    </div>
    <div class="home-trips">${tripCards}</div>
  `;

  /* Inspiration chips — horizontal scroll */
  const chips = MOCK_INSPIRE.map(function(c){
    const cls = 'chip' + (c.active ? ' active' : '');
    return `<a class="${cls}" href="#plan?topic=${_homeEsc(c.id)}" role="button">${c.emoji ? `<span class="emoji" aria-hidden="true">${c.emoji}</span>` : ''}<span>${_homeEsc(c.label)}</span></a>`;
  }).join('');
  const inspireSection = `
    <div class="home-section">
      <span>灵感话题</span>
      <small>左右滑动</small>
    </div>
    <div class="home-inspire-row">
      <div class="home-inspire" role="list">${chips}</div>
    </div>
  `;

  /* Route plaza entry */
  const plaza = `
    <a class="home-plaza" href="#plaza" aria-label="进入路线广场">
      <div class="label">路线广场 · GO TRACE PLAZA</div>
      <h3 class="stat">已有 <span class="num">1,247</span> 条路线被验证</h3>
      <p class="desc">社区车友的真实轨迹 · 路况 · 拍摄机位 · 餐饮住宿，一站直达</p>
      <span class="cta">
        进入广场
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
      </span>
      <div class="meta-row">
        <div class="m"><span class="v">3,892</span><span class="k">活跃车友</span></div>
        <div class="m"><span class="v">487</span><span class="k">本周新增</span></div>
        <div class="m"><span class="v">98.2%</span><span class="k">路线完整度</span></div>
      </div>
    </a>
  `;

  return `
    <div class="home-wrap">
      ${hero}
      ${banner}
      ${tripsSection}
      ${inspireSection}
      ${plaza}
    </div>
  `.trim();
}

/* Expose for headless test / iframe verify (matches single-file-spa §1 pattern) */
window.MOCK_TRIPS = MOCK_TRIPS;
window.MOCK_INSPIRE = MOCK_INSPIRE;
window.viewHome = viewHome;
</script>
