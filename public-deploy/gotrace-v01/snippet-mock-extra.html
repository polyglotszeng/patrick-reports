    { id:"b18", title:"独山子大峡谷一日打卡攻略", tripId:"duku-4d", style:"小红书爆款", coverGradient:"linear-gradient(135deg,#27221B,#D9723F)", pages:4, publishedTo:["小红书","抖音"], views:11200, likes:945, createdAt:"2025-07-14T13:20:00Z" },
    { id:"b19", title:"伊犁自驾防坑指南 10 条", tripId:"yili-7d", style:"硬核攻略", coverGradient:"linear-gradient(135deg,#1B2A41,#27221B)", pages:7, publishedTo:["小红书"], views:18300, likes:1287, createdAt:"2025-07-23T20:00:00Z" },
    { id:"b20", title:"巴音布鲁克九曲 18 弯机位地图", tripId:"yili-7d", style:"短视频脚本", coverGradient:"linear-gradient(135deg,#E3B23C,#D9723F)", pages:5, publishedTo:["B站","抖音"], views:54800, likes:4760, createdAt:"2025-07-25T18:45:00Z" }
  ];

  // ─── 4. viewRoutes(viewMode) — 路线广场 + 我的路书 ────────────
  // 依赖全局: _state, escapeHtml(), render() (可选)
  window.viewRoutes = function viewRoutes(viewMode, extra) {
    viewMode = viewMode || 'plaza';
    if (viewMode === 'books' || viewMode === 'mine') return renderBooksView();
    return renderPlazaView(extra);
  };

  // ─── 4a. 路线广场视图 ──────────────────────────────────────────
  function renderPlazaView(extra) {
    var R = window.MOCK_ROUTES_EXTRA;
    var page = (extra && extra.page) || R.currentPage || 1;
    var topic = (extra && extra.topic) || R.currentTopic || '全部';
    R.currentPage = page;
    R.currentTopic = topic;
    var list = R.pageData.page1;
    if (topic && topic !== '全部') {
      list = list.filter(function(r){ return r.topic === topic; });
    }

    var html = '';
    html += '<section class="view view-plaza" data-tab="plaza">';
    html += '  <div class="plaza-wrap">';
    html += '    <header class="plaza-head">';
    html += '      <h1>路线广场</h1>';
    html += '      <a class="plaza-back" href="#home">‹ 返回</a>';
    html += '    </header>';
    html += '    <p class="plaza-sub">全站 ' + R.total + ' 条精选路线 · 第 ' + page + ' / ' + R.pageCount + ' 页</p>';

    // 精选横滚
    html += '    <div class="plaza-featured">';
    for (var i = 0; i < R.featured.length; i++) {
      var f = R.featured[i];
      var fItem = findRouteById(f.id) || {};
      html += '      <a class="plaza-feat-card" href="#trip?routeId=' + escapeHtml(f.id) + '" style="background:' + escapeHtml(fItem.coverGradient || 'linear-gradient(135deg,#1B2A41,#3E7A4C)') + '">';
      html += '        <span class="ft-reason">' + escapeHtml(f.reason) + '</span>';
      html += '        <span class="ft-title">' + escapeHtml(fItem.title || f.id) + '</span>';
      html += '      </a>';
    }
    html += '    </div>';

    // 主题过滤
    html += '    <div class="plaza-filter">';
    for (var t = 0; t < R.topicFilters.length; t++) {
      var tf = R.topicFilters[t];
      var active = (tf === topic) ? ' active' : '';
      html += '      <span class="plaza-chip' + active + '" data-topic="' + escapeHtml(tf) + '">' + escapeHtml(tf) + '</span>';
    }
    html += '    </div>';

    // 列表
    if (!list.length) {
      html += '    <div class="plaza-empty">该主题暂无路线</div>';
    } else {
      html += '    <div class="plaza-grid">';
      for (var j = 0; j < list.length; j++) {
        var r = list[j];
        html += renderPlazaCard(r);
      }
      html += '    </div>';
    }

    // 分页器
    html += renderPager(page, R.pageCount, R.total, R.pageSize);

    html += '  </div>';
    html += '</section>';

    return html;
  }

  function renderPlazaCard(r) {
    var s = '';
    s += '<a class="plaza-card" href="#trip?routeId=' + escapeHtml(r.id) + '">';
    s += '  <div class="cover" style="background:' + escapeHtml(r.coverGradient) + '">';
    s += '    <span class="topic-tag">' + escapeHtml(r.topic) + '</span>';
    s += '  </div>';
    s += '  <div class="body">';
    s += '    <h4 class="title">' + escapeHtml(r.title) + '</h4>';
    s += '    <div class="meta"><b>' + r.days + '天</b> · <b>' + r.km + 'km</b> · 最高 ' + r.maxAltitude + 'm</div>';
    s += '    <div class="meta">季节 ' + escapeHtml(r.bestSeason) + ' · ' + escapeHtml(r.difficulty) + '</div>';
    s += '    <div class="stats">';
    s += '      <span class="rating">★ ' + r.rating.toFixed(1) + '</span>';
    s += '      <span class="author"><span style="display:inline-block;width:16px;height:16px;border-radius:50%;background:var(--terra);color:#fff;font-size:9px;font-weight:800;text-align:center;line-height:16px">' + escapeHtml(r.authorAvatar || '·') + '</span> ' + escapeHtml(r.author) + '</span>';
    s += '    </div>';
    s += '  </div>';
    s += '</a>';
    return s;
  }

  function renderPager(cur, total, totalItems, pageSize) {
    var s = '';
    s += '<div class="plaza-pager">';
    s += '  <button class="pg-btn" data-page="1"' + (cur <= 1 ? ' disabled' : '') + '>« 首页</button>';
    s += '  <button class="pg-btn" data-page="' + (cur - 1) + '"' + (cur <= 1 ? ' disabled' : '') + '>‹</button>';
    // 显示窗口 ±2
    var start = Math.max(1, cur - 2);
    var end = Math.min(total, cur + 2);
    if (start > 1) s += '  <span class="pg-info">…</span>';
    for (var p = start; p <= end; p++) {
      var cls = 'pg-btn' + (p === cur ? ' active' : '');
      s += '  <button class="' + cls + '" data-page="' + p + '">' + p + '</button>';
    }
    if (end < total) s += '  <span class="pg-info">…</span>';
    s += '  <button class="pg-btn" data-page="' + (cur + 1) + '"' + (cur >= total ? ' disabled' : '') + '>›</button>';
    s += '  <button class="pg-btn" data-page="' + total + '"' + (cur >= total ? ' disabled' : '') + '>末页 »</button>';
    s += '  <span class="pg-jump">跳到 <input type="number" min="1" max="' + total + '" value="' + cur + '" data-jump> 页</span>';
    s += '</div>';
    return s;
  }

  // ─── 4b. 我的路书视图 ──────────────────────────────────────────
  function renderBooksView() {
    var books = window.MOCK_BOOKS_EXTRA;
    var R = window.MOCK_ROUTES_EXTRA;
    var styles = ['全部','硬核攻略','文艺游记','小红书爆款','短视频脚本','招商合作'];
    var curStyle = '全部';

    var html = '';
    html += '<section class="view view-books" data-tab="books">';
    html += '  <div class="books-wrap">';
    html += '    <header class="books-head">';
    html += '      <h1>我的路书</h1>';
    html += '      <a class="plaza-back" href="#me">‹ 我的</a>';
    html += '    </header>';
    html += '    <p class="books-sub">已生成 ' + books.length + ' 篇路书 · 已发布至 4 个平台</p>';

    html += '    <div class="books-filter">';
    for (var i = 0; i < styles.length; i++) {
      var st = styles[i];
      var active = (st === curStyle) ? ' active' : '';
      html += '      <span class="books-chip' + active + '" data-style="' + escapeHtml(st) + '">' + escapeHtml(st) + '</span>';
    }
    html += '    </div>';

    html += '    <div class="books-grid">';
    for (var k = 0; k < books.length; k++) {
      html += renderBookCard(books[k]);
    }
    html += '    </div>';

    html += '  </div>';
    html += '</section>';
    return html;
  }

  function renderBookCard(b) {
    var s = '';
    s += '<div class="book-card">';
    s += '  <div class="cover" style="background:' + escapeHtml(b.coverGradient) + '">';
    s += '    <span class="style-tag">' + escapeHtml(b.style) + '</span>';
    s += '  </div>';
    s += '  <div class="body">';
    s += '    <h4 class="title">' + escapeHtml(b.title) + '</h4>';
    s += '    <div class="platforms">';
    for (var i = 0; i < b.publishedTo.length; i++) {
      s += '      <span class="pf-chip">' + escapeHtml(b.publishedTo[i]) + '</span>';
    }
    s += '    </div>';
    s += '    <div class="stats">';
    s += '      <span class="views"><b>' + formatCount(b.views) + '</b> 浏览</span>';
    s += '      <span><b>' + formatCount(b.likes) + '</b> 赞</span>';
    s += '      <span><b>' + b.pages + '</b> 页</span>';
    s += '    </div>';
    s += '  </div>';
    s += '</div>';
    return s;
  }

  function formatCount(n) {
    if (n >= 10000) return (n / 10000).toFixed(1) + 'w';
    if (n >= 1000) return (n / 1000).toFixed(1) + 'k';
    return String(n);
  }

  function findRouteById(id) {
    var list = window.MOCK_ROUTES_EXTRA.pageData.page1;
    for (var i = 0; i < list.length; i++) if (list[i].id === id) return list[i];
    return null;
  }

  // ─── 5. 事件代理：plaza/books 交互 ─────────────────────────────
  // 通过 window.GTR (GoTrace Routes) 暴露给主 agent 在 render() 后调用
  window.GTR = {
    // 解析 hash 参数 (?page=1&topic=长途进藏)
    parseHash: function() {
      var hash = (location.hash || '').replace(/^#/, '');
      var qIdx = hash.indexOf('?');
      var main = qIdx >= 0 ? hash.slice(0, qIdx) : hash;
      var query = {};
      if (qIdx >= 0) {
        hash.slice(qIdx + 1).split('&').forEach(function(kv){
          if (!kv) return;
          var p = kv.split('=');
          query[decodeURIComponent(p[0])] = decodeURIComponent(p[1] || '');
        });
      }
      return { tab: main, params: query };
    },
    // 渲染路线广场（绑定 hash 同步）
    showPlaza: function(page, topic) {
      if (typeof page === 'number') {
        window.MOCK_ROUTES_EXTRA.currentPage = page;
      }
      if (topic) {
        window.MOCK_ROUTES_EXTRA.currentTopic = topic;
      }
      var p = page || window.MOCK_ROUTES_EXTRA.currentPage || 1;
      var t = topic || window.MOCK_ROUTES_EXTRA.currentTopic || '全部';
      location.hash = '#plaza?page=' + p + (t !== '全部' ? '&topic=' + encodeURIComponent(t) : '');
      bindPlazaHandlers();
    },
    // 渲染路书
    showBooks: function() {
      location.hash = '#books';
      bindBooksHandlers();
    },
    // 绑定 plaza 的 chip + pager 事件（每次 render 后调用一次）
    bindAll: function() {
      bindPlazaHandlers();
      bindBooksHandlers();
    }
  };

  function bindPlazaHandlers() {
    var main = document.getElementById('main-content');
    if (!main) return;
    // topic chip
    var chips = main.querySelectorAll('.plaza-chip');
    for (var i = 0; i < chips.length; i++) {
      chips[i].onclick = function() {
        var t = this.getAttribute('data-topic') || '全部';
        window.MOCK_ROUTES_EXTRA.currentTopic = t;
        window.MOCK_ROUTES_EXTRA.currentPage = 1;
        if (typeof render === 'function') {
          var html = window.viewRoutes('plaza', { page: 1, topic: t });
          main.innerHTML = html;
          bindPlazaHandlers();
        }
      };
    }
    // pager
    var btns = main.querySelectorAll('.plaza-pager .pg-btn');
    for (var b = 0; b < btns.length; b++) {
      btns[b].onclick = function() {
        if (this.disabled) return;
        var p = parseInt(this.getAttribute('data-page'), 10);
        if (!p || p < 1) return;
        window.MOCK_ROUTES_EXTRA.currentPage = p;
        if (typeof render === 'function') {
          var html = window.viewRoutes('plaza', { page: p, topic: window.MOCK_ROUTES_EXTRA.currentTopic });
          main.innerHTML = html;
          bindPlazaHandlers();
          window.scrollTo(0, 0);
        }
      };
    }
    // jump input
    var jump = main.querySelector('.plaza-pager input[data-jump]');
    if (jump) {
      jump.onkeydown = function(e) {
        if (e.key !== 'Enter') return;
        var p = parseInt(this.value, 10);
        var max = window.MOCK_ROUTES_EXTRA.pageCount;
        if (!p || p < 1 || p > max) { this.value = window.MOCK_ROUTES_EXTRA.currentPage; return; }
        window.MOCK_ROUTES_EXTRA.currentPage = p;
        if (typeof render === 'function') {
          var html = window.viewRoutes('plaza', { page: p, topic: window.MOCK_ROUTES_EXTRA.currentTopic });
          main.innerHTML = html;
          bindPlazaHandlers();
          window.scrollTo(0, 0);
        }
      };
    }
  }

  function bindBooksHandlers() {
    var main = document.getElementById('main-content');
    if (!main) return;
    var chips = main.querySelectorAll('.books-chip');
    for (var i = 0; i < chips.length; i++) {
      chips[i].onclick = function() {
        var st = this.getAttribute('data-style') || '全部';
        // 简单过滤重渲
        var books = window.MOCK_BOOKS_EXTRA.filter(function(b){
          return st === '全部' ? true : b.style === st;
        });
        if (!books.length) {
          main.innerHTML = '<div class="books-empty">该风格暂无路书</div>';
          return;
        }
        var html = '<section class="view view-books" data-tab="books"><div class="books-wrap">';
        html += '<header class="books-head"><h1>我的路书</h1><a class="plaza-back" href="#me">‹ 我的</a></header>';
        html += '<p class="books-sub">' + books.length + ' 篇 · 风格：' + st + '</p>';
        // 过滤条
        var styles = ['全部','硬核攻略','文艺游记','小红书爆款','短视频脚本','招商合作'];
        html += '<div class="books-filter">';
        for (var s = 0; s < styles.length; s++) {
          var act = (styles[s] === st) ? ' active' : '';
          html += '<span class="books-chip' + act + '" data-style="' + styles[s] + '">' + styles[s] + '</span>';
        }
        html += '</div><div class="books-grid">';
        for (var k = 0; k < books.length; k++) {
          html += renderBookCard(books[k]);
        }
        html += '</div></div></section>';
        main.innerHTML = html;
        bindBooksHandlers();
      };
    }
  }

  // 暴露给主 agent 调试
  window.MOCK_DEEP_LOADED = true;

})();
</script>
