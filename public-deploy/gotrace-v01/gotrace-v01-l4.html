<style>
:root{
  --navy:#1B2A41;
  --navy-dk:#13202F;
  --terra:#D9723F;
  --gold:#E3B23C;
  --cream:#F6F3EC;
  --ink:#27221B;
  --muted:#8A8272;
  --line:#E7E1D4;
  --green:#3E7A4C;
  --bar-h:60px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
html,body{height:100%;}
body{
  font-family:"PingFang SC","Hiragino Sans GB","Microsoft YaHei","Helvetica Neue",Arial,sans-serif;
  background:var(--cream);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
  -webkit-tap-highlight-color:transparent;
  overscroll-behavior-y:contain;
  padding-top:env(safe-area-inset-top,0);
  padding-bottom:env(safe-area-inset-bottom,0);
  padding-left:env(safe-area-inset-left,0);
  padding-right:env(safe-area-inset-right,0);
}

/* Boot loader — visible until first render */
#boot-loading{
  position:fixed;inset:0;
  background:var(--navy);
  color:#fff;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  z-index:9999;
  font-size:14px;letter-spacing:1px;
}
#boot-loading .mark{
  width:54px;height:54px;border-radius:50%;
  background:linear-gradient(135deg,var(--terra),var(--gold));
  margin-bottom:18px;
  box-shadow:0 8px 24px rgba(217,114,63,0.4);
  animation:pulse 1.4s ease-in-out infinite;
}
@keyframes pulse{
  0%,100%{transform:scale(1);opacity:1;}
  50%{transform:scale(0.85);opacity:0.7;}
}

/* App shell */
.app{
  max-width:560px;
  margin:0 auto;
  min-height:100vh;
  background:var(--cream);
  position:relative;
  display:flex;flex-direction:column;
}

/* Status bar mock (visible in browser; ignored in real PWA) */
.statusbar{
  height:24px;display:flex;align-items:center;justify-content:space-between;
  padding:0 18px;font-size:11px;font-weight:700;color:var(--ink);
  background:var(--cream);flex-shrink:0;
}
.statusbar .dot{width:5px;height:5px;border-radius:50%;background:var(--ink);margin-left:3px;}

/* View area */
#main-content{
  flex:1;padding:8px 16px calc(var(--bar-h) + env(safe-area-inset-bottom,0px) + 16px);
  overflow-y:auto;
}
.view{animation:fadeIn .18s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}

.view-head{padding:8px 0 14px;}
.view-title{
  font-size:22px;font-weight:800;color:var(--navy);
  margin:0;letter-spacing:0.5px;
}
.view-sub{font-size:12px;color:var(--muted);margin:4px 0 0;}

.placeholder{
  background:#fff;border:1px dashed var(--line);
  border-radius:14px;padding:24px 16px;
  color:var(--muted);font-size:12.5px;text-align:center;
  margin-top:10px;
}

/* Bottom tab bar */
.tabbar{
  position:fixed;left:0;right:0;bottom:0;
  height:calc(var(--bar-h) + env(safe-area-inset-bottom,0px));
  padding-bottom:env(safe-area-inset-bottom,0px);
  background:rgba(246,243,236,0.94);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  border-top:1px solid var(--line);
  display:flex;justify-content:space-around;align-items:flex-start;
  z-index:50;
}
.tabbar a{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;padding-top:8px;
  text-decoration:none;color:var(--muted);
  font-size:11px;font-weight:700;
  height:100%;
}
.tabbar a svg{
  width:22px;height:22px;
  stroke:var(--muted);fill:none;stroke-width:1.8;
  stroke-linecap:round;stroke-linejoin:round;
  transition:.15s;
}
.tabbar a.active{color:var(--terra);}
.tabbar a.active svg{stroke:var(--terra);fill:rgba(217,114,63,0.08);}
.tabbar a:active{opacity:0.6;}

/* Reduce motion */
@media (prefers-reduced-motion: reduce){
  .view,#boot-loading .mark{animation:none;}
}

/* ─── L2 home-specific CSS ─── */

/* home-specific CSS — prefixed .home- to avoid collision with skeleton/viewMe */
/* Re-uses design tokens from prototype:
   --navy:#1B2A41; --navy-dk:#13202F; --terra:#D9723F; --gold:#E3B23C;
   --cream:#F6F3EC; --ink:#27221B; --muted:#8A8272; --line:#E7E1D4; --green:#3E7A4C
*/

.home-wrap{
  display:block;
  width:100%;
}

/* ---------- Hero greeting ---------- */
.home-hero{
  margin:6px 0 16px;
  padding:0;
}
.home-hero .greet{
  font-size:22px;
  font-weight:800;
  color:var(--navy);
  letter-spacing:.3px;
  margin:2px 0 4px;
  line-height:1.25;
}
.home-hero .greet .wave{
  display:inline-block;
  transform-origin:70% 70%;
  animation:home-wave 2.4s ease-in-out infinite;
}
@keyframes home-wave{
  0%,100%{transform:rotate(0);}
  20%,60%{transform:rotate(-8deg);}
  40%,80%{transform:rotate(10deg);}
}
@media (prefers-reduced-motion: reduce){
  .home-hero .greet .wave{animation:none;}
}
.home-hero .sub{
  font-size:12px;
  color:var(--muted);
  margin:0;
  line-height:1.5;
}
.home-hero .sub b{
  color:var(--terra);
  font-weight:700;
}

/* ---------- AI banner (entry to plan) ---------- */
.home-banner{
  position:relative;
  background:linear-gradient(135deg,var(--navy),#2C4363);
  border-radius:18px;
  padding:16px 18px;
  color:#fff;
  margin-bottom:18px;
  overflow:hidden;
  display:block;
  text-decoration:none;
  cursor:pointer;
  transition:transform .15s ease;
}
.home-banner:hover{transform:translateY(-1px);}
.home-banner::after{
  content:"";
  position:absolute;
  right:-32px;top:-32px;
  width:130px;height:130px;
  border-radius:50%;
  background:rgba(227,178,60,0.16);
}
.home-banner .k{
  font-size:10.5px;
  letter-spacing:1px;
  color:var(--gold);
  font-weight:700;
  position:relative;
}
.home-banner .t{
  font-size:16px;
  font-weight:800;
  margin:6px 0 4px;
  position:relative;
  line-height:1.3;
}
.home-banner .p{
  font-size:11.5px;
  color:#C9D2E0;
  margin:0;
  position:relative;
  line-height:1.5;
}
.home-banner .arrow{
  position:absolute;
  right:16px;top:50%;
  transform:translateY(-50%);
  width:28px;height:28px;
  border-radius:50%;
  background:rgba(255,255,255,0.16);
  display:flex;align-items:center;justify-content:center;
}
.home-banner .arrow svg{
  width:14px;height:14px;
  stroke:#fff;fill:none;stroke-width:2.2;
  stroke-linecap:round;stroke-linejoin:round;
}

/* ---------- Section label ---------- */
.home-section{
  font-size:12.5px;
  font-weight:800;
  color:var(--navy);
  margin:16px 0 10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.home-section small{
  font-size:10px;
  color:var(--muted);
  font-weight:600;
}
.home-section small a{
  color:var(--muted);
  text-decoration:none;
}
.home-section small a:hover{color:var(--terra);}

/* ---------- Recommended trip card (with big gradient cover) ---------- */
.home-trips{
  display:flex;
  flex-direction:column;
  gap:10px;
  margin-bottom:6px;
}
.home-trip{
  display:block;
  background:#fff;
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 4px 14px rgba(27,42,65,0.06);
  text-decoration:none;
  color:inherit;
  cursor:pointer;
  transition:transform .15s ease, box-shadow .15s ease;
}
.home-trip:hover{
  transform:translateY(-1px);
  box-shadow:0 6px 18px rgba(27,42,65,0.10);
}
.home-trip .cover{
  height:96px;
  position:relative;
  display:flex;
  align-items:flex-end;
  padding:10px 12px;
  color:#fff;
  overflow:hidden;
}
.home-trip .cover::before{
  content:"";
  position:absolute;inset:0;
  background:linear-gradient(180deg,transparent 30%,rgba(0,0,0,0.32));
  pointer-events:none;
}
.home-trip .cover .badge{
  position:absolute;
  top:10px;right:10px;
  background:rgba(255,255,255,0.92);
  color:var(--navy);
  font-size:9.5px;
  font-weight:800;
  padding:4px 8px;
  border-radius:10px;
  letter-spacing:.5px;
  box-shadow:0 2px 6px rgba(0,0,0,0.15);
}
.home-trip .cover .emoji{
  position:absolute;
  top:10px;left:12px;
  font-size:22px;
  filter:drop-shadow(0 2px 4px rgba(0,0,0,0.35));
}
.home-trip .cover .cover-title{
  position:relative;
  font-size:13px;
  font-weight:800;
  line-height:1.3;
  text-shadow:0 1px 3px rgba(0,0,0,0.4);
}
.home-trip .body{
  padding:11px 13px 12px;
}
.home-trip .meta{
  display:flex;
  align-items:center;
  gap:10px;
  font-size:10.5px;
  color:var(--muted);
  margin-bottom:8px;
  flex-wrap:wrap;
}
.home-trip .meta .km{
  font-size:13px;
  font-weight:800;
  color:var(--terra);
}
.home-trip .meta .dot{
  width:3px;height:3px;
  border-radius:50%;
  background:var(--muted);
}
.home-trip .tags{
  display:flex;
  flex-wrap:wrap;
  gap:5px;
  margin-bottom:10px;
}
.home-trip .tag{
  font-size:10px;
  font-weight:700;
  color:var(--terra);
  background:#FBE9DF;
  border-radius:20px;
  padding:3px 9px;
  white-space:nowrap;
}
.home-trip .tag.green{color:var(--green);background:#E5EFE6;}
.home-trip .tag.gold{color:#9C7A1A;background:#FAEFCF;}
.home-trip .tag.navy{color:var(--navy);background:#E2E8EF;}
.home-trip .more{
  display:flex;
  align-items:center;
  justify-content:space-between;
  font-size:11.5px;
  font-weight:700;
  color:var(--navy);
  padding-top:8px;
  border-top:1px dashed var(--line);
}
.home-trip .more .arrow{
  color:var(--terra);
  transition:transform .15s ease;
}
.home-trip:hover .more .arrow{transform:translateX(2px);}

/* ---------- Inspiration chips (horizontal scroll) ---------- */
.home-inspire-row{
  position:relative;
  margin:0 -16px 6px;
  padding:0 16px;
}
.home-inspire{
  display:flex;
  gap:8px;
  overflow-x:auto;
  overflow-y:hidden;
  scroll-behavior:smooth;
  -webkit-overflow-scrolling:touch;
  padding:2px 0 6px;
  scrollbar-width:none;
}
.home-inspire::-webkit-scrollbar{display:none;}
.home-inspire .chip{
  flex-shrink:0;
  display:inline-flex;
  align-items:center;
  gap:5px;
  background:#fff;
  color:var(--navy);
  border:1.2px solid var(--line);
  border-radius:20px;
  padding:8px 14px;
  font-size:11.5px;
  font-weight:700;
  cursor:pointer;
  white-space:nowrap;
  transition:all .15s ease;
  text-decoration:none;
}
.home-inspire .chip:hover{
  border-color:var(--terra);
  color:var(--terra);
  background:#FFF7F1;
}
.home-inspire .chip.active{
  background:var(--navy);
  color:#fff;
  border-color:var(--navy);
}
.home-inspire .chip .emoji{
  font-size:13px;
  line-height:1;
}

/* ---------- Route plaza entry (large card) ---------- */
.home-plaza{
  display:block;
  position:relative;
  margin-top:18px;
  padding:18px 18px 16px;
  border-radius:18px;
  background:linear-gradient(135deg,#FFF6EC 0%,#FBE9DF 100%);
  border:1.4px solid #F2D8C4;
  text-decoration:none;
  color:inherit;
  cursor:pointer;
  overflow:hidden;
  transition:transform .15s ease, box-shadow .15s ease;
}
.home-plaza:hover{
  transform:translateY(-1px);
  box-shadow:0 8px 20px rgba(217,114,63,0.15);
}
.home-plaza::before{
  content:"";
  position:absolute;
  right:-40px;bottom:-40px;
  width:160px;height:160px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(217,114,63,0.18) 0%,transparent 70%);
  pointer-events:none;
}
.home-plaza .label{
  font-size:10.5px;
  font-weight:800;
  color:var(--terra);
  letter-spacing:1px;
  margin-bottom:4px;
  position:relative;
}
.home-plaza .stat{
  font-size:20px;
  font-weight:800;
  color:var(--navy);
  margin:0 0 4px;
  line-height:1.2;
  position:relative;
}
.home-plaza .stat .num{color:var(--terra);}
.home-plaza .desc{
  font-size:11.5px;
  color:var(--ink);
  margin:0 0 14px;
  line-height:1.5;
  position:relative;
  opacity:.78;
}
.home-plaza .cta{
  display:inline-flex;
  align-items:center;
  gap:6px;
  background:var(--terra);
  color:#fff;
  font-size:12.5px;
  font-weight:700;
  padding:10px 16px;
  border-radius:12px;
  position:relative;
  box-shadow:0 4px 10px rgba(217,114,63,0.35);
}
.home-plaza .cta svg{
  width:13px;height:13px;
  stroke:#fff;fill:none;stroke-width:2.2;
  stroke-linecap:round;stroke-linejoin:round;
}
.home-plaza .meta-row{
  display:flex;
  gap:14px;
  margin-top:14px;
  padding-top:12px;
  border-top:1px dashed #F2D8C4;
  position:relative;
}
.home-plaza .meta-row .m{
  display:flex;
  flex-direction:column;
}
.home-plaza .meta-row .m .v{
  font-size:14px;
  font-weight:800;
  color:var(--navy);
}
.home-plaza .meta-row .m .k{
  font-size:9.5px;
  color:var(--muted);
  margin-top:1px;
}

/* ─── L3 me-specific CSS ─── */

/* me-specific CSS — prefixed .me- to avoid collision with skeleton/viewHome */
/* Re-uses design tokens from prototype:
   --navy:#1B2A41; --navy-dk:#13202F; --terra:#D9723F; --gold:#E3B23C;
   --cream:#F6F3EC; --ink:#27221B; --muted:#8A8272; --line:#E7E1D4; --green:#3E7A4C
*/

.me-wrap{
  display:block;
  width:100%;
  padding-bottom:8px;
}

/* ---------- Profile header ---------- */
.me-head{
  display:flex;
  align-items:center;
  gap:14px;
  background:linear-gradient(135deg,#FFF6EC 0%,#FBE9DF 100%);
  border:1.4px solid #F2D8C4;
  border-radius:18px;
  padding:16px;
  margin:4px 0 16px;
  position:relative;
  overflow:hidden;
}
.me-head::before{
  content:"";
  position:absolute;
  right:-30px;top:-30px;
  width:100px;height:100px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(217,114,63,0.18) 0%,transparent 70%);
  pointer-events:none;
}
.me-avatar{
  width:56px;height:56px;
  border-radius:50%;
  background:linear-gradient(135deg,var(--terra) 0%,var(--gold) 100%);
  display:flex;align-items:center;justify-content:center;
  font-size:24px;font-weight:800;color:#fff;
  font-family:"PingFang SC","Hiragino Sans GB",sans-serif;
  flex-shrink:0;
  box-shadow:0 4px 10px rgba(217,114,63,0.25);
  position:relative;
  z-index:1;
}
.me-profile{
  flex:1;min-width:0;
  position:relative;
  z-index:1;
}
.me-name-row{
  display:flex;align-items:center;gap:6px;flex-wrap:wrap;
}
.me-name{
  font-size:18px;font-weight:800;color:var(--navy);
  letter-spacing:.3px;
  line-height:1.25;
  cursor:text;
  padding:2px 4px;
  border-radius:6px;
  max-width:200px;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
  transition:background .15s ease;
}
.me-name:hover{background:rgba(255,255,255,0.5);}
.me-name-edit{
  font-size:14px;
  border:1.4px solid var(--terra);
  border-radius:6px;
  padding:3px 8px;
  outline:none;
  font-family:inherit;
  font-weight:700;
  color:var(--navy);
  background:#fff;
  width:180px;
  max-width:100%;
}
.me-edit-hint{
  display:inline-flex;
  align-items:center;gap:2px;
  font-size:10px;color:var(--muted);
  margin-top:4px;
  font-weight:600;
}
.me-edit-hint svg{
  width:10px;height:10px;stroke:var(--muted);fill:none;stroke-width:2;
}
.me-bio{
  font-size:11.5px;
  color:var(--muted);
  margin-top:5px;
  line-height:1.4;
  letter-spacing:.2px;
}

/* ---------- Stats row (4 boxes) ---------- */
.me-stats{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
  margin-bottom:18px;
}
.me-stat{
  background:#fff;
  border-radius:12px;
  padding:10px 4px 9px;
  text-align:center;
  box-shadow:0 3px 10px rgba(27,42,65,0.05);
  border:1px solid transparent;
  transition:transform .15s ease, border-color .15s ease;
}
.me-stat:active{
  transform:scale(.97);
  border-color:var(--line);
}
.me-stat .num{
  font-size:16px;
  font-weight:800;
  color:var(--navy);
  line-height:1.2;
  letter-spacing:.3px;
}
.me-stat .num.terra{color:var(--terra);}
.me-stat .num.green{color:var(--green);}
.me-stat .num.gold{color:#9C7A1A;}
.me-stat .lbl{
  font-size:10px;
  color:var(--muted);
  margin-top:3px;
  font-weight:600;
  letter-spacing:.5px;
}

/* ---------- Section label (re-uses prototype pattern) ---------- */
.me-section{
  font-size:12.5px;
  font-weight:800;
  color:var(--navy);
  margin:14px 0 10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.me-section small{
  font-size:10px;
  color:var(--muted);
  font-weight:600;
}
.me-section small a{
  color:var(--muted);
  text-decoration:none;
  cursor:pointer;
}
.me-section small a:hover{color:var(--terra);}

/* ---------- 8-grid media library ---------- */
.me-media{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:6px;
  margin-bottom:14px;
}
.me-media-tile{
  position:relative;
  aspect-ratio:1;
  border-radius:10px;
  overflow:hidden;
  display:flex;
  align-items:center;justify-content:center;
  font-size:26px;
  cursor:pointer;
  box-shadow:0 2px 6px rgba(27,42,65,0.08);
  transition:transform .15s ease;
  -webkit-tap-highlight-color:transparent;
  text-decoration:none;
}
.me-media-tile:active{transform:scale(.94);}
.me-media-tile::after{
  content:"";
  position:absolute;inset:0;
  background:linear-gradient(180deg,transparent 55%,rgba(0,0,0,0.32));
  pointer-events:none;
}
.me-media-tile .emoji{
  position:relative;
  z-index:1;
  filter:drop-shadow(0 2px 4px rgba(0,0,0,0.25));
}

/* ---------- 4 menu rows ---------- */
.me-menus{
  display:flex;
  flex-direction:column;
  gap:8px;
  margin-bottom:18px;
}
.me-menu-row{
  display:flex;
  align-items:center;
  gap:12px;
  background:#fff;
  border-radius:14px;
  padding:13px 14px;
  text-decoration:none;
  color:inherit;
  cursor:pointer;
  box-shadow:0 3px 10px rgba(27,42,65,0.05);
  transition:transform .15s ease, box-shadow .15s ease;
  -webkit-tap-highlight-color:transparent;
}
.me-menu-row:active{
  transform:scale(.99);
  box-shadow:0 2px 6px rgba(27,42,65,0.08);
}
.me-menu-icon{
  width:34px;height:34px;
  border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;
  flex-shrink:0;
}
.me-menu-icon.terra{background:#FBE9DF;color:var(--terra);}
.me-menu-icon.green{background:#E5EFE6;color:var(--green);}
.me-menu-icon.gold{background:#FAEFCF;color:#9C7A1A;}
.me-menu-icon.navy{background:#E2E8EF;color:var(--navy);}
.me-menu-body{flex:1;min-width:0;}
.me-menu-t{
  font-size:13px;
  font-weight:700;
  color:var(--ink);
  line-height:1.3;
}
.me-menu-m{
  font-size:10.5px;
  color:var(--muted);
  margin-top:2px;
  line-height:1.4;
}
.me-menu-arrow{
  width:18px;height:18px;
  color:var(--muted);
  flex-shrink:0;
  font-size:14px;
  font-weight:700;
}
.me-menu-badge{
  background:var(--terra);
  color:#fff;
  font-size:9px;
  font-weight:800;
  padding:3px 7px;
  border-radius:10px;
  margin-right:4px;
  flex-shrink:0;
}

/* ---------- Bottom actions ---------- */
.me-foot{
  display:flex;
  gap:8px;
  margin-top:8px;
  padding-top:14px;
  border-top:1px dashed var(--line);
}
.me-foot a{
  flex:1;
  text-align:center;
  padding:11px 0;
  border-radius:12px;
  font-size:12.5px;
  font-weight:700;
  text-decoration:none;
  cursor:pointer;
  transition:transform .15s ease, background .15s ease;
  -webkit-tap-highlight-color:transparent;
}
.me-foot a:active{transform:scale(.98);}
.me-foot .me-set{
  background:#fff;
  color:var(--navy);
  border:1.2px solid var(--line);
}
.me-foot .me-set:hover{border-color:var(--navy);}
.me-foot .me-logout{
  background:#fff;
  color:#c4302b;
  border:1.2px solid #F2D8D6;
}
.me-foot .me-logout:hover{background:#FFF5F4;}

/* ---------- Reduce motion ---------- */
@media (prefers-reduced-motion: reduce){
  .me-stat,.me-media-tile,.me-menu-row,.me-foot a{transition:none;}
}


/* === L2 extra (plan · AI 智能规划师) === */

/* ── plan-* ─────────────────────────────────────── */
.plan-wrap{display:block;width:100%;}

/* Hero */
.plan-hero{
  display:flex;align-items:center;gap:14px;
  padding:16px 18px;
  background:linear-gradient(135deg,#1B2A41 0%,#2a3f5f 100%);
  color:#fff;border-radius:16px;
  margin:6px 0 16px;
  position:relative;overflow:hidden;
}
.plan-hero::before{
  content:"";position:absolute;right:-30px;top:-30px;
  width:120px;height:120px;border-radius:50%;
  background:radial-gradient(circle,rgba(227,178,60,0.18),transparent 70%);
  pointer-events:none;
}
.plan-hero-icon{
  width:48px;height:48px;border-radius:14px;
  background:linear-gradient(135deg,#E3B23C,#D9723F);
  display:flex;align-items:center;justify-content:center;
  font-size:24px;flex-shrink:0;
  box-shadow:0 4px 12px rgba(217,114,63,0.35);
}
.plan-hero-body{flex:1;min-width:0;}
.plan-hero-t{
  font-size:17px;font-weight:800;
  letter-spacing:.3px;line-height:1.2;
  margin-bottom:3px;
}
.plan-hero-m{
  font-size:11.5px;opacity:.82;line-height:1.4;
}

/* Input area */
.plan-input{
  background:#fff;border-radius:16px;padding:14px;
  box-shadow:0 3px 10px rgba(27,42,65,0.05);
  margin-bottom:14px;
}
.plan-input-label{
  display:flex;align-items:center;gap:6px;
  font-size:12px;font-weight:700;color:var(--navy);
  margin-bottom:8px;
}
.plan-input-label-icon{
  width:18px;height:18px;border-radius:50%;
  background:#FBE9DF;color:var(--terra);
  display:flex;align-items:center;justify-content:center;
  font-size:10px;
}
.plan-textarea{
  width:100%;min-height:80px;max-height:180px;
  border:1.5px solid var(--line);border-radius:12px;
  padding:10px 12px;font-size:13px;line-height:1.5;
  font-family:inherit;color:var(--ink);
  resize:vertical;outline:none;
  transition:border-color .15s ease;
  box-sizing:border-box;
}
.plan-textarea:focus{border-color:var(--terra);}
.plan-textarea::placeholder{color:#bfb6a5;}

/* Templates */
.plan-temp{
  display:flex;gap:8px;
  margin-top:10px;overflow-x:auto;
  scrollbar-width:none;
  -webkit-overflow-scrolling:touch;
}
.plan-temp::-webkit-scrollbar{display:none;}
.plan-temp-chip{
  flex-shrink:0;
  padding:7px 12px;border-radius:20px;
  background:#F6F3EC;color:var(--ink);
  font-size:11.5px;font-weight:600;
  border:1px solid var(--line);
  cursor:pointer;
  transition:all .15s ease;
  white-space:nowrap;
  -webkit-tap-highlight-color:transparent;
}
.plan-temp-chip:active{
  transform:scale(.96);
  background:var(--navy);color:#fff;border-color:var(--navy);
}

/* Meta row */
.plan-meta{
  display:flex;gap:8px;margin-top:12px;
  flex-wrap:wrap;
}
.plan-meta-item{
  flex:1;min-width:0;
  display:flex;flex-direction:column;gap:4px;
}
.plan-meta-label{
  font-size:10px;color:var(--muted);font-weight:600;
  text-transform:uppercase;letter-spacing:.4px;
}
.plan-meta-chip{
  padding:8px 10px;border-radius:10px;
  background:#fff;border:1.2px solid var(--line);
  font-size:12px;font-weight:700;color:var(--ink);
  cursor:pointer;
  display:flex;align-items:center;gap:5px;justify-content:space-between;
  -webkit-tap-highlight-color:transparent;
  transition:all .15s ease;
}
.plan-meta-chip:active{transform:scale(.97);}
.plan-meta-chip .arrow{font-size:10px;color:var(--muted);}
.plan-meta-chip.active{
  border-color:var(--terra);background:#FBE9DF;color:var(--terra);
}
.plan-meta-chips{
  display:flex;flex-wrap:wrap;gap:5px;
}
.plan-meta-pill{
  padding:5px 10px;border-radius:14px;
  background:#F6F3EC;color:var(--ink);
  font-size:11px;font-weight:600;
  border:1px solid transparent;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  transition:all .15s ease;
}
.plan-meta-pill.active{
  background:var(--navy);color:#fff;
}
.plan-meta-pill:active{transform:scale(.95);}

/* Generate button */
.plan-go{
  width:100%;margin-top:14px;
  padding:14px;border-radius:14px;
  background:linear-gradient(135deg,var(--terra),#c4602f);
  color:#fff;font-size:14px;font-weight:800;
  border:none;cursor:pointer;
  box-shadow:0 4px 12px rgba(217,114,63,0.3);
  display:flex;align-items:center;justify-content:center;gap:8px;
  -webkit-tap-highlight-color:transparent;
  transition:transform .15s ease, box-shadow .15s ease;
  letter-spacing:.3px;
}
.plan-go:active{
  transform:scale(.98);
  box-shadow:0 2px 6px rgba(217,114,63,0.25);
}
.plan-go:disabled{
  background:#cdc6b8;box-shadow:none;cursor:wait;
}

/* AI loading state */
.plan-loading{
  display:none;
  background:#fff;border-radius:16px;padding:20px 16px;
  box-shadow:0 3px 10px rgba(27,42,65,0.05);
  margin-bottom:14px;
}
.plan-loading.show{display:block;}
.plan-load-t{
  font-size:13px;font-weight:700;color:var(--navy);
  text-align:center;margin-bottom:14px;
}
.plan-load-t .dot{
  display:inline-block;
  animation:plan-blink 1.2s ease-in-out infinite;
}
.plan-load-t .dot:nth-child(2){animation-delay:.2s;}
.plan-load-t .dot:nth-child(3){animation-delay:.4s;}
@keyframes plan-blink{
  0%,100%{opacity:.3;}
  50%{opacity:1;}
}
.plan-load-steps{display:flex;flex-direction:column;gap:10px;}
.plan-load-step{
  display:flex;align-items:center;gap:12px;
  padding:10px 12px;border-radius:12px;
  background:#F6F3EC;color:var(--muted);
  font-size:12px;font-weight:600;
  transition:all .3s ease;
}
.plan-load-step.active{
  background:#E2E8EF;color:var(--navy);
}
.plan-load-step.done{
  background:#E5EFE6;color:var(--green);
}
.plan-load-step-icon{
  width:24px;height:24px;border-radius:50%;
  background:#fff;display:flex;align-items:center;justify-content:center;
  font-size:13px;flex-shrink:0;
  transition:all .3s ease;
}
.plan-load-step.active .plan-load-step-icon{
  animation:plan-spin 1.4s linear infinite;
}
.plan-load-step.done .plan-load-step-icon{
  background:var(--green);color:#fff;
}
@keyframes plan-spin{
  to{transform:rotate(360deg);}
}

/* Result region */
.plan-result{display:none;}
.plan-result.show{display:block;}

/* Map preview */
.plan-map{
  background:#fff;border-radius:16px;padding:14px;
  box-shadow:0 3px 10px rgba(27,42,65,0.05);
  margin-bottom:14px;
}
.plan-map-head{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:10px;
}
.plan-map-t{
  font-size:13px;font-weight:700;color:var(--navy);
  display:flex;align-items:center;gap:6px;
}
.plan-map-t .badge{
  background:var(--terra);color:#fff;
  font-size:9px;font-weight:800;padding:2px 6px;
  border-radius:8px;margin-left:4px;
}
.plan-map-canvas{
  width:100%;aspect-ratio:16/9;
  background:linear-gradient(135deg,#E8E4D9,#F0EBDB);
  border-radius:12px;
  position:relative;overflow:hidden;
  border:1px solid var(--line);
}
.plan-map-canvas svg{
  width:100%;height:100%;display:block;
}

/* Overview */
.plan-ov{
  background:#fff;border-radius:16px;padding:14px;
  box-shadow:0 3px 10px rgba(27,42,65,0.05);
  margin-bottom:14px;
}
.plan-ov-t{
  font-size:13px;font-weight:700;color:var(--navy);
  margin-bottom:10px;display:flex;align-items:center;gap:6px;
}
.plan-ov-grid{
  display:grid;grid-template-columns:repeat(4,1fr);gap:8px;
}
.plan-ov-stat{
  text-align:center;padding:10px 4px;
  background:#F6F3EC;border-radius:10px;
}
.plan-ov-stat-v{
  font-size:18px;font-weight:800;color:var(--navy);
  line-height:1.1;
}
.plan-ov-stat-v .u{
  font-size:10px;font-weight:600;color:var(--muted);
  margin-left:2px;
}
.plan-ov-stat-l{
  font-size:9.5px;color:var(--muted);
  font-weight:600;margin-top:3px;
  text-transform:uppercase;letter-spacing:.3px;
}

/* Day cards */
.plan-days{
  background:#fff;border-radius:16px;padding:14px;
  box-shadow:0 3px 10px rgba(27,42,65,0.05);
  margin-bottom:14px;
}
.plan-days-t{
  font-size:13px;font-weight:700;color:var(--navy);
  margin-bottom:10px;display:flex;align-items:center;gap:6px;
  justify-content:space-between;
}
.plan-days-t .total{
  font-size:10px;font-weight:600;color:var(--muted);
}
.plan-day{
  border-radius:12px;border:1.2px solid var(--line);
  margin-bottom:8px;overflow:hidden;
  background:#fff;
}
.plan-day:last-child{margin-bottom:0;}
.plan-day-head{
  padding:10px 12px;
  display:flex;align-items:center;gap:10px;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  transition:background .15s ease;
}
.plan-day-head:active{background:#F6F3EC;}
.plan-day-num{
  width:28px;height:28px;border-radius:50%;
  background:var(--navy);color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:800;flex-shrink:0;
}
.plan-day-info{flex:1;min-width:0;}
.plan-day-route{
  font-size:12.5px;font-weight:700;color:var(--ink);
  line-height:1.3;
}
.plan-day-meta{
  font-size:10.5px;color:var(--muted);margin-top:2px;
}
.plan-day-arrow{
  font-size:11px;color:var(--muted);
  font-weight:700;
  transition:transform .25s ease;
}
.plan-day.open .plan-day-arrow{transform:rotate(90deg);}
.plan-day-body{
  max-height:0;overflow:hidden;
  transition:max-height .35s ease;
}
.plan-day.open .plan-day-body{
  max-height:500px;
}
.plan-day-body-inner{
  padding:0 12px 12px;
  border-top:1px dashed var(--line);
  padding-top:10px;
}
.plan-day-stop{
  display:flex;gap:10px;padding:6px 0;
  font-size:11.5px;line-height:1.4;
}
.plan-day-stop-time{
  color:var(--terra);font-weight:700;flex-shrink:0;
  width:42px;
}
.plan-day-stop-body{flex:1;min-width:0;}
.plan-day-stop-t{
  font-weight:700;color:var(--ink);
}
.plan-day-stop-m{
  color:var(--muted);font-size:10.5px;margin-top:1px;
}

/* Cost estimate */
.plan-cost{
  background:#fff;border-radius:16px;padding:14px;
  box-shadow:0 3px 10px rgba(27,42,65,0.05);
  margin-bottom:14px;
}
.plan-cost-t{
  font-size:13px;font-weight:700;color:var(--navy);
  margin-bottom:10px;display:flex;align-items:center;gap:6px;
}
.plan-cost-rows{display:flex;flex-direction:column;gap:6px;}
.plan-cost-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:7px 10px;border-radius:8px;
  background:#F6F3EC;font-size:12px;
}
.plan-cost-row.total{
  background:var(--navy);color:#fff;
  margin-top:4px;
  padding:9px 10px;
  font-weight:800;
}
.plan-cost-row-l{display:flex;align-items:center;gap:6px;font-weight:600;}
.plan-cost-row-l .ic{font-size:13px;}
.plan-cost-row-v{
  font-variant-numeric:tabular-nums;
  font-weight:700;
}
.plan-cost-row-v .yuan{font-size:10px;font-weight:600;margin-right:1px;}
.plan-cost-row.total .plan-cost-row-v .yuan{color:rgba(255,255,255,0.7);}

/* CTA */
.plan-cta{
  display:flex;gap:8px;margin-top:6px;
  padding-top:12px;border-top:1px dashed var(--line);
}
.plan-cta-btn{
  flex:1;padding:12px;border-radius:12px;
  font-size:12.5px;font-weight:700;
  border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:5px;
  -webkit-tap-highlight-color:transparent;
  transition:transform .15s ease;
  text-decoration:none;
}
.plan-cta-btn:active{transform:scale(.97);}
.plan-cta-save{
  background:#fff;color:var(--navy);
  border:1.2px solid var(--line);
}
.plan-cta-book{
  background:linear-gradient(135deg,var(--gold),#c89a2c);
  color:#fff;
  box-shadow:0 3px 8px rgba(227,178,60,0.3);
}
.plan-cta-share{
  background:linear-gradient(135deg,var(--green),#2f5e3a);
  color:#fff;
  box-shadow:0 3px 8px rgba(62,122,76,0.3);
}

/* Edit hint */

/* ──────────── L3 extra (trip) ──────────── */
:root{
  --trip-track:var(--line);
  --trip-passed:var(--green);
  --trip-active:var(--terra);
  --trip-next:var(--gold);
}

/* ---------- 1. Trip hero ---------- */
.trip-hero{
  margin:0 14px 12px;
  padding:18px 18px 16px;
  background:linear-gradient(135deg,#1B2A41 0%,#2A3F5F 60%,#3A5278 100%);
  color:#fff;
  border-radius:18px;
  position:relative;
  overflow:hidden;
  box-shadow:0 6px 20px rgba(27,42,65,.18);
}
.trip-hero::before{
  content:"";position:absolute;inset:0;
  background:
    radial-gradient(circle at 80% 20%,rgba(255,255,255,.08) 0,transparent 30%),
    radial-gradient(circle at 20% 80%,rgba(255,255,255,.06) 0,transparent 30%);
  pointer-events:none;
}
.trip-hero-t{font-size:18px;font-weight:700;letter-spacing:.2px;margin-bottom:2px}
.trip-hero-sub{font-size:12px;color:rgba(255,255,255,.65);margin-bottom:12px}
.trip-hero-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.trip-hero-stat{
  background:rgba(255,255,255,.10);
  padding:6px 10px;
  border-radius:10px;
  font-size:11.5px;
  display:flex;align-items:center;gap:5px;
  backdrop-filter:blur(4px);
}
.trip-hero-stat .ic{font-size:13px}
.trip-hero-gps{
  position:absolute;top:14px;right:14px;
  background:rgba(255,255,255,.12);
  padding:4px 9px;border-radius:999px;
  font-size:10px;display:flex;align-items:center;gap:5px;
}
.trip-hero-gps-dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--green);
  box-shadow:0 0 0 0 rgba(78,140,86,.5);
  animation:trip-pulse 2s infinite;
}
@keyframes trip-pulse{
  0%{box-shadow:0 0 0 0 rgba(78,140,86,.55)}
  70%{box-shadow:0 0 0 7px rgba(78,140,86,0)}
  100%{box-shadow:0 0 0 0 rgba(78,140,86,0)}
}
.trip-hero-gps.searching .trip-hero-gps-dot{background:var(--gold);animation-duration:1.2s}
.trip-hero-gps.denied .trip-hero-gps-dot{background:#D9534F;animation:none}

/* ---------- 2. Day selector ---------- */
.trip-days{
  display:flex;gap:8px;
  overflow-x:auto;
  padding:0 14px 4px;
  margin-bottom:8px;
  scrollbar-width:none;
  -ms-overflow-style:none;
}
.trip-days::-webkit-scrollbar{display:none}
.trip-day-pill{
  flex:0 0 auto;
  padding:8px 14px;
  border-radius:14px;
  background:#fff;
  border:1.5px solid var(--line);
  font-size:12.5px;font-weight:600;
  cursor:pointer;
  transition:all .2s;
  display:flex;flex-direction:column;align-items:center;gap:1px;
  min-width:62px;
}
.trip-day-pill:hover{border-color:var(--terra);color:var(--terra)}
.trip-day-pill.active{
  background:var(--navy);
  color:#fff;
  border-color:var(--navy);
}
.trip-day-pill .pday{font-size:14px;font-weight:700}
.trip-day-pill .psub{font-size:10px;opacity:.7;font-weight:500}
.trip-day-pill.active .psub{opacity:.85}
.trip-day-pill .pcheck{
  font-size:10px;
  margin-top:1px;
  color:var(--green);
}
.trip-day-pill.done .pcheck{color:var(--green)}
.trip-day-pill.active .pcheck{color:var(--gold)}

/* ---------- 3. Next stop big card ---------- */
.trip-next{
  margin:0 14px 12px;
  background:linear-gradient(135deg,#FFE8B0 0%,#FCD980 100%);
  border-radius:16px;
  padding:14px 16px;
  display:flex;align-items:center;gap:12px;
  border:1.5px solid var(--gold);
  position:relative;
  box-shadow:0 4px 14px rgba(199,154,75,.18);
}
.trip-next-icon{
  width:46px;height:46px;border-radius:14px;
  background:#fff;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;flex-shrink:0;
  border:1.5px solid rgba(199,154,75,.4);
}
.trip-next-body{flex:1;min-width:0}
.trip-next-label{font-size:10px;color:#7A5520;font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:2px}
.trip-next-t{font-size:15px;font-weight:700;color:#27221B;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.trip-next-m{font-size:11.5px;color:#7A5520;line-height:1.3}
.trip-next-dist{
  flex:0 0 auto;
  text-align:center;
  padding:4px 10px;
  background:#fff;
  border-radius:12px;
  border:1px solid rgba(199,154,75,.4);
}
.trip-next-dist-v{font-size:18px;font-weight:800;color:var(--gold-dark,#8a6a1f);line-height:1.1}
.trip-next-dist-l{font-size:9px;color:#7A5520;text-transform:uppercase;letter-spacing:.4px}

/* ---------- 4. Progress ring + today stats ---------- */
.trip-progress{
  margin:0 14px 12px;
  padding:14px 16px;
  background:#fff;
  border-radius:14px;
  border:1px solid var(--line);
  display:flex;align-items:center;gap:14px;
}
.trip-ring{
  flex:0 0 auto;
  width:72px;height:72px;
  position:relative;
}
.trip-ring svg{transform:rotate(-90deg)}
.trip-ring-bg{fill:none;stroke:var(--line);stroke-width:7}
.trip-ring-fg{
  fill:none;
  stroke:var(--green);
  stroke-width:7;
  stroke-linecap:round;
  transition:stroke-dashoffset .6s ease;
}
.trip-ring-v{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-weight:800;color:var(--navy);
}
.trip-ring-v .pct{font-size:18px;line-height:1}
.trip-ring-v .pctl{font-size:9px;color:#8B8273;font-weight:600;margin-top:1px}
.trip-progress-body{flex:1;min-width:0}
.trip-progress-t{font-size:13px;font-weight:700;margin-bottom:4px}
.trip-progress-m{font-size:11px;color:#8B8273;line-height:1.5}
.trip-progress-m b{color:var(--navy);font-weight:700}

/* ---------- 5. Live map ---------- */
.trip-map{
  margin:0 14px 12px;
  background:#fff;
  border-radius:14px;
  border:1px solid var(--line);
  overflow:hidden;
}
.trip-map-head{
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 14px;
  border-bottom:1px solid var(--line);
  font-size:12.5px;font-weight:700;
}
.trip-map-canvas{height:200px;position:relative;background:linear-gradient(135deg,#F4EEDF 0%,#E8E0C8 100%)}
.trip-map-canvas svg{width:100%;height:100%;display:block}

/* ---------- 6. Timeline ---------- */
.trip-timeline{
  margin:0 14px 12px;
  padding:14px 16px;
  background:#fff;
  border-radius:14px;
  border:1px solid var(--line);
}
.trip-timeline-head{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:14px;
}
.trip-timeline-t{font-size:13px;font-weight:700}
.trip-timeline-stats{font-size:11px;color:#8B8273;font-weight:600}
.timeline{display:flex;flex-direction:column;gap:0;position:relative;padding-left:8px}
.timeline::before{
  content:"";position:absolute;
  left:11px;top:6px;bottom:6px;
  width:2px;background:var(--line);
}
.trip-stop{
  display:flex;gap:12px;
  padding:6px 0 14px 0;
  position:relative;
}
.trip-stop:last-child{padding-bottom:2px}
.trip-stop-dot{
  flex:0 0 auto;
  width:14px;height:14px;border-radius:50%;
  background:#fff;
  border:2px solid var(--line);
  margin-top:4px;
  z-index:1;
  position:relative;
  transition:all .25s;
}
.trip-stop.passed .trip-stop-dot{
  background:var(--green);
  border-color:var(--green);
}
.trip-stop.active .trip-stop-dot{
  background:var(--terra);
  border-color:var(--terra);
  box-shadow:0 0 0 4px rgba(220,107,72,.18);
}
.trip-stop.next .trip-stop-dot{
  background:var(--gold);
  border-color:var(--gold);
  box-shadow:0 0 0 3px rgba(199,154,75,.22);
}
.trip-stop-body{flex:1;min-width:0}
.trip-stop-time{font-size:10.5px;font-weight:700;color:#8B8273;text-transform:uppercase;letter-spacing:.5px}
.trip-stop.passed .trip-stop-time{color:var(--green)}
.trip-stop.active .trip-stop-time{color:var(--terra)}
.trip-stop.next .trip-stop-time{color:var(--gold)}
.trip-stop-t{font-size:13px;font-weight:700;color:var(--navy);margin:1px 0 1px;line-height:1.35}
.trip-stop.skip .trip-stop-t{text-decoration:line-through;opacity:.55}
.trip-stop-m{font-size:11.5px;color:#5C5346;line-height:1.4}
.trip-stop-dist{
  flex:0 0 auto;
  font-size:10.5px;
  font-weight:700;
  color:#8B8273;
  background:#F4EFE3;
  padding:3px 7px;
  border-radius:8px;
  align-self:flex-start;
  margin-top:4px;
}
.trip-stop.passed .trip-stop-dist{background:#E5F1E0;color:var(--green)}
.trip-stop.next .trip-stop-dist{background:#FFE8B0;color:#7A5520}

/* ---------- 7. Trip actions ---------- */
.trip-actions{
  margin:0 14px 18px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}
.trip-action{
  padding:11px 12px;
  background:#fff;
  border:1.5px solid var(--line);
  border-radius:13px;
  display:flex;align-items:center;gap:9px;
  font-size:12.5px;font-weight:600;
  cursor:pointer;
  transition:all .2s;
}
.trip-action:hover{border-color:var(--terra);color:var(--terra)}
.trip-action .ic{font-size:17px;width:22px;text-align:center}
.trip-action.sos{
  border-color:#EBC9B5;
  background:#FFF8F5;
  color:#A0391F;
}
.trip-action.sos:hover{border-color:#D9534F;color:#D9534F;background:#FCE8E2}

/* ---------- 8. GPS permission panel ---------- */
.trip-gps-panel{
  margin:0 14px 12px;
  padding:12px 14px;
  background:linear-gradient(135deg,#FFF8E8 0%,#FFEFD0 100%);
  border-radius:12px;
  border:1.5px dashed var(--gold);
  display:flex;align-items:center;gap:10px;
}
.trip-gps-panel-icon{font-size:22px;flex-shrink:0}
.trip-gps-panel-body{flex:1;min-width:0}
.trip-gps-panel-t{font-size:12.5px;font-weight:700;color:#7A5520;margin-bottom:2px}
.trip-gps-panel-m{font-size:11px;color:#9C7A35;line-height:1.4}
.trip-gps-panel-btn{
  flex:0 0 auto;
  padding:6px 12px;
  background:var(--gold);
  color:#fff;
  border:none;
  border-radius:9px;
  font-size:11.5px;font-weight:700;
  cursor:pointer;
}
.trip-gps-panel-btn:hover{background:#B58A45}
.trip-gps-panel-btn.deny{background:#fff;color:var(--gold);border:1.5px solid var(--gold)}
.trip-gps-panel.hidden{display:none}

/* ---------- 9. Update hint (offline) ---------- */
.trip-offline{
  margin:0 14px 12px;
  padding:8px 12px;
  background:#FCEEE3;
  border-radius:10px;
  font-size:11.5px;color:#7A5520;
  display:flex;align-items:center;gap:7px;
}
.trip-offline.hidden{display:none}
.trip-offline .dot{
  width:7px;height:7px;border-radius:50%;background:var(--gold);
  flex-shrink:0;
}

/* ---------- 10. Reduce motion ---------- */
@media (prefers-reduced-motion: reduce){
  .trip-hero-gps-dot,.trip-ring-fg,.trip-stop-dot{transition:none;animation:none}
}

  // Expose _planBind / _planRun for interactions (L2-specific, defined inline below)
  (function() {
    function planBind() {
      var go = document.getElementById('plan-go');
      var txt = document.getElementById('plan-text');
      var dateBtn = document.getElementById('plan-date');
      var daysGroup = document.getElementById('plan-days');
      var peopleGroup = document.getElementById('plan-people');
      var tempGroup = document.getElementById('plan-temp');
      if (!go) return;
      /* templates → fill textarea */
      if (tempGroup && !tempGroup._bound) {
        tempGroup._bound = true;
        tempGroup.addEventListener('click', function(ev) {
          var t = ev.target.closest('.plan-temp-chip');
          if (!t || !txt) return;
          txt.value = t.getAttribute('data-t') || '';
          /* pulse feedback */
          t.style.background = 'var(--terra)'; t.style.color = '#fff';
          setTimeout(function() { t.style.background = ''; t.style.color = ''; }, 240);
        });
      }
      /* days pills (single-select) */
      if (daysGroup && !daysGroup._bound) {
        daysGroup._bound = true;
        daysGroup.addEventListener('click', function(ev) {
          var p = ev.target.closest('.plan-meta-pill');
          if (!p) return;
          daysGroup.querySelectorAll('.plan-meta-pill').forEach(function(x) { x.classList.remove('active'); });
          p.classList.add('active');
        });
      }
      /* people pills (multi-select) */
      if (peopleGroup && !peopleGroup._bound) {
        peopleGroup._bound = true;
        peopleGroup.addEventListener('click', function(ev) {
          var p = ev.target.closest('.plan-meta-pill');
          if (!p) return;
          p.classList.toggle('active');
        });
      }
      /* date chip: cycle forward 7 days each tap */
      if (dateBtn && !dateBtn._bound) {
        dateBtn._bound = true;
        dateBtn.addEventListener('click', function() {
          var cur = dateBtn.textContent.replace('▾','').trim();
          var d = new Date(cur);
          if (isNaN(d.getTime())) d = new Date();
          d.setDate(d.getDate() + 7);
          dateBtn.firstChild.nodeValue = d.toISOString().slice(0,10) + ' ';
        });
      }
      /* go button → run */
      if (!go._bound) {
        go._bound = true;
        go.addEventListener('click', window._planRun);
      }
    }
    function planRun() {
      var go = document.getElementById('plan-go');
      var loading = document.getElementById('plan-loading');
      var result = document.getElementById('plan-result');
      if (!loading || !result) return;
      if (go) { go.disabled = true; go.innerHTML = '<span>⏳</span><span>生成中…</span>'; }
      loading.classList.add('show');
      result.classList.remove('show');
      /* fake 3-step AI progress */
      var steps = loading.querySelectorAll('.plan-load-step');
      steps.forEach(function(s) { s.classList.remove('active','done'); });
      var delay = 0;
      steps.forEach(function(s, i) {
        setTimeout(function() {
          steps.forEach(function(x, j) {
            if (j < i) x.classList.add('done'), x.classList.remove('active');
            else if (j === i) x.classList.add('active');
            else x.classList.remove('active','done');
          });
        }, delay);
        delay += 700;
      });
      /* finalize after steps done */
      setTimeout(function() {
        steps.forEach(function(x) { x.classList.remove('active'); x.classList.add('done'); });
        setTimeout(function() {
          loading.classList.remove('show');
          result.classList.add('show');
          if (go) {
            go.disabled = false;
            go.innerHTML = '<span>🔄</span><span>换一条</span>';
          }
          /* scroll result into view */
          try { result.scrollIntoView({ behavior: 'smooth', block: 'start' }); } catch(e) {}
        }, 350);
      }, delay + 200);
    }
    window._planBind = planBind;
    window._planRun = planRun;
  })();

      "var ASSETS=['./'];",
      "self.addEventListener('install',function(e){",
      "  e.waitUntil(caches.open(CACHE).then(function(c){return c.addAll(ASSETS).catch(function(){});}));",
      "  self.skipWaiting();",
      "});",
      "self.addEventListener('activate',function(e){",
      "  e.waitUntil(caches.keys().then(function(keys){",
      "    return Promise.all(keys.filter(function(k){return k!==CACHE;}).map(function(k){return caches.delete(k);}));",
      "  }));",
      "  self.clients.claim();",
      "});",
      "self.addEventListener('fetch',function(e){",
      "  if(e.request.method!=='GET') return;",
      "  e.respondWith(",
      "    caches.match(e.request).then(function(r){",
      "      return r || fetch(e.request).then(function(resp){",
      "        if(resp && resp.status===200){",
      "          var copy=resp.clone();",
      "          caches.open(CACHE).then(function(c){return c.put(e.request,copy).catch(function(){});});",
      "        }",
      "        return resp;",
      "      }).catch(function(){return caches.match('./');})",
      "    })",
      "  );",
      "});"
    ].join('\n');

    try {
      var swBlob = new Blob([swCode], { type: 'application/javascript' });
      var swUrl = URL.createObjectURL(swBlob);
      navigator.serviceWorker.register(swUrl).then(function (reg) {
        console.log('[gotrace] SW registered, scope=', reg.scope);
      }).catch(function (err) {
        console.warn('[gotrace] SW registration failed:', err);
      });
    } catch (e) {
      console.warn('[gotrace] SW setup error:', e);
    }
  }

  // ─── Boot ────────────────────────────────────────────────────────────────
  window._state = _state;
  window.state = state;

/* Format followers: 1200 → "1.2k", 3480 → "3.5k" */
function _meFmtFollowers(n){

}

/* ---------- Edit nickname: in-place swap <span> → <input> ----------
 * Bound by onclick="meBeginEditNickname(event)" on the rendered <span>.
 * On blur → meCommitNickname() → updates state.profile.nickname + saves
 *          + triggers global re-render (if GT.render exists in skeleton).
 * Uses event delegation on the input so blur fires after the swap.
 */
function meBeginEditNickname(ev){
  try { ev && ev.stopPropagation && ev.stopPropagation(); } catch(_){ }
  var span = document.getElementById('me-name-span');
  if (!span) return;
  var input = document.getElementById('me-name-input');
  if (!input) return;
  span.style.display = 'none';
  input.style.display = 'inline-block';
  // focus + select all
  try { input.focus(); input.setSelectionRange(0, input.value.length); }
  catch(_){ input.focus(); }
}

function meCommitNickname(ev){
  var span = document.getElementById('me-name-span');
  var input = document.getElementById('me-name-input');
  if (!span || !input) return;
  var raw = (input.value || '').trim();
  // Reject empty → snap back to previous value
  var prof = _meProfile();
  var next = raw || prof.nickname;
  // Persist to state via Proxy (window.state provided by skeleton)
  try {
    if (window.state && typeof window.state.profile === 'object') {
      window.state.profile.nickname = next;
    } else if (window.state) {
      // Fallback: set via profile path through skeleton's proxy
      try { window.state['profile.nickname'] = next; } catch(_){}
    }
  } catch(e){ console.warn('[me] nickname save failed', e); }
  // Persist to localStorage
  try {
    if (typeof window.saveState === 'function') window.saveState();
    else if (window._state) localStorage.setItem('gotrace_state_v1', JSON.stringify(window._state));
  } catch(e){ console.warn('[me] saveState failed', e); }
  // Trigger skeleton re-render if exposed, else manually swap DOM back
  if (window.GT && typeof window.GT.render === 'function') {
    window.GT.render();
  } else {
    input.style.display = 'none';
    span.style.display  = 'inline-block';
    span.textContent    = next;
  }
}

    { id:"b20", title:"巴音布鲁克九曲 18 弯机位地图", tripId:"yili-7d", style:"短视频脚本", coverGradient:"linear-gradient(135deg,#E3B23C,#D9723F)", pages:5, publishedTo:["B站","抖音"], views:54800, likes:4760, createdAt:"2025-07-25T18:45:00Z" }
  ];

  // ─── 4. viewRoutes(viewMode) — 路线广场 + 我的路书 ────────────
  // 依赖全局: _state, escapeHtml(), render() (可选)
  window.viewRoutes = function viewRoutes(viewMode, extra) {
    viewMode = viewMode || 'plaza';
    if (viewMode === 'books' || viewMode === 'mine') return renderBooksView();
    return renderPlazaView(extra);
  };

  // ─── 4a. 路线广场视图 ──────────────────────────────────────────
  function renderPlazaView(extra) {
    var R = window.MOCK_ROUTES_EXTRA;
    var page = (extra && extra.page) || R.currentPage || 1;
    var topic = (extra && extra.topic) || R.currentTopic || '全部';
    R.currentPage = page;
    R.currentTopic = topic;
    var list = R.pageData.page1;
    if (topic && topic !== '全部') {
      list = list.filter(function(r){ return r.topic === topic; });
    }

    var html = '';
    html += '<section class="view view-plaza" data-tab="plaza">';
    html += '  <div class="plaza-wrap">';
    html += '    <header class="plaza-head">';
    html += '      <h1>路线广场</h1>';
    html += '      <a class="plaza-back" href="#home">‹ 返回</a>';
    html += '    </header>';
    html += '    <p class="plaza-sub">全站 ' + R.total + ' 条精选路线 · 第 ' + page + ' / ' + R.pageCount + ' 页</p>';

    // 精选横滚
    html += '    <div class="plaza-featured">';
    for (var i = 0; i < R.featured.length; i++) {
      var f = R.featured[i];
      var fItem = findRouteById(f.id) || {};
      html += '      <a class="plaza-feat-card" href="#trip?routeId=' + escapeHtml(f.id) + '" style="background:' + escapeHtml(fItem.coverGradient || 'linear-gradient(135deg,#1B2A41,#3E7A4C)') + '">';
      html += '        <span class="ft-reason">' + escapeHtml(f.reason) + '</span>';
      html += '        <span class="ft-title">' + escapeHtml(fItem.title || f.id) + '</span>';
      html += '      </a>';
    }
    html += '    </div>';

    // 主题过滤
    html += '    <div class="plaza-filter">';
    for (var t = 0; t < R.topicFilters.length; t++) {
      var tf = R.topicFilters[t];
      var active = (tf === topic) ? ' active' : '';
      html += '      <span class="plaza-chip' + active + '" data-topic="' + escapeHtml(tf) + '">' + escapeHtml(tf) + '</span>';
    }
    html += '    </div>';

    // 列表
    if (!list.length) {
      html += '    <div class="plaza-empty">该主题暂无路线</div>';
    } else {
      html += '    <div class="plaza-grid">';
      for (var j = 0; j < list.length; j++) {
        var r = list[j];
        html += renderPlazaCard(r);
      }
      html += '    </div>';
    }

    // 分页器
    html += renderPager(page, R.pageCount, R.total, R.pageSize);

    html += '  </div>';
    html += '</section>';

    return html;
  }

  function renderPlazaCard(r) {
    var s = '';
    s += '<a class="plaza-card" href="#trip?routeId=' + escapeHtml(r.id) + '">';
    s += '  <div class="cover" style="background:' + escapeHtml(r.coverGradient) + '">';
    s += '    <span class="topic-tag">' + escapeHtml(r.topic) + '</span>';
    s += '  </div>';
    s += '  <div class="body">';
    s += '    <h4 class="title">' + escapeHtml(r.title) + '</h4>';
    s += '    <div class="meta"><b>' + r.days + '天</b> · <b>' + r.km + 'km</b> · 最高 ' + r.maxAltitude + 'm</div>';
    s += '    <div class="meta">季节 ' + escapeHtml(r.bestSeason) + ' · ' + escapeHtml(r.difficulty) + '</div>';
    s += '    <div class="stats">';
    s += '      <span class="rating">★ ' + r.rating.toFixed(1) + '</span>';
    s += '      <span class="author"><span style="display:inline-block;width:16px;height:16px;border-radius:50%;background:var(--terra);color:#fff;font-size:9px;font-weight:800;text-align:center;line-height:16px">' + escapeHtml(r.authorAvatar || '·') + '</span> ' + escapeHtml(r.author) + '</span>';
    s += '    </div>';
    s += '  </div>';
    s += '</a>';
    return s;
  }

  function renderPager(cur, total, totalItems, pageSize) {
    var s = '';
    s += '<div class="plaza-pager">';
    s += '  <button class="pg-btn" data-page="1"' + (cur <= 1 ? ' disabled' : '') + '>« 首页</button>';
    s += '  <button class="pg-btn" data-page="' + (cur - 1) + '"' + (cur <= 1 ? ' disabled' : '') + '>‹</button>';
    // 显示窗口 ±2
    var start = Math.max(1, cur - 2);
    var end = Math.min(total, cur + 2);
    if (start > 1) s += '  <span class="pg-info">…</span>';
    for (var p = start; p <= end; p++) {
      var cls = 'pg-btn' + (p === cur ? ' active' : '');
      s += '  <button class="' + cls + '" data-page="' + p + '">' + p + '</button>';
    }
    if (end < total) s += '  <span class="pg-info">…</span>';
    s += '  <button class="pg-btn" data-page="' + (cur + 1) + '"' + (cur >= total ? ' disabled' : '') + '>›</button>';
    s += '  <button class="pg-btn" data-page="' + total + '"' + (cur >= total ? ' disabled' : '') + '>末页 »</button>';
    s += '  <span class="pg-jump">跳到 <input type="number" min="1" max="' + total + '" value="' + cur + '" data-jump> 页</span>';
    s += '</div>';
    return s;
  }

  // ─── 4b. 我的路书视图 ──────────────────────────────────────────
  function renderBooksView() {
    var books = window.MOCK_BOOKS_EXTRA;
    var R = window.MOCK_ROUTES_EXTRA;
    var styles = ['全部','硬核攻略','文艺游记','小红书爆款','短视频脚本','招商合作'];
    var curStyle = '全部';

    var html = '';
    html += '<section class="view view-books" data-tab="books">';
    html += '  <div class="books-wrap">';
    html += '    <header class="books-head">';
    html += '      <h1>我的路书</h1>';
    html += '      <a class="plaza-back" href="#me">‹ 我的</a>';
    html += '    </header>';
    html += '    <p class="books-sub">已生成 ' + books.length + ' 篇路书 · 已发布至 4 个平台</p>';

    html += '    <div class="books-filter">';
    for (var i = 0; i < styles.length; i++) {
      var st = styles[i];
      var active = (st === curStyle) ? ' active' : '';
      html += '      <span class="books-chip' + active + '" data-style="' + escapeHtml(st) + '">' + escapeHtml(st) + '</span>';
    }
    html += '    </div>';

    html += '    <div class="books-grid">';
    for (var k = 0; k < books.length; k++) {
      html += renderBookCard(books[k]);
    }
    html += '    </div>';

    html += '  </div>';
    html += '</section>';
    return html;
  }

  function renderBookCard(b) {
    var s = '';
    s += '<div class="book-card">';
    s += '  <div class="cover" style="background:' + escapeHtml(b.coverGradient) + '">';
    s += '    <span class="style-tag">' + escapeHtml(b.style) + '</span>';
    s += '  </div>';
    s += '  <div class="body">';
    s += '    <h4 class="title">' + escapeHtml(b.title) + '</h4>';
    s += '    <div class="platforms">';
    for (var i = 0; i < b.publishedTo.length; i++) {
      s += '      <span class="pf-chip">' + escapeHtml(b.publishedTo[i]) + '</span>';
    }
    s += '    </div>';
    s += '    <div class="stats">';
    s += '      <span class="views"><b>' + formatCount(b.views) + '</b> 浏览</span>';
    s += '      <span><b>' + formatCount(b.likes) + '</b> 赞</span>';
    s += '      <span><b>' + b.pages + '</b> 页</span>';
    s += '    </div>';
    s += '  </div>';
    s += '</div>';
    return s;
  }

  function formatCount(n) {
    if (n >= 10000) return (n / 10000).toFixed(1) + 'w';
    if (n >= 1000) return (n / 1000).toFixed(1) + 'k';
    return String(n);
  }

  function findRouteById(id) {
    var list = window.MOCK_ROUTES_EXTRA.pageData.page1;
    for (var i = 0; i < list.length; i++) if (list[i].id === id) return list[i];
    return null;
  }

  // ─── 5. 事件代理：plaza/books 交互 ─────────────────────────────
  // 通过 window.GTR (GoTrace Routes) 暴露给主 agent 在 render() 后调用
  window.GTR = {
    // 解析 hash 参数 (?page=1&topic=长途进藏)
    parseHash: function() {
      var hash = (location.hash || '').replace(/^#/, '');
      var qIdx = hash.indexOf('?');
      var main = qIdx >= 0 ? hash.slice(0, qIdx) : hash;
      var query = {};
      if (qIdx >= 0) {
        hash.slice(qIdx + 1).split('&').forEach(function(kv){
          if (!kv) return;
          var p = kv.split('=');
          query[decodeURIComponent(p[0])] = decodeURIComponent(p[1] || '');
        });
      }
      return { tab: main, params: query };
    },
    // 渲染路线广场（绑定 hash 同步）
    showPlaza: function(page, topic) {
      if (typeof page === 'number') {
        window.MOCK_ROUTES_EXTRA.currentPage = page;
      }
      if (topic) {
        window.MOCK_ROUTES_EXTRA.currentTopic = topic;
      }
      var p = page || window.MOCK_ROUTES_EXTRA.currentPage || 1;
      var t = topic || window.MOCK_ROUTES_EXTRA.currentTopic || '全部';
      location.hash = '#plaza?page=' + p + (t !== '全部' ? '&topic=' + encodeURIComponent(t) : '');
      bindPlazaHandlers();
    },
    // 渲染路书
    showBooks: function() {
      location.hash = '#books';
      bindBooksHandlers();
    },
    // 绑定 plaza 的 chip + pager 事件（每次 render 后调用一次）
    bindAll: function() {
      bindPlazaHandlers();
      bindBooksHandlers();
    }
  };

  function bindPlazaHandlers() {
    var main = document.getElementById('main-content');
    if (!main) return;
    // topic chip
    var chips = main.querySelectorAll('.plaza-chip');
    for (var i = 0; i < chips.length; i++) {
      chips[i].onclick = function() {
        var t = this.getAttribute('data-topic') || '全部';
        window.MOCK_ROUTES_EXTRA.currentTopic = t;
        window.MOCK_ROUTES_EXTRA.currentPage = 1;
        if (typeof render === 'function') {
          var html = window.viewRoutes('plaza', { page: 1, topic: t });
          main.innerHTML = html;
          bindPlazaHandlers();
        }
      };
    }
    // pager
    var btns = main.querySelectorAll('.plaza-pager .pg-btn');
    for (var b = 0; b < btns.length; b++) {
      btns[b].onclick = function() {
        if (this.disabled) return;
        var p = parseInt(this.getAttribute('data-page'), 10);
        if (!p || p < 1) return;
        window.MOCK_ROUTES_EXTRA.currentPage = p;
        if (typeof render === 'function') {
          var html = window.viewRoutes('plaza', { page: p, topic: window.MOCK_ROUTES_EXTRA.currentTopic });
          main.innerHTML = html;
          bindPlazaHandlers();
          window.scrollTo(0, 0);
        }
      };
    }
    // jump input
    var jump = main.querySelector('.plaza-pager input[data-jump]');
    if (jump) {
      jump.onkeydown = function(e) {
        if (e.key !== 'Enter') return;
        var p = parseInt(this.value, 10);
        var max = window.MOCK_ROUTES_EXTRA.pageCount;
        if (!p || p < 1 || p > max) { this.value = window.MOCK_ROUTES_EXTRA.currentPage; return; }
        window.MOCK_ROUTES_EXTRA.currentPage = p;
        if (typeof render === 'function') {
          var html = window.viewRoutes('plaza', { page: p, topic: window.MOCK_ROUTES_EXTRA.currentTopic });
          main.innerHTML = html;
          bindPlazaHandlers();
          window.scrollTo(0, 0);
        }
      };
    }
  }

  function bindBooksHandlers() {
    var main = document.getElementById('main-content');
    if (!main) return;
    var chips = main.querySelectorAll('.books-chip');
    for (var i = 0; i < chips.length; i++) {
      chips[i].onclick = function() {
        var st = this.getAttribute('data-style') || '全部';
        // 简单过滤重渲
        var books = window.MOCK_BOOKS_EXTRA.filter(function(b){
          return st === '全部' ? true : b.style === st;
        });
        if (!books.length) {
          main.innerHTML = '<div class="books-empty">该风格暂无路书</div>';
          return;
        }
        var html = '<section class="view view-books" data-tab="books"><div class="books-wrap">';
        html += '<header class="books-head"><h1>我的路书</h1><a class="plaza-back" href="#me">‹ 我的</a></header>';
        html += '<p class="books-sub">' + books.length + ' 篇 · 风格：' + st + '</p>';
        // 过滤条
        var styles = ['全部','硬核攻略','文艺游记','小红书爆款','短视频脚本','招商合作'];
        html += '<div class="books-filter">';
        for (var s = 0; s < styles.length; s++) {
          var act = (styles[s] === st) ? ' active' : '';
          html += '<span class="books-chip' + act + '" data-style="' + styles[s] + '">' + styles[s] + '</span>';
        }
        html += '</div><div class="books-grid">';
        for (var k = 0; k < books.length; k++) {
          html += renderBookCard(books[k]);
        }
        html += '</div></div></section>';
        main.innerHTML = html;
        bindBooksHandlers();
      };
    }
  }

  // 暴露给主 agent 调试
  window.MOCK_DEEP_LOADED = true;

})();

})();
</script>
