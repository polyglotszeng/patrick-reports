<script>
"use strict";
/* DEPLOY RECEIPT v3.b · 2026-07-08T15:43Z · cache-buster default (PITFALL #156) */
console.log('[v3.b OK] orbital-console loaded · cache-buster=20260708154310 · 3 .ztle files deploy pending');
/* ============================================================
   0. 常量与数学(与 v1 保持一致)
   ============================================================ */
const RE = 6371.0, MU = 398600.4418, WE = 7.2921159e-5;
const DEG = Math.PI / 180, R2D = 180 / Math.PI;

function footprintCentralAngle(altKm, minElevDeg) {
  const eps = minElevDeg * DEG;
  const x = RE / (RE + altKm) * Math.cos(eps);
  return x >= 1 ? 0 : Math.acos(x) - eps;
}
const footprintRadiusKm = (a, e) => RE * footprintCentralAngle(a, e);
const footprintAreaFraction = (a, e) => (1 - Math.cos(footprintCentralAngle(a, e))) / 2;
const wrapLon = (d) => ((d + 180) % 360 + 360) % 360 - 180;

/* ============================================================
   1. TLE 解码 + SGP4 传播(用 satellite.js)
   pack_tles.py 输出:每 71 字节 = [3 byte name][2x 34 byte TLE line]
   ============================================================ */
const SHELLS = [
  { key: "starlink", label: "Starlink",     color: "#56C8E8", file: "starlink.ztle" },
  { key: "stations", label: "空间站 / 飞行器", color: "#F5A623", file: "stations.ztle" },
  { key: "visual",   label: "高亮星等",       color: "#B48CF2", file: "visual.ztle" },
];

// 每颗星:{ shell, name, line1, line2, satrec, norad, epochYr, epochDoy }
const sats = [];

// ZTLE v1 二进制解包 — 调用 sister project 的 canonical decoder
//   (tle-unpack.js 与 pack_tles.py 严格对应,直接还原标准 TLE 两行)
//   浏览器加载 script src="data/tle-unpack.js" 后用 window.ZTLE.loadZTLE(url)
function unpackZTLE(blob) {
  // 兼容旧调用:接 Uint8Array → 转 ArrayBuffer → 走 ZTLE decoder → 展平成 name+line1+line2
  const ab = blob.buffer.slice(blob.byteOffset, blob.byteOffset + blob.byteLength);
  const { sats } = window.ZTLE.decodeZTLE(ab);
  return sats.map(s => ({ name: s.name, l1: s.line1, l2: s.line2 }));
}

// TLE epoch 解析(line1 col 19-32:" YYDDD.DDDDDDDD ")
function parseEpoch(l1) {
  const ystr = l1.slice(19, 21);
  const dstr = l1.slice(21, 32);
  let yr = parseInt(ystr, 10);
  yr += (yr < 57) ? 2000 : 1900;
  const doy = parseFloat(dstr);
  const date = new Date(Date.UTC(yr, 0, 1) + (doy - 1) * 86400e3);
  return { yr, doy, date };
}

// 一次性 SGP4 satrec 构建
function buildSatrecs(records) {
  const now = Date.now();
  let valid = 0, expired = 0;
  for (const r of records) {
    let satrec;
    try {
      satrec = window.satellite.twoline2satrec(r.l1, r.l2);
      if (satrec.error) continue;
    } catch { continue; }
    const ep = parseEpoch(r.l1);
    const ageDays = (now - ep.date.getTime()) / 86400e3;
    sats.push({
      shell: null,         // mount 时绑定
      name: r.name || `NORAD-${satrec.satnum}`,
      line1: r.l1, line2: r.l2,
      satrec, norad: satrec.satnum,
      epochYr: ep.yr, epochDoy: ep.doy, epochDate: ep.date, ageDays,
    });
    if (ageDays > 14) expired++; else valid++;
  }
  return { valid, expired };
}

// 单星单时刻 SGP4 传播 → { lat, lon, altKm, velKmS }
function propagateOne(s, date) {
  const pv = window.satellite.propagate(s.satrec, date);
  if (!pv || !pv.position) return null;
  const gmst = window.satellite.gstime(date);
  const geo = window.satellite.eciToGeodetic(pv.position, gmst);
  const lat = geo.latitude * R2D;
  const lon = geo.longitude * R2D;
  const altKm = geo.height;
  const speed = Math.sqrt(
    pv.velocity.x ** 2 + pv.velocity.y ** 2 + pv.velocity.z ** 2
  );
  return { lat, lon, altKm, velKmS: speed };
}

// 批量传播(给覆盖 / 对比视图用,避免每帧 new Date)
function propagateBatch(filterFn, date) {
  const out = [];
  for (const s of sats) {
    if (filterFn && !filterFn(s)) continue;
    const p = propagateOne(s, date);
    if (!p) continue;
    out.push({ s, ...p });
  }
  return out;
}

/* ============================================================
   2. 覆盖网格(原样复用 v1 算法)
   ============================================================ */
function computeCoverageGrid(positions, minElevDeg, gridDeg) {
  const rows = Math.round(180 / gridDeg), cols = Math.round(360 / gridDeg);
  const grid = new Uint16Array(rows * cols);
  const lamCache = new Map();
  const lamOf = (alt) => {
    const k = Math.round(alt);
    let v = lamCache.get(k);
    if (v === undefined) { v = footprintCentralAngle(k, minElevDeg) * R2D; lamCache.set(k, v); }
    return v;
  };
  const rowOfLat = (lat) => Math.min(rows - 1, Math.max(0, Math.floor((90 - lat) / gridDeg)));
  for (const p of positions) {
    const lam = lamOf(p.altKm);
    if (lam <= 0) continue;
    const rTop = rowOfLat(Math.min(90, p.lat + lam));
    const rBot = rowOfLat(Math.max(-90, p.lat - lam));
    const cosLam = Math.cos(lam * DEG), sinLs = Math.sin(p.lat * DEG), cosLs = Math.cos(p.lat * DEG);
    for (let r = rTop; r <= rBot; r++) {
      const phi = 90 - (r + 0.5) * gridDeg;
      const denom = Math.cos(phi * DEG) * cosLs;
      let hw;
      if (denom < 1e-9) hw = Math.abs(phi - p.lat) <= lam ? 180 : -1;
      else {
        const c = (cosLam - Math.sin(phi * DEG) * sinLs) / denom;
        if (c >= 1) continue;
        hw = c <= -1 ? 180 : Math.acos(c) * R2D;
      }
      if (hw < 0) continue;
      const base = r * cols;
      if (hw >= 180) { for (let c = 0; c < cols; c++) grid[base + c]++; continue; }
      const c0 = Math.floor((p.lon - hw + 180) / gridDeg), c1 = Math.floor((p.lon + hw + 180) / gridDeg);
      for (let c = c0; c <= c1; c++) grid[base + ((c % cols) + cols) % cols]++;
    }
  }
  let covered = 0, total = 0, sum = 0, maxCount = 0;
  for (let r = 0; r < rows; r++) {
    const w = Math.cos((90 - (r + 0.5) * gridDeg) * DEG);
    for (let c = 0; c < cols; c++) {
      const v = grid[r * cols + c];
      total += w; sum += v * w;
      if (v > 0) covered += w;
      if (v > maxCount) maxCount = v;
    }
  }
  return { grid, rows, cols, stats: { maxCount, coveredFraction: covered / total, meanVisible: sum / total } };
}

/* ============================================================
   3. 太阳与昼夜晨昏线
   ============================================================ */
function sunSubpoint(tMs) {
  const d = new Date(tMs);
  const start = Date.UTC(d.getUTCFullYear(), 0, 0);
  const doy = (tMs - start) / 86400e3;
  const decl = -23.44 * Math.cos(2 * Math.PI * (doy + 10) / 365.24);
  const hours = d.getUTCHours() + d.getUTCMinutes() / 60 + d.getUTCSeconds() / 3600;
  const lon = wrapLon((12 - hours) * 15);
  return { lat: decl, lon };
}
function nightPath(ctx, W, H, sun) {
  const tanD = Math.tan(sun.lat * DEG);
  ctx.beginPath();
  if (Math.abs(tanD) < 1e-4) {
    const x0 = ((wrapLon(sun.lon + 90) + 180) / 360) * W;
    const wHalf = W / 2;
    ctx.rect(x0, 0, Math.min(wHalf, W - x0), H);
    if (x0 + wHalf > W) ctx.rect(0, 0, x0 + wHalf - W, H);
  } else {
    for (let i = 0; i <= 360; i++) {
      const lon = -180 + i;
      const phi = Math.atan(-Math.cos((lon - sun.lon) * DEG) / tanD) * R2D;
      const x = (lon + 180) / 360 * W, y = (90 - phi) / 180 * H;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    const yPole = sun.lat > 0 ? H : 0;
    ctx.lineTo(W, yPole); ctx.lineTo(0, yPole);
  }
  ctx.closePath();
}

/* ============================================================
   4. 共享状态、时间控制、海岸线、UI
   ============================================================ */
const App = { simTime: Date.now(), speed: 1 };
document.querySelectorAll(".timectl button").forEach(btn => {
  btn.addEventListener("click", () => {
    App.speed = Number(btn.dataset.speed);
    document.querySelectorAll(".timectl button").forEach(b => b.setAttribute("aria-pressed", String(b === btn)));
  });
});

let landGeo = null;
(async () => {
  try {
    const topo = await fetch("data/land-110m.json").then(r => r.json());
    // topojson-client 通过 <script> tag 预先加载到 window.topojson
    landGeo = window.topojson.feature(topo, topo.objects.land);
  } catch { /* 降级 */ }
})();

function drawBase(ctx, W, H, withNight) {
  ctx.fillStyle = "#060910"; ctx.fillRect(0, 0, W, H);
  if (landGeo) {
    ctx.fillStyle = "#16202F"; ctx.strokeStyle = "#2A3A50"; ctx.lineWidth = 1;
    ctx.beginPath();
    for (const f of landGeo.features) {
      const polys = f.geometry.type === "Polygon" ? [f.geometry.coordinates] : f.geometry.coordinates;
      for (const poly of polys) for (const ring of poly) {
        ring.forEach(([lon, lat], i) => {
          const x = (lon + 180) / 360 * W, y = (90 - lat) / 180 * H;
          i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        });
        ctx.closePath();
      }
    }
    ctx.fill(); ctx.stroke();
  }
  ctx.strokeStyle = "rgba(122,138,163,.18)"; ctx.lineWidth = 1; ctx.beginPath();
  for (let lon = -150; lon <= 150; lon += 30) { const x = (lon + 180) / 360 * W; ctx.moveTo(x, 0); ctx.lineTo(x, H); }
  for (let lat = -60; lat <= 60; lat += 30) { const y = (90 - lat) / 180 * H; ctx.moveTo(0, y); ctx.lineTo(W, y); }
  ctx.stroke();
  if (withNight) {
    const sun = sunSubpoint(App.simTime);
    ctx.save(); ctx.fillStyle = "rgba(3,6,14,.55)";
    nightPath(ctx, W, H, sun); ctx.fill(); ctx.restore();
    const sx = (sun.lon + 180) / 360 * W, sy = (90 - sun.lat) / 180 * H;
    ctx.fillStyle = "#F5A623"; ctx.beginPath(); ctx.arc(sx, sy, 4, 0, 7); ctx.fill();
    ctx.strokeStyle = "rgba(245,166,35,.5)"; ctx.beginPath(); ctx.arc(sx, sy, 8, 0, 7); ctx.stroke();
  }
}

/* ============================================================
   5. 路由框架(同 v1)
   ============================================================ */
const views = [];
const registerView = (v) => views.push(v);
let activeView = null;
function route() {
  const h = location.hash.replace(/^#\/?/, "") || "live";
  const [id, query = ""] = h.split("?");
  const target = views.find(v => v.id === id) || views[0];
  document.querySelectorAll("#tabs a").forEach(a =>
    a.setAttribute("aria-current", a.dataset.view === target.id ? "page" : "false"));
  if (activeView && activeView !== target) {
    activeView.hide?.();
    document.getElementById("view-" + activeView.id)?.classList.remove("active");
  }
  let el = document.getElementById("view-" + target.id);
  if (!el) {
    el = document.createElement("section");
    el.id = "view-" + target.id; el.className = "view";
    document.getElementById("views").appendChild(el);
    target.mount(el, new URLSearchParams(query));
  }
  el.classList.add("active");
  target.show?.(new URLSearchParams(query));
  activeView = target;
  document.title = target.label + " · Orbital Console v2";
}
window.addEventListener("hashchange", route);

/* ============================================================
   6. 视图:实时 Live(用真 SGP4)
   ============================================================ */
const LiveView = {
  id: "live", label: "实时",
  selected: null, night: true, tracks: true, visible: new Set(SHELLS.map(s => s.key)),
  observer: null,

  mount(el) {
    this.el = el;
    const shellToggles = SHELLS.map(sh => `
      <label class="toggle" data-on="true"><input type="checkbox" checked data-shell="${sh.key}">
      <span class="swatch" style="background:${sh.color}"></span>${sh.label}
      <span style="color:var(--muted)" data-count="${sh.key}">--</span></label>`).join("");
    el.innerHTML = `
      <div class="panel">

        <p class="hint">每颗卫星按其真实 TLE 元组的 SGP4 传播器计算位置。
        时间条 ×8/×60/×600 直接驱动 simTime 推算未来星下点。点击卫星看 NORAD 编号 + 轨道六根数。</p>
        <div class="ctlrow">
          ${shellToggles}
          <label class="toggle" data-on="true"><input type="checkbox" checked id="lv-night">昼夜线</label>
          <label class="toggle" data-on="true"><input type="checkbox" checked id="lv-tracks">选中轨迹</label>
        </div>
        <canvas class="map" id="lv-canvas" width="1440" height="720"></canvas>
        <div id="sat-info">点击地图上的卫星查看详情</div>
        <div class="ctlrow" style="margin-top:12px">
          <button class="act" id="lv-locate">现在我头顶有什么?</button>
          <select id="lv-city" aria-label="选择城市">
            <option value="34.05,-118.24">洛杉矶</option><option value="39.90,116.40">北京</option>
            <option value="31.23,121.47">上海</option><option value="51.51,-0.13">伦敦</option>
            <option value="-33.87,151.21">悉尼</option><option value="64.13,-21.90">雷克雅未克</option>
          </select>
          <span style="font-size:12px;color:var(--muted)">最低仰角 25°</span>
        </div>
        <div id="overhead-out"></div>
      </div>`;

    el.querySelectorAll("[data-shell]").forEach(cb => cb.addEventListener("change", (e) => {
      e.target.checked ? this.visible.add(e.target.dataset.shell) : this.visible.delete(e.target.dataset.shell);
      e.target.closest(".toggle").dataset.on = e.target.checked;
    }));
    const bind = (id, key) => el.querySelector(id).addEventListener("change", (e) => {
      this[key] = e.target.checked; e.target.closest(".toggle").dataset.on = e.target.checked;
    });
    bind("#lv-night", "night"); bind("#lv-tracks", "tracks");

    const cv = el.querySelector("#lv-canvas");
    cv.addEventListener("click", (e) => this.pick(e, cv));
    el.querySelector("#lv-locate").addEventListener("click", () => {
      const [lat, lon] = el.querySelector("#lv-city").value.split(",").map(Number);
      this.observer = { lat, lon, name: el.querySelector("#lv-city").selectedOptions[0].text };
      if (navigator.geolocation) navigator.geolocation.getCurrentPosition(
        (pos) => { this.observer = { lat: pos.coords.latitude, lon: pos.coords.longitude, name: "你的位置" }; },
        () => {}, { timeout: 3000 });
    });
  },

  pick(e, cv) {
    const rect = cv.getBoundingClientRect();
    const mx = (e.clientX - rect.left) / rect.width * cv.width;
    const my = (e.clientY - rect.top) / rect.height * cv.height;
    const t = new Date(App.simTime);
    let best = null, bestD = 12 * 12;
    for (const s of sats) {
      if (!this.visible.has(s.shell.key)) continue;
      const p = propagateOne(s, t);
      if (!p) continue;
      const dx = (p.lon + 180) / 360 * cv.width - mx, dy = (90 - p.lat) / 180 * cv.height - my;
      const d = dx * dx + dy * dy;
      if (d < bestD) { bestD = d; best = s; }
    }
    this.selected = best;
    const info = this.el.querySelector("#sat-info");
    if (best) {
      const p = propagateOne(best, t);
      const period = 1440 / ((2 * Math.PI) / best.satrec.no * 60);  // 分钟
      const ageStr = best.ageDays > 14 ? `<span class="chip warn" style="margin-left:6px">TLE ${best.ageDays.toFixed(0)}d 旧</span>` : `<span class="chip ok" style="margin-left:6px">TLE ${best.ageDays.toFixed(1)}d 龄</span>`;
      info.innerHTML = `<b>${best.name}</b> · NORAD ${best.norad} · 高度 ${p.altKm.toFixed(0)} km · 速度 ${p.velKmS.toFixed(2)} km/s · 周期 ${period.toFixed(1)} min${ageStr}`;
    } else info.textContent = "点击地图上的卫星查看详情";
  },

  frame() {
    if (sats.length === 0) return;
    const cv = this.el.querySelector("#lv-canvas");
    const ctx = cv.getContext("2d");
    const W = cv.width, H = cv.height;
    drawBase(ctx, W, H, this.night);
    const t = new Date(App.simTime);

    if (this.selected && this.tracks) {
      const s = this.selected;
      // 轨道周期(秒)
      const T = (2 * Math.PI) / s.satrec.no;
      ctx.strokeStyle = "rgba(245,166,35,.8)"; ctx.lineWidth = 1.5; ctx.beginPath();
      let prevX = null;
      for (let i = 0; i <= 90; i++) {
        const dt = new Date(App.simTime + (i / 90) * T * 1000);
        const p = propagateOne(s, dt);
        if (!p) continue;
        const x = (p.lon + 180) / 360 * W, y = (90 - p.lat) / 180 * H;
        (prevX === null || Math.abs(x - prevX) > W / 2) ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        prevX = x;
      }
      ctx.stroke();
    }
    // 批量绘制
    const visible = sats.filter(s => this.visible.has(s.shell.key));
    for (const s of visible) {
      const p = propagateOne(s, t);
      if (!p) continue;
      const x = (p.lon + 180) / 360 * W, y = (90 - p.lat) / 180 * H;
      const isSel = s === this.selected;
      ctx.fillStyle = isSel ? "#FFFFFF" : s.shell.color;
      ctx.fillRect(x - 1, y - 1, isSel ? 5 : 2, isSel ? 5 : 2);
    }
    if (this.observer) {
      const o = this.observer;
      const ox = (o.lon + 180) / 360 * W, oy = (90 - o.lat) / 180 * H;
      ctx.strokeStyle = "#6BCB77"; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(ox, oy, 6, 0, 7); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(ox - 10, oy); ctx.lineTo(ox + 10, oy); ctx.moveTo(ox, oy - 10); ctx.lineTo(ox, oy + 10); ctx.stroke();
      let count = 0, bestEl = -90, bestSat = null;
      for (const s of visible) {
        const p = propagateOne(s, t);
        if (!p) continue;
        const g = Math.acos(Math.min(1, Math.sin(p.lat * DEG) * Math.sin(o.lat * DEG) +
          Math.cos(p.lat * DEG) * Math.cos(o.lat * DEG) * Math.cos((p.lon - o.lon) * DEG)));
        if (g < footprintCentralAngle(p.altKm, 25)) {
          count++;
          const r = RE + p.altKm;
          const elv = Math.atan2(Math.cos(g) - RE / r, Math.sin(g)) * R2D;
          if (elv > bestEl) { bestEl = elv; bestSat = s; }
        }
      }
      this.el.querySelector("#overhead-out").innerHTML = count
        ? `${o.name}上空(仰角>25°):<b>${count}</b> 颗可见,最高 <b>${bestSat?.name || "?"}</b>(仰角 ${bestEl.toFixed(0)}°)`
        : `${o.name}上空(仰角>25°):当前 0 颗——等几分钟或按 ×60 快进看看`;
    }
  },
};

      .map(p => ({ lat: p.lat, lon: p.lon, altKm: p.altKm }));

      this.el.querySelector("#cv-k1").textContent = "0%";

    this.el.querySelector("#cv-k2").textContent = g.stats.meanVisible.toFixed(1);

    this.el.querySelector("#cv-k4").textContent = (footprintAreaFraction(meanAlt, this.elev) * 100).toFixed(2) + "%";
    this.el.querySelector("#cv-max").textContent = g.stats.maxCount;

    const cv = this.el.querySelector("#cv-canvas"), ctx = cv.getContext("2d");
    const W = cv.width, H = cv.height, cw = W / g.cols, chh = H / g.rows;
    ctx.fillStyle = "#060910"; ctx.fillRect(0, 0, W, H);
    const maxC = Math.max(1, g.stats.maxCount);
    for (let r = 0; r < g.rows; r++) for (let c = 0; c < g.cols; c++) {
      const v = g.grid[r * g.cols + c];
      if (!v) continue;
      const tt = Math.pow(v / maxC, 0.55);
      ctx.fillStyle = heat(tt);
      ctx.fillRect(c * cw, r * chh, cw + .5, chh + .5);
    }
    if (landGeo) {
      ctx.strokeStyle = "rgba(213,222,236,.35)"; ctx.lineWidth = 1; ctx.beginPath();
      for (const f of landGeo.features) {
        const polys = f.geometry.type === "Polygon" ? [f.geometry.coordinates] : f.geometry.coordinates;
        for (const poly of polys) for (const ring of poly) {
          ring.forEach(([lon, lat], i) => {
            const x = (lon + 180) / 360 * W, y = (90 - lat) / 180 * H;
            i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
          });
          ctx.closePath();
        }
      }
      ctx.stroke();
    }
  },
};

function heat(t) {
  const stops = [[0,[6,9,16]],[.15,[17,34,51]],[.4,[27,95,122]],[.7,[47,163,199]],[.9,[86,200,232]],[1,[191,240,255]]];
  for (let i = 1; i < stops.length; i++) if (t <= stops[i][0]) {
    const [t0, c0] = stops[i-1], [t1, c1] = stops[i], k = (t - t0) / (t1 - t0);
    const c = c0.map((v, j) => Math.round(v + (c1[j] - v) * k));
    return `rgb(${c[0]},${c[1]},${c[2]})`;
  }
  return "rgb(191,240,255)";
}

async function loadAll() {
  const overlay = document.getElementById("load-overlay");
  const loadMsg = document.getElementById("load-msg");
  const loadSub = document.getElementById("load-sub");
  let manifest = null;
  try {
    const r = await fetch("data/manifest.json");
    manifest = await r.json();
    loadSub.textContent = `manifest v${manifest.version} · ${Object.keys(manifest.groups).length} 组`;
  } catch (e) {
    overlay.innerHTML = `<div style="color:var(--red);font-family:var(--mono)">manifest.json 加载失败: ${e.message}<br><br><a href="data/manifest.json" target="_blank">点击查看 manifest</a></div>`;
    return;
  }

  // 按 group 并发 fetch
  const results = await Promise.all(SHELLS.map(async sh => {
    const url = `data/${sh.file}`;
    loadSub.textContent = `正在拉 ${sh.label} (${url})…`;
    try {
      const r = await fetch(url);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const buf = await r.arrayBuffer();
      const blob = new Uint8Array(buf);
      const records = unpackZTLE(blob);
      const { valid, expired } = buildSatrecs(records);
      // 绑定 shell 引用
      const added = sats.length;
      for (let i = added; i < sats.length; i++) sats[i].shell = sh;
      return { sh, count: sats.length - added, valid, expired, total: records.length };
    } catch (e) {
      console.error(`load ${sh.key} failed:`, e);
      return { sh, count: 0, valid: 0, expired: 0, total: 0, error: e.message };
    }
  }));

  // 更新 mission strip + 各 shell 计数
  const totalAll = results.reduce((a, r) => a + r.count, 0);
  document.getElementById("ms-count").textContent = totalAll.toLocaleString();
  // LiveView shell counts(等 mount 后填)
  setTimeout(() => {
    for (const r of results) {
      const el = document.querySelector(`[data-count="${r.sh.key}"]`);
      if (el) el.textContent = r.count.toLocaleString();
    }
    const totalEl = document.getElementById("lv-total");
    if (totalEl) totalEl.textContent = totalAll.toLocaleString();
  }, 100);

  // 数据龄期 chip
  const ageH = ((Date.now() - Date.parse(manifest.generated_at_utc)) / 3600e3).toFixed(1);
  const ageChip = document.getElementById("ms-age");
  if (ageH < 72) { ageChip.className = "chip ok"; ageChip.textContent = `${ageH}h 前 (CelesTrak)`; }
  else if (ageH < 336) { ageChip.className = "chip warn"; ageChip.textContent = `${ageH}h 前`; }
  else { ageChip.className = "chip err"; ageChip.textContent = `${ageH}h 前 (> 14d)`; }

  // 控制台 banner
  console.log(`%c[Orbital Console v2] 已加载 ${totalAll} 颗真卫星(SGP4 ready)`, "color:#56C8E8;font-weight:bold");
  for (const r of results) {
    if (r.error) console.warn(`  ${r.sh.key}: FAILED ${r.error}`);
    else console.log(`  ${r.sh.label}: ${r.count} 颗(TLE ${r.valid} 新鲜, ${r.expired} 旧)`);
  }

  document.getElementById("ms-epoch").textContent = new Date().toISOString().slice(0, 16).replace("T", " ");
  overlay.classList.add("done");
  route();
}
loadAll();

let lastTick = performance.now();
function loop(now) {
  const dt = now - lastTick; lastTick = now;
  if (App.speed > 0) {
    App.simTime += dt * App.speed;
    if (App.speed === 1) App.simTime = Date.now();
  }
  document.getElementById("ms-utc").textContent =
    new Date(App.simTime).toISOString().slice(11, 19) +
    (App.speed === 1 ? "" : App.speed === 0 ? " ⏸" : " ×" + App.speed);
  if (activeView === LiveView && LiveView.el) LiveView.frame();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
