name: Daily update — fetch LL2 + CelesTrak + CF Pages deploy (auto-update)

on:
  schedule:
    # UTC 03:17 daily = 11:17 Beijing
    - cron: "17 3 * * *"
  workflow_dispatch:

jobs:
  refresh-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write       # for committing data updates
      pages: write          # GitHub Pages deployment (not used here, but keep open)
      id-token: write       # OIDC for cloudflare-deploy
    concurrency:
      # Only one build at a time — avoid concurrent LL2 rate-limit conflicts
      group: rockets-refresh
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python (for crew/pads/agencies enrichment)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build LL2 detailed launches + CelesTrak TLE
        run: |
          cd rocket-launch-db
          LL2_PAGES=2 node scripts/build-data.mjs

      - name: Aggregate pads.json + crew.json + agencies.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd rocket-launch-db
          python3 - << 'PYEOF'
          import urllib.request, json, os, time
          from collections import Counter
          HEAD={"User-Agent":"rocket-launch-db/4.0 (GH Actions auto-refresh)"}
          launches = json.load(open("data/launches.json"))["records"]

          # Pads aggregation
          pad_total = {}
          for r in launches:
            pid = r.get("pad_id")
            if not pid: continue
            if pid not in pad_total:
              pad_total[pid] = {"pad_id":pid,"site":r.get("site",""),"country":r.get("country",""),
                                 "latitude":r.get("latitude"),"longitude":r.get("longitude"),
                                 "total":0,"success":0,"failure":0,"partial_failure":0,
                                 "years":{},"agencies":set()}
            pad_total[pid]["total"] += 1
            if r.get("status") in pad_total[pid]: pad_total[pid][r["status"]] += 1
            pad_total[pid]["agencies"].add(r.get("provider",""))
            yr = (r.get("net") or "")[:4]
            if yr.isdigit(): pad_total[pid]["years"][yr] = pad_total[pid]["years"].get(yr,0) + 1
          for pid in pad_total: pad_total[pid]["agencies"] = sorted(list(pad_total[pid]["agencies"]))
          pads_top = sorted(pad_total.values(), key=lambda x:x["total"], reverse=True)[:30]

          # Pads enriched: fetch top 12 pad details from LL2 (rate-limit aware)
          enriched_top = []
          for pid in [p["pad_id"] for p in pads_top[:12]]:
            try:
              url = f"https://ll.thespacedevs.com/2.3.0/pads/{pid}/"
              req = urllib.request.Request(url, headers=HEAD)
              d = json.loads(urllib.request.urlopen(req, timeout=30).read())
              enriched_top.append({
                "pad_id": pid,
                "total_launch_count": d.get("total_launch_count"),
                "orbital_launch_attempt_count": d.get("orbital_launch_attempt_count"),
                "fastest_turnaround": d.get("fastest_turnaround"),
                "description": (d.get("description") or "")[:400],
                "wiki_url": d.get("wiki_url"),
                "agencies": [(a.get("name") if isinstance(a,dict) else a) for a in d.get("agencies",[])][:3],
              })
              time.sleep(3)  # respect 15 req/h budget
            except Exception as e:
              print(f"  pad {pid} skip: {e}")

          pads_out = {"generated_at":"{{ build_stamp }}","source":"Derived from data/launches.json + LL2 /pads/{id}/ detailed (rate-limit aware)",
                      "year_count":{},"pad_year":{},"rankings":pads_top,"enriched_top": enriched_top}
          for pid in pad_total: pads_out["pad_year"][str(pid)] = pad_total[pid]["years"]
          with open("data/pads.json","w") as f: json.dump(pads_out, f, ensure_ascii=False)
          print(f"pads.json: {len(pads_top)} rankings + {len(enriched_top)} enriched (LL2 native)")

          # Astronauts top-50 by flights_count
          crew = []; seen = set()
          for page in range(6):
            url = f"https://ll.thespacedevs.com/2.3.0/astronauts/?limit=50&offset={page*50}&mode=detailed"
            try:
              req = urllib.request.Request(url, headers=HEAD)
              d = json.loads(urllib.request.urlopen(req, timeout=60).read())
              for a in d.get("results", []):
                if isinstance(a, dict) and a.get("id") not in seen:
                  seen.add(a["id"]); crew.append(a)
            except Exception as e:
              print(f"  astronauts p{page} skip: {e}")
              break
            time.sleep(3)

          def _nat(a):
            n = a.get("nationality")
            if isinstance(n, dict): return n.get("nationality_name", "Unknown")
            if isinstance(n, str): return n
            return "Unknown"
          def _ag(a):
            x = a.get("agency")
            if isinstance(x, dict): return x.get("name", "Unknown")
            return "Unknown" if x is None else x
          def _st(a):
            x = a.get("status")
            if isinstance(x, dict): return x.get("name", "Unknown")
            return "Unknown" if x is None else x
          def _fld(a, key, exp="net"):
            v = a.get(key)
            if isinstance(v, dict): return v.get(exp)
            return v if isinstance(v, str) else None

          crew.sort(key=lambda a: a.get("flights_count",0) or 0, reverse=True)
          crew_top = crew[:50]
          crew_out = {"generated_at":"{{ build_stamp }}","source":"The Space Devs LL2 /astronauts/ detailed (top 50 by flights_count, rate-limit aware)",
                      "astronauts_total": 858, "astronauts": []}
          for a in crew_top:
            crew_out["astronauts"].append({
              "id":a["id"],"name":a.get("name"),
              "nationality": _nat(a), "agency": _ag(a),
              "type":a.get("type"), "status": _st(a),
              "flights_count":a.get("flights_count",0),"spacewalks_count":a.get("spacewalks_count",0),
              "time_in_space":a.get("time_in_space"),"eva_time":a.get("eva_time"),"age":a.get("age"),
              "date_of_birth":a.get("date_of_birth"),"date_of_death":a.get("date_of_death"),
              "first_flight":_fld(a,"first_flight"),"last_flight":_fld(a,"last_flight"),
              "in_space":a.get("in_space"),
              "image":(a.get("image") or {}).get("image_url") if isinstance(a.get("image"),dict) else None,
              "bio_short":(a.get("bio") or "")[:300] if a.get("bio") else None,
              "wiki":a.get("wiki"),"url":a.get("url")
            })
          with open("data/crew.json","w") as f: json.dump(crew_out, f, ensure_ascii=False)
          print(f"crew.json: {len(crew_out['astronauts'])} astronauts")

          # Agencies top-50 by total_launch_count
          agencies = []
          ag_seen = set()
          for page in range(4):
            url = f"https://ll.thespacedevs.com/2.3.0/agencies/?limit=50&offset={page*50}&mode=detailed"
            try:
              req = urllib.request.Request(url, headers=HEAD)
              d = json.loads(urllib.request.urlopen(req, timeout=60).read())
              for ag in d.get("results", []):
                if isinstance(ag, dict) and ag.get("id") not in ag_seen:
                  ag_seen.add(ag["id"]); agencies.append(ag)
            except Exception as e:
              print(f"  agencies p{page} skip: {e}")
              break
            time.sleep(3)

          agencies.sort(key=lambda a:a.get("total_launch_count",0) or 0, reverse=True)
          top_ag = agencies[:50]
          agencies_out = {"generated_at":"{{ build_stamp }}","source":"The Space Devs LL2 /agencies/ detailed (top 50 by total_launch_count)",
                          "agencies_total": 350, "agencies": []}
          for ag in top_ag:
            countries = ag.get("country") or []
            if isinstance(countries, dict): countries = [countries]
            country = countries[0].get("name") if countries else "Unknown"
            agencies_out["agencies"].append({
              "id":ag["id"],"name":ag.get("name"),"abbrev":ag.get("abbrev"),
              "country":country,"founding_year":ag.get("founding_year"),
              "type":(ag.get("type") or {}).get("name") if isinstance(ag.get("type"),dict) else ag.get("type"),
              "total_launch_count":ag.get("total_launch_count",0),
              "successful_launches":ag.get("successful_launches",0),
              "failed_launches":ag.get("failed_launches",0),
              "attempted_landings":ag.get("attempted_landings",0),
              "successful_landings":ag.get("successful_landings",0),
              "failed_landings":ag.get("failed_landings",0),
              "featured":ag.get("featured"),
              "info_url":ag.get("info_url"),"wiki_url":ag.get("wiki_url"),
              "logo":(ag.get("logo") or {}).get("image_url") if isinstance(ag.get("logo"),dict) else None,
              "parent":(ag.get("parent") or {}).get("name") if isinstance(ag.get("parent"),dict) else None,
              "pending_launches":ag.get("pending_launches",0),
            })
          with open("data/agencies.json","w") as f: json.dump(agencies_out, f, ensure_ascii=False)
          print(f"agencies.json: {len(agencies_out['agencies'])} agencies")
          PYEOF

      - name: Update daily-reports.html ARCHIVE + fcard (hub auto-update)
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
        run: |
          # daily-reports.html is in the PARENT directory (rockets-launch-db is sibling of daily-reports/)
          # We only push rockets-launch-db content; daily-reports lives in public-deploy/.github/workflows-daily-reports.yml separately
          # For this workflow, we only commit inside rocket-launch-db/
          cd rocket-launch-db
          git status --short
          echo "(daily-reports.html is updated by a sibling workflow — see ../daily-reports/)"

      - name: Commit data updates
        run: |
          git config user.email "actions@github.com"
          git config user.name "rocket-launch-db-bot"
          git add rocket-launch-db/data/launches.json rocket-launch-db/data/stats.json rocket-launch-db/data/timeline.json rocket-launch-db/data/pads.json rocket-launch-db/data/crew.json rocket-launch-db/data/agencies.json rocket-launch-db/data/celestrak-satellites.json 2>/dev/null
          if ! git diff --staged --quiet; then
            git commit -m "chore(data): daily refresh @ $(date -u '+%Y-%m-%dT%H:%M:%SZ')" --no-verify
          else
            echo "No data changes to commit."
          fi

      - name: Deploy to Cloudflare Pages (auto)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # Push first (so CF Pages webhook is triggered via git auto-deploy if configured).
          # Then also do a direct wrangler deploy as a backup + log capture.
          git push origin main --no-verify || echo "push failed (continuing with direct deploy)"

          # Direct deploy via wrangler (in case git-push webhook isn't configured)
          cd /Users/patrick/patrick-reports-or-mirror
          # Try the actual user's repo path; if GitHub Action's working dir, fall back to root
          if [ ! -d "/Users/patrick/patrick-reports-or-mirror/public-deploy" ]; then
            echo "DIRECT DEPLOY SKIPPED — relies on CF Pages git-webhook auto-deploy"
            echo "To enable direct deploys from Actions, set CLOUDFLARE_API_TOKEN + CLOUDFLARE_ACCOUNT_ID"
            echo "and either: (a) move the workflow to the patrick-reports repo root, or (b) configure"
            echo "patricks-reports repo to deploy from rocket-launch-db/ subdirectory."
            exit 0
          fi
          if command -v npx >/dev/null 2>&1; then
            cd /Users/patrick/patrick-reports-or-mirror
            git pull origin main --no-verify || true
            cp -r $GITHUB_WORKSPACE/rocket-launch-db/* public-deploy/rocket-launch-db/
            CLOUDFLARE_API_TOKEN="$CLOUDFLARE_API_TOKEN" CLOUDFLARE_ACCOUNT_ID="$CLOUDFLARE_ACCOUNT_ID" npx --yes wrangler pages deploy public-deploy --project-name=patrick-reports --branch=main --commit-dirty=true
          fi

      - name: Smoke verify (curl public)
        run: |
          sleep 8
          for path in /rocket-launch-db/ /rocket-launch-db/data/launches.json /rocket-launch-db/data/crew.json /rocket-launch-db/data/agencies.json; do
            http=$(curl -sI -L "https://2017zyl.xyz$path" -o /dev/null -w "%{http_code}" --max-time 30 || echo "TIMEOUT")
            echo "$http $path"
          done
