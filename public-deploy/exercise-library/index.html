<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#0b0d12">
<title>健身动作库 · 1,324 个动作</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%92%AA%3C/text%3E%3C/svg%3E">
<style>
/* ===== theme tokens ===== */
:root[data-theme="dark"]{
  --bg:#0b0d12;--bg2:#131722;--bg3:#1c2230;--line:#2a3144;
  --fg:#e8ecf3;--fg2:#a4adbf;--fg3:#6c7591;
  --accent:#6ee7b7;--accent2:#34d399;--danger:#f87171;--warn:#fbbf24;
  --chip-bg:#1c2230;--chip-active:#1f3a2e;--chip-active-border:#34d399;
  --card-shadow:0 2px 8px rgba(0,0,0,.4);
  --modal-bg:rgba(0,0,0,.85);
}
:root[data-theme="light"]{
  --bg:#fafbfc;--bg2:#fff;--bg3:#f0f2f6;--line:#e2e6ee;
  --fg:#0b0d12;--fg2:#4a5163;--fg3:#8c93a7;
  --accent:#059669;--accent2:#10b981;--danger:#dc2626;--warn:#d97706;
  --chip-bg:#fff;--chip-active:#d1fae5;--chip-active-border:#059669;
  --card-shadow:0 2px 8px rgba(0,0,0,.08);
  --modal-bg:rgba(0,0,0,.7);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC","Hiragino Sans GB","Microsoft YaHei","Segoe UI",Roboto,sans-serif;
  background:var(--bg);color:var(--fg);font-size:14px;line-height:1.5;
  -webkit-font-smoothing:antialiased;transition:background .15s,color .15s}
a{color:var(--accent);text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}

/* ===== header ===== */
header{position:sticky;top:0;z-index:50;background:var(--bg2);border-bottom:1px solid var(--line);
  backdrop-filter:saturate(180%) blur(12px);-webkit-backdrop-filter:saturate(180%) blur(12px)}
.hdr-inner{max-width:1400px;margin:0 auto;padding:12px 20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.brand{font-weight:700;font-size:16px;display:flex;align-items:center;gap:8px;white-space:nowrap}
.brand .count{color:var(--fg3);font-weight:400;font-size:13px;margin-left:4px}
.search-wrap{flex:1;min-width:200px;max-width:520px;position:relative}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--fg3);pointer-events:none}
#search{width:100%;padding:8px 12px 8px 34px;background:var(--bg3);border:1px solid var(--line);
  border-radius:8px;color:var(--fg);font-size:14px;outline:none;transition:border .15s}
#search:focus{border-color:var(--accent)}
.icon-btn{display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;
  border-radius:8px;background:var(--bg3);border:1px solid var(--line);transition:background .15s}
.icon-btn:hover{background:var(--line)}
.icon-btn.active{background:var(--chip-active);border-color:var(--chip-active-border);color:var(--accent)}

/* ===== lang toggle ===== */
.lang-toggle{display:inline-flex;background:var(--bg3);border:1px solid var(--line);border-radius:8px;overflow:hidden;height:36px}
.lang-btn{padding:0 10px;font-size:13px;font-weight:600;color:var(--fg3);transition:all .12s;min-width:32px}
.lang-btn:hover{color:var(--fg);background:var(--line)}
.lang-btn.active{background:var(--chip-active);color:var(--accent)}

/* ===== filter bar ===== */
.filters{position:sticky;top:57px;z-index:40;background:var(--bg2);border-bottom:1px solid var(--line);
  padding:10px 20px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;max-width:1400px;margin:0 auto}
.filter-group{display:flex;align-items:center;gap:6px}
.filter-group label{color:var(--fg3);font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.chip{padding:5px 11px;border-radius:999px;background:var(--chip-bg);border:1px solid var(--line);
  color:var(--fg2);font-size:12px;font-weight:500;transition:all .12s;white-space:nowrap}
.chip:hover{border-color:var(--fg3);color:var(--fg)}
.chip.active{background:var(--chip-active);border-color:var(--chip-active-border);color:var(--accent);font-weight:600}
.chip .x{margin-left:6px;opacity:.6}
.results-count{color:var(--fg3);font-size:13px;margin-left:auto;white-space:nowrap}
.results-count b{color:var(--accent)}

/* ===== grid ===== */
main{max-width:1400px;margin:0 auto;padding:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
.card{background:var(--bg2);border:1px solid var(--line);border-radius:10px;overflow:hidden;
  cursor:pointer;position:relative;transition:transform .12s,border-color .12s,box-shadow .12s}
.card:hover{transform:translateY(-2px);border-color:var(--accent);box-shadow:var(--card-shadow)}
.card .thumb{aspect-ratio:1;background:var(--bg3);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
.card img.thumb-img{width:100%;height:100%;object-fit:cover;display:block}
.card .play-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,0);transition:background .15s;pointer-events:none}
.card:hover .play-overlay{background:rgba(0,0,0,.25)}
.card .play-overlay svg{opacity:0;transition:opacity .15s;color:#fff;filter:drop-shadow(0 2px 4px rgba(0,0,0,.5))}
.card:hover .play-overlay svg{opacity:1}
.card .info{padding:10px 12px}
.card .name{font-weight:600;font-size:13px;line-height:1.3;margin-bottom:4px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card .meta{font-size:11px;color:var(--fg3);display:flex;gap:6px;flex-wrap:wrap}
.card .meta span{padding:1px 6px;background:var(--bg3);border-radius:4px}
.card .fav{position:absolute;top:6px;right:6px;width:30px;height:30px;border-radius:50%;
  background:rgba(0,0,0,.5);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .15s;color:#fff}
.card:hover .fav,.card .fav.faved{opacity:1}
.card .fav.faved{color:var(--warn)}

/* ===== empty state ===== */
.empty{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--fg3)}
.empty .icon{font-size:48px;margin-bottom:12px;opacity:.5}
.empty h3{color:var(--fg2);font-weight:600;margin-bottom:6px}

/* ===== load more ===== */
.load-wrap{text-align:center;padding:30px 20px}
.load-more{padding:10px 24px;border-radius:8px;background:var(--chip-active);color:var(--accent);
  border:1px solid var(--chip-active-border);font-weight:600;font-size:14px;transition:opacity .15s}
.load-more:hover{opacity:.85}
.load-more:disabled{opacity:.4;cursor:default}

/* ===== modal ===== */
.modal-backdrop{position:fixed;inset:0;background:var(--modal-bg);backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);z-index:100;display:none;align-items:center;justify-content:center;
  padding:20px;animation:fadeIn .15s}
.modal-backdrop.open{display:flex}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--bg2);border:1px solid var(--line);border-radius:14px;
  max-width:760px;width:100%;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;
  animation:slideUp .2s}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:none;opacity:1}}
.modal-header{padding:14px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px}
.modal-header h2{flex:1;font-size:18px;font-weight:700;line-height:1.3}
.modal-body{flex:1;overflow-y:auto;padding:18px}
.demo-wrap{background:#000;border-radius:10px;overflow:hidden;margin-bottom:16px;text-align:center;
  min-height:280px;display:flex;align-items:center;justify-content:center;position:relative}
.demo-wrap img{max-width:100%;max-height:50vh;display:block}
.demo-wrap .loading{color:var(--fg3);padding:40px;font-size:14px}
.demo-badge{position:absolute;top:8px;left:8px;background:rgba(0,0,0,.7);color:var(--accent);
  padding:3px 8px;border-radius:4px;font-size:11px;font-weight:600;letter-spacing:.05em;
  backdrop-filter:blur(4px);display:flex;align-items:center;gap:4px}
.demo-badge.gif-badge{color:var(--warn)}
.demo-badge.static-badge{color:var(--fg3)}
.demo-controls{display:flex;gap:8px;justify-content:center;margin-bottom:16px}
.demo-controls button{padding:6px 14px;border-radius:6px;background:var(--bg3);border:1px solid var(--line);
  color:var(--fg2);font-size:13px;font-weight:500;transition:all .12s}
.demo-controls button:hover{border-color:var(--accent);color:var(--fg)}
.demo-controls button.active{background:var(--chip-active);border-color:var(--chip-active-border);color:var(--accent)}
.demo-controls button:disabled{opacity:.3;cursor:default}
.section{margin-bottom:18px}
.section h3{font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--fg3);
  margin-bottom:8px;font-weight:700}
.tags{display:flex;flex-wrap:wrap;gap:6px}
.tag{padding:4px 10px;background:var(--bg3);border-radius:6px;font-size:12px;color:var(--fg2)}
.steps{list-style:none;counter-reset:step}
.steps li{counter-increment:step;padding:10px 12px 10px 44px;position:relative;
  background:var(--bg3);border-radius:8px;margin-bottom:8px;font-size:14px;line-height:1.55}
.steps li::before{content:counter(step);position:absolute;left:10px;top:10px;width:24px;height:24px;
  border-radius:50%;background:var(--accent);color:#0b0d12;font-weight:700;font-size:12px;
  display:flex;align-items:center;justify-content:center}
.modal-footer{padding:12px 18px;border-top:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
.modal-nav{display:flex;gap:6px}
.modal-nav button{width:36px;height:36px;border-radius:8px;background:var(--bg3);border:1px solid var(--line);
  display:flex;align-items:center;justify-content:center;transition:background .12s}
.modal-nav button:hover:not(:disabled){background:var(--chip-active);border-color:var(--chip-active-border);color:var(--accent)}
.modal-nav button:disabled{opacity:.3;cursor:default}

/* ===== back to top ===== */
.to-top{position:fixed;bottom:24px;right:24px;width:44px;height:44px;border-radius:50%;
  background:var(--accent);color:#0b0d12;display:none;align-items:center;justify-content:center;
  box-shadow:0 4px 12px rgba(0,0,0,.3);z-index:60;transition:opacity .15s,transform .15s}
.to-top.visible{display:flex}
.to-top:hover{transform:translateY(-2px)}

/* ===== toast ===== */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--bg3);border:1px solid var(--line);color:var(--fg);padding:10px 18px;border-radius:8px;
  font-size:13px;font-weight:500;opacity:0;transition:all .2s;z-index:200;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ===== skeleton ===== */
.skeleton{background:linear-gradient(90deg,var(--bg3) 0%,var(--line) 50%,var(--bg3) 100%);
  background-size:200% 100%;animation:shimmer 1.5s infinite}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel-card{aspect-ratio:1;border-radius:10px}

/* ===== responsive ===== */
@media (max-width:680px){
  .hdr-inner{padding:10px 14px;gap:10px}
  .brand{font-size:14px}
  .filters{padding:8px 14px;top:53px;gap:8px}
  main{padding:14px}
  .grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
  .card .info{padding:8px 10px}
  .card .name{font-size:12px}
  .modal{max-height:95vh;border-radius:12px 12px 0 0;align-self:flex-end}
  .modal-backdrop{padding:0;align-items:flex-end}
  .demo-wrap img{max-height:40vh}
}
</style>
</head>
<body>

<header>
  <div class="hdr-inner">
    <div class="brand">💪 健身动作库 <span class="count" id="total-count"></span></div>
    <div class="search-wrap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>

      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
    </button>
    <button class="icon-btn" id="theme-toggle" title="切换主题">
      <svg id="theme-icon-dark" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <svg id="theme-icon-light" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>

</header>

<main>

<!-- Modal -->

      </button>
    </div>
    <div class="modal-body">
      <div class="demo-wrap" id="m-gif">
        <div class="loading">加载中…</div>
      </div>

        <button id="m-play" class="active">▶ 播放</button>
        <button id="m-pause">⏸ 暂停</button>

        <h3>目标肌群</h3>

<button class="to-top" id="to-top" title="回到顶部 (Home)">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m18 15-6-6-6 6"/></svg>
</button>

<div class="toast" id="toast"></div>

<script>
/* ====================================================================
 * 健身动作库 — 单文件 SPA (中文版)
 * 修复: GIF 加载失败时自动 fallback 到 images_local/*.jpg
 * ==================================================================== */

const PAGE_SIZE = 60;
const DATA_URL  = 'lean.json?v=20260710b';
const HIST_KEY  = 'exlib_history_v1';
const FAV_KEY   = 'exlib_favs_v1';
const THEME_KEY = 'exlib_theme_v1';
const LANG_KEY  = 'exlib_lang_v1';

/* ---------- state ---------- */
let ALL = [];                  // 完整数据集 (1324)
let FILTERED = [];             // 过滤 + 搜索后
let SHOWN = 0;                 // 已渲染数量
let ACTIVE_BP = '';
let ACTIVE_EQ = '';
let SEARCH_Q = '';
let LANG = 'zh';   // 当前语言: 'zh' | 'en'
let ONLY_FAV = false;
let ONLY_HIST = false;
let CURRENT_IDX = -1;

/* ---------- DOM ---------- */
const $ = sel => document.querySelector(sel);
const grid = $('#grid');
const search = $('#search');

/* ====================================================================
 * THEME
 * ==================================================================== */
function applyTheme(t){
  document.documentElement.setAttribute('data-theme', t);
  $('#theme-icon-dark').style.display  = t === 'dark'  ? 'none' : '';
  $('#theme-icon-light').style.display = t === 'light' ? 'none' : '';
  const meta = document.querySelector('meta[name=theme-color]');
  if(meta) meta.content = t === 'dark' ? '#0b0d12' : '#fafbfc';
  try { localStorage.setItem(THEME_KEY, t); } catch{}
}
function initTheme(){
  let t = 'dark';
  try { t = localStorage.getItem(THEME_KEY) || (matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark'); } catch{}
  applyTheme(t);
}

/* ====================================================================
 * FAVORITES / HISTORY
 * ==================================================================== */
function loadJSON(k, fb){ try { return JSON.parse(localStorage.getItem(k)) ?? fb; } catch{ return fb; } }
function saveJSON(k, v){ try { localStorage.setItem(k, JSON.stringify(v)); } catch{} }

let FAVS = new Set(loadJSON(FAV_KEY,  []));
let HIST = loadJSON(HIST_KEY, []);     // [{id, ts}]

function toggleFav(id){
  if(FAVS.has(id)) FAVS.delete(id); else FAVS.add(id);
  saveJSON(FAV_KEY, [...FAVS]);
  render();
}
function pushHist(id){
  HIST = HIST.filter(h => h.id !== id);
  HIST.unshift({id, ts: Date.now()});
  HIST = HIST.slice(0, 60);
  saveJSON(HIST_KEY, HIST);
}

/* ====================================================================
 * LOAD + INDEX
 * ==================================================================== */
async function loadData(){
  try {
    const r = await fetch(DATA_URL);
    if(!r.ok) throw new Error('HTTP '+r.status);
    ALL = await r.json();
  } catch(err){
    grid.innerHTML = `<div class="empty">
      <div class="icon">⚠️</div>
      <h3>加载失败</h3>
      <p>${err.message}</p>
      <p style="margin-top:12px;font-size:12px">请确认已在当前目录启动 <code>python3 -m http.server</code>。</p>
    </div>`;
    return;
  }
  $('#total-count').textContent = `· 共 ${ALL.length.toLocaleString()} 个动作`;
  $('#results-total').textContent = ALL.length.toLocaleString();
  buildChips();
  applyFilter();
}

function uniqueSorted(arr){
  return [...new Set(arr)].filter(Boolean).sort((a,b)=>a.localeCompare(b));
}
function buildChips(){
  // 用全局 BP_ZH / EQ_ZH (文件底部, 完整 10+35 覆盖)
  const bpList = uniqueSorted(ALL.map(e=>e.bp));
  const bpEl = $('#bp-chips'); bpEl.innerHTML = '';
  bpList.forEach(rawBp => {
    const c = document.createElement('button');
    c.className = 'chip'; c.dataset.bp = rawBp; c.textContent = bpZh(rawBp);
    c.onclick = () => { ACTIVE_BP = (ACTIVE_BP === rawBp ? '' : rawBp); applyFilter(); };
    bpEl.appendChild(c);
  });
  // equipment
  const eqList = uniqueSorted(ALL.map(e=>e.eq));
  const eqEl = $('#eq-chips'); eqEl.innerHTML = '';
  eqList.forEach(eq => {
    const c = document.createElement('button');
    c.className = 'chip'; c.dataset.eq = eq; c.textContent = eqZh(eq);
    c.onclick = () => { ACTIVE_EQ = (ACTIVE_EQ === eq ? '' : eq); applyFilter(); };
    eqEl.appendChild(c);
  });
}

/* ====================================================================
 * FILTER + RENDER
 * ==================================================================== */
function applyFilter(){
  const q = SEARCH_Q.trim().toLowerCase();
  const favSet = FAVS;
  const histSet = new Set(HIST.map(h=>h.id));
  FILTERED = ALL.filter(e => {
    if(ACTIVE_BP && e.bp !== ACTIVE_BP) return false;
    if(ACTIVE_EQ && e.eq !== ACTIVE_EQ) return false;
    if(ONLY_FAV  && !favSet.has(e.id)) return false;
    if(ONLY_HIST && !histSet.has(e.id)) return false;
    if(q){
      const nameHay = LANG === 'zh' ? (e.name_zh || e.name) : e.name;
      const hay = (nameHay+' '+e.bp+' '+e.eq+' '+e.tg+' '+(e.sec||[]).join(' ')).toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });
  // sync chip visuals
  document.querySelectorAll('#bp-chips .chip').forEach(c => c.classList.toggle('active', c.dataset.bp === ACTIVE_BP));
  document.querySelectorAll('#eq-chips .chip').forEach(c => c.classList.toggle('active', c.dataset.eq === ACTIVE_EQ));
  $('#fav-toggle').classList.toggle('active', ONLY_FAV);
  $('#history-toggle').classList.toggle('active', ONLY_HIST);
  $('#results-n').textContent = FILTERED.length.toLocaleString();
  SHOWN = 0;
  grid.innerHTML = '';
  renderPage();
}

function renderPage(){
  const slice = FILTERED.slice(SHOWN, SHOWN + PAGE_SIZE);
  if(SHOWN === 0 && slice.length === 0){
    grid.innerHTML = `<div class="empty">
      <div class="icon">🤷</div>
      <h3>没有匹配的动作</h3>
      <p>试试清空筛选条件或搜索词。</p>
    </div>`;
    $('#load-wrap').style.display = 'none';
    return;
  }
  const frag = document.createDocumentFragment();
  slice.forEach((e, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.id = e.id;
    card.dataset.idx = SHOWN + i;
    const isFav = FAVS.has(e.id);
    const nameDisplay = LANG === 'zh' ? (e.name_zh || e.name) : e.name;
    card.innerHTML = `
      <div class="thumb">
        <img class="thumb-img" loading="lazy" decoding="async"
             src="${e.img}" alt="${nameDisplay}"
             onerror="this.style.opacity=.15">
        <div class="play-overlay"><svg width="48" height="48" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></div>
      </div>
      <button class="fav ${isFav?'faved':''}" data-fav="${e.id}" title="${isFav?'取消收藏':'收藏'}">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="${isFav?'currentColor':'none'}" stroke="currentColor" stroke-width="2">
          <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
        </svg>
      </button>
      <div class="info">
        <div class="name">${nameDisplay}</div>
        <div class="meta">
          <span>${LANG === 'zh' ? bpZh(e.bp) : e.bp}</span>
          <span>${LANG === 'zh' ? eqZh(e.eq) : e.eq}</span>
        </div>
      </div>
    `;
    frag.appendChild(card);
  });
  grid.appendChild(frag);
  SHOWN += slice.length;
  $('#load-wrap').style.display = (SHOWN < FILTERED.length) ? '' : 'none';
}

function render(){
  applyFilter();
}

/* ====================================================================
 * MODAL — gif 优先, 失败自动 fallback 到 jpg 静态图
 * ==================================================================== */
function openModal(idx){
  CURRENT_IDX = idx;
  const e = FILTERED[idx];
  if(!e) return;
  pushHist(e.id);
  const nameDisplay = LANG === 'zh' ? (e.name_zh || e.name) : e.name;
  $('#m-name').textContent = nameDisplay;
  // 1324 个动作全部有真动画 GIF, 直接加载, 加载失败再退到静态图
  const gifWrap = $('#m-gif');
  gifWrap.innerHTML = `<div class="loading">加载中…</div>`;
  const tryImg = new Image();
  tryImg.onload = () => {
    gifWrap.innerHTML = `
      <span class="demo-badge gif-badge">↻ 循环播放</span>
      <img src="${e.gif}" alt="${nameDisplay} 动作演示">`;
    // 加载成功 → 重置为 Play 状态
    $('#m-play').classList.add('active');
    $('#m-pause').classList.remove('active');
  };
  tryImg.onerror = () => {
    // 极端情况下 GIF 缺失 → 静态图静态显示, 隐藏播放控件
    gifWrap.innerHTML = `
      <span class="demo-badge static-badge">◌ 静态示意</span>
      <img src="${e.img}" alt="${nameDisplay} 动作示意"
           onerror="this.alt='图片加载失败'; this.style.opacity=.2;">`;
    $('#m-controls').style.display = 'none';
  };
  tryImg.src = e.gif;
  // Muscles
  const muscles = [e.tg, ...(e.sec||[])].filter(Boolean);
  $('#m-muscles').innerHTML = muscles.map(m => `<span class="tag">${muscleZh(m)}</span>`).join('');
  // Meta
  $('#m-meta').innerHTML = `<span class="tag">${bpZh(e.bp)}</span><span class="tag">${eqZh(e.eq)}</span>`;
  // Steps (语言切换)
  const steps = (LANG === 'zh' ? (e.steps_zh || e.steps) : e.steps) || [];
  $('#m-steps').innerHTML = steps.map(s => `<li>${s}</li>`).join('');
  // Fav
  const favBtn = $('#m-fav');
  favBtn.classList.toggle('active', FAVS.has(e.id));
  // nav state
  $('#m-prev').disabled = (idx <= 0);
  $('#m-next').disabled = (idx >= FILTERED.length - 1);
  $('#modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal(){
  $('#modal').classList.remove('open');
  document.body.style.overflow = '';
  // 重置动画帧, 下次打开从头播放
  const img = $('#m-gif img');
  if(img) img.src = img.src;
}

/* ---------- modal GIF 控件 ---------- */
$('#m-play').onclick = () => {
  const img = $('#m-gif img'); if(!img) return;
  img.src = img.src;     // 重启动画
  $('#m-play').classList.add('active');
  $('#m-pause').classList.remove('active');
};
$('#m-pause').onclick = () => {
  const img = $('#m-gif img'); if(!img) return;
  img.style.animationPlayState = 'paused';
  $('#m-pause').classList.add('active');
  $('#m-play').classList.remove('active');
};
$('#m-replay').onclick = () => $('#m-play').click();

/* ---------- modal 按钮 ---------- */
$('#m-close').onclick = closeModal;
$('#modal').onclick = e => { if(e.target.id === 'modal') closeModal(); };
$('#m-prev').onclick = () => modalStep(-1);
$('#m-next').onclick = () => modalStep(1);
$('#m-fav').onclick = () => {
  const e = FILTERED[CURRENT_IDX]; if(!e) return;
  toggleFav(e.id);
  $('#m-fav').classList.toggle('active', FAVS.has(e.id));
  toast(FAVS.has(e.id) ? '★ 已收藏' : '已取消收藏');
};
$('#m-copy').onclick = () => {
  const e = FILTERED[CURRENT_IDX]; if(!e) return;
  const url = location.origin + location.pathname + '#ex=' + e.id;
  navigator.clipboard?.writeText(url);
  toast('🔗 链接已复制');
};

function modalStep(delta){
  const next = CURRENT_IDX + delta;
  if(next < 0 || next >= FILTERED.length) return;
  openModal(next);
}

/* ====================================================================
 * CLICK DELEGATION
 * ==================================================================== */
grid.addEventListener('click', e => {
  const fav = e.target.closest('[data-fav]');
  if(fav){ e.stopPropagation(); toggleFav(fav.dataset.fav); return; }
  const card = e.target.closest('.card');
  if(card) openModal(parseInt(card.dataset.idx, 10));
});

/* ====================================================================
 * SEARCH / FILTERS / UI BINDINGS
 * ==================================================================== */
let searchT;
search.addEventListener('input', () => {
  clearTimeout(searchT);
  searchT = setTimeout(() => { SEARCH_Q = search.value; applyFilter(); }, 100);
});

$('#theme-toggle').onclick = () => applyTheme(document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark');

$('#fav-toggle').onclick = () => {
  ONLY_FAV = !ONLY_FAV;
  if(ONLY_FAV) ONLY_HIST = false;
  applyFilter();
};
$('#history-toggle').onclick = () => {
  ONLY_HIST = !ONLY_HIST;
  if(ONLY_HIST) ONLY_FAV = false;
  applyFilter();
};

// 语言切换
document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.onclick = () => setLang(btn.dataset.lang);
});
function setLang(lang){
  if(LANG === lang) return;
  LANG = lang;
  try { localStorage.setItem(LANG_KEY, lang); } catch{}
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
  document.documentElement.setAttribute('lang', lang === 'zh' ? 'zh-CN' : 'en');
  // 重建 filter chips (中/EN 不同)
  buildChips();
  // 重渲染卡片
  SHOWN = 0; grid.innerHTML = ''; renderPage();
  // 如果 modal 开着, 重开
  if(CURRENT_IDX >= 0) {
    const wasOpen = $('#modal').classList.contains('open');
    if(wasOpen) openModal(CURRENT_IDX);
  }
  toast(lang === 'zh' ? '🇨🇳 已切换到中文' : '🇺🇸 Switched to English');
}

$('#load-more').onclick = renderPage;

/* ---------- back to top ---------- */
const toTop = $('#to-top');
window.addEventListener('scroll', () => {
  toTop.classList.toggle('visible', window.scrollY > 400);
}, {passive: true});
toTop.onclick = () => window.scrollTo({top: 0, behavior: 'smooth'});

/* ---------- keyboard ---------- */
document.addEventListener('keydown', e => {
  if(e.target.matches('input, textarea')) return;
  if(e.key === 'Escape'){
    if($('#modal').classList.contains('open')) closeModal();
  } else if(e.key === 'ArrowRight' && $('#modal').classList.contains('open')){
    modalStep(1);
  } else if(e.key === 'ArrowLeft' && $('#modal').classList.contains('open')){
    modalStep(-1);
  } else if(e.key === 'Home'){
    e.preventDefault(); window.scrollTo({top: 0, behavior: 'smooth'});
  } else if(e.key === 'End'){
    e.preventDefault(); window.scrollTo({top: document.body.scrollHeight, behavior: 'smooth'});
  } else if(e.key === '/' && !e.ctrlKey && !e.metaKey){
    e.preventDefault(); search.focus();
  } else if(e.key.toLowerCase() === 'f' && !e.ctrlKey && !e.metaKey && !$('#modal').classList.contains('open')){
    const e2 = FILTERED[CURRENT_IDX];
    if(e2) toggleFav(e2.id);
  }
});

/* ---------- deep link ---------- */
function checkHash(){
  const m = location.hash.match(/ex=(\d+)/);
  if(m){
    const id = parseInt(m[1], 10);
    const idx = FILTERED.findIndex(e => e.id === id);
    if(idx >= 0) openModal(idx);
  }
}
window.addEventListener('hashchange', checkHash);

/* ====================================================================
 * TOAST
 * ==================================================================== */
let toastT;
function toast(msg){
  const el = $('#toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastT);
  toastT = setTimeout(() => el.classList.remove('show'), 1800);
}

function bpZh(s){ return BP_ZH[s] || s; }
function eqZh(s){ return EQ_ZH[s] || s; }
function muscleZh(s){ return MUSCLE_ZH[s] || s; }

/* ====================================================================
 * BOOT
 * ==================================================================== */
function initLang(){
  let l = 'zh';
  try { l = localStorage.getItem(LANG_KEY) || l; } catch{}
  LANG = l;
  document.documentElement.setAttribute('lang', l === 'zh' ? 'zh-CN' : 'en');
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === l));
  // 搜索 placeholder 按语言
  const ph = l === 'zh' ? '搜索动作名称、肌群、器械…' : 'Search exercise name, muscle, equipment…';
  const sp = document.getElementById('search'); if(sp) sp.placeholder = ph;
}
initTheme();
initLang();
loadData().then(checkHash);

// register service worker
if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
</script>
