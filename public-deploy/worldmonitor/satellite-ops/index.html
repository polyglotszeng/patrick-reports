<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Orbital Console · 全球卫星统一看板</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ============================================================
   设计令牌 —— 深空底 + 信号琥珀(时间/状态) + 轨道青(数据/覆盖)
   ============================================================ */
:root {
  --bg: #0A0E15;
  --panel: #101623;
  --panel-2: #151D2E;
  --line: #1D2736;
  --text: #D5DEEC;
  --muted: #7A8AA3;
  --amber: #F5A623;      /* 信号琥珀:任务时钟、LIVE 状态 */
  --cyan: #56C8E8;       /* 轨道青:数据、覆盖、链接 */
  --red: #E4574D;        /* 告警:TLE 过期、数据源异常 */
  --green: #6BCB77;      /* 正常:数据源健康 */
  --sans: "Space Grotesk", system-ui, sans-serif;
  --mono: "IBM Plex Mono", ui-monospace, monospace;
}
* { box-sizing: border-box; margin: 0; }
html, body { height: 100%; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 15px;
  line-height: 1.6;
}
a { color: var(--cyan); }
:focus-visible { outline: 2px solid var(--amber); outline-offset: 2px; }

/* ============================================================
   顶栏:品牌 + 五个视图 tab
   ============================================================ */
header {
  display: flex; align-items: center; gap: 28px;
  padding: 0 20px; height: 56px;
  border-bottom: 1px solid var(--line);
  background: var(--panel);
}
.brand { font-weight: 600; letter-spacing: .04em; white-space: nowrap; }
.brand .dot { color: var(--amber); }
nav { display: flex; gap: 4px; overflow-x: auto; }
nav a {
  display: block; padding: 6px 14px;
  color: var(--muted); text-decoration: none;
  font-size: 14px; border-radius: 6px; white-space: nowrap;
}
nav a:hover { color: var(--text); background: var(--panel-2); }
nav a[aria-current="page"] {
  color: var(--bg); background: var(--cyan); font-weight: 500;
}

/* ============================================================
   任务时钟条(签名元素):所有视图共享同一时间基准
   ============================================================ */
#mission-strip {
  display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
  padding: 8px 20px;
  border-bottom: 1px solid var(--line);
  background: var(--bg);
  font-family: var(--mono); font-size: 12.5px; color: var(--muted);
}
#mission-strip b { color: var(--text); font-weight: 500; }
.chip {
  display: inline-block; padding: 1px 8px; border-radius: 4px;
  border: 1px solid var(--line); font-size: 11.5px;
}
.chip.ok    { color: var(--green); border-color: color-mix(in srgb, var(--green) 40%, transparent); }
.chip.warn  { color: var(--amber); border-color: color-mix(in srgb, var(--amber) 40%, transparent); }
.chip.stale { color: var(--red);   border-color: color-mix(in srgb, var(--red) 40%, transparent); }
.timectl { display: flex; gap: 2px; margin-left: auto; }
.timectl button {
  font-family: var(--mono); font-size: 11.5px;
  padding: 2px 10px; cursor: pointer;
  color: var(--muted); background: transparent;
  border: 1px solid var(--line); border-radius: 4px;
}
.timectl button[aria-pressed="true"] { color: var(--bg); background: var(--amber); border-color: var(--amber); font-weight: 500; }

/* ============================================================
   视图容器与通用面板
   ============================================================ */
main { padding: 20px; max-width: 1280px; margin: 0 auto; }
.view { display: none; }
.view.active { display: block; }
.panel {
  background: var(--panel); border: 1px solid var(--line);
  border-radius: 10px; padding: 18px 20px; margin-bottom: 16px;
}
.panel h2 { font-size: 17px; font-weight: 600; margin-bottom: 6px; }
.panel p.hint { color: var(--muted); font-size: 13.5px; }
.placeholder {
  border: 1px dashed var(--line); border-radius: 8px;
  padding: 28px; text-align: center; color: var(--muted); font-size: 13.5px;
}
.kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin: 14px 0; }
.kpi { background: var(--panel-2); border-radius: 8px; padding: 10px 14px; }
.kpi .v { font-family: var(--mono); font-size: 20px; color: var(--cyan); font-variant-numeric: tabular-nums; }
.kpi .k { font-size: 12px; color: var(--muted); }

/* 覆盖视图控件 */
.ctlrow { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; margin: 10px 0 4px; }
.ctlrow label { font-size: 13px; color: var(--muted); }
input[type=range] { accent-color: var(--amber); width: 220px; }
.preset { display: flex; gap: 6px; }
.preset button {
  font-family: var(--mono); font-size: 12px; cursor: pointer;
  padding: 3px 10px; border-radius: 5px;
  color: var(--muted); background: transparent; border: 1px solid var(--line);
}
.preset button[aria-pressed="true"] { color: var(--bg); background: var(--cyan); border-color: var(--cyan); }
#cov-canvas { width: 100%; border-radius: 8px; border: 1px solid var(--line); display: block; background: #060910; }
.legend { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted); margin-top: 8px; font-family: var(--mono); }
.legend .bar { height: 8px; width: 160px; border-radius: 4px;
  background: linear-gradient(90deg,#060910,#123,#1B5F7A,#2FA3C7,#56C8E8,#BFF0FF); }

/* ============================================================
   Live 视图 —— canvas 等距柱状投影 + 动画卫星
   ============================================================ */
.live-canvas-wrap {
  position: relative; margin-top: 8px;
  border-radius: 8px; overflow: hidden;
  border: 1px solid var(--line);
  background: #060910;
}
#live-canvas {
  width: 100%; display: block; background: #060910;
}
.live-tooltip {
  position: absolute; pointer-events: none;
  background: rgba(16,22,35,.92);
  border: 1px solid var(--cyan);
  padding: 6px 10px; border-radius: 5px;
  font-family: var(--mono); font-size: 12px; color: var(--text);
  transform: translate(-50%, -130%); white-space: nowrap;
  opacity: 0; transition: opacity .15s;
  z-index: 5;
}
.live-tooltip.show { opacity: 1; }
.live-readout {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
  gap: 10px; margin-top: 10px;
}
.live-readout .kpi .v { color: var(--amber); font-size: 18px; }

/* ============================================================
   Compare 视图 —— 五星座对比卡 + 分布柱
   ============================================================ */
.const-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 14px; margin-top: 14px;
}
.const-card {
  background: var(--panel-2); border: 1px solid var(--line);
  border-left: 3px solid var(--accent, var(--cyan));
  border-radius: 8px; padding: 14px 16px;
}
.const-card .ch-name { font-size: 13px; color: var(--muted); letter-spacing: .04em; }
.const-card .ch-big {
  font-family: var(--mono); font-size: 36px; font-weight: 500;
  color: var(--accent, var(--cyan));
  font-variant-numeric: tabular-nums; line-height: 1; margin: 4px 0 2px;
}
.const-card .ch-label { font-size: 11.5px; color: var(--muted); margin-bottom: 12px; }
.const-card .ch-meta {
  display: grid; grid-template-columns: 1fr 1fr; gap: 6px 14px;
  font-family: var(--mono); font-size: 12px; color: var(--text);
  margin-bottom: 10px;
}
.const-card .ch-meta .k { color: var(--muted); font-size: 11px; }
.const-card .ch-bars { margin-top: 10px; }
.const-card .ch-bars h4 {
  font-size: 11.5px; color: var(--muted); font-weight: 500;
  letter-spacing: .04em; text-transform: uppercase; margin: 10px 0 6px;
}
.bar-row {
  display: grid; grid-template-columns: 38px 1fr 36px;
  align-items: center; gap: 8px;
  font-family: var(--mono); font-size: 11.5px;
  margin-bottom: 3px;
}
.bar-row .bar-label { color: var(--muted); }
.bar-row .bar-track {
  height: 8px; background: rgba(122,138,163,.15);
  border-radius: 3px; overflow: hidden;
}
.bar-row .bar-fill { height: 100%; border-radius: 3px; }
.bar-row .bar-value { color: var(--text); text-align: right; font-variant-numeric: tabular-nums; }
.findings, .caveats {
  background: var(--panel-2); border: 1px solid var(--line);
  border-radius: 8px; padding: 14px 18px; margin-top: 14px;
}
.findings h2, .caveats h3 {
  font-size: 14px; margin-bottom: 10px; color: var(--text); font-weight: 600;
}
.findings ul, .caveats ul {
  padding-left: 20px; color: var(--text); font-size: 13px; line-height: 1.7;
}
.findings li, .caveats li { margin-bottom: 6px; }
.findings li strong, .caveats li strong { color: var(--cyan); font-weight: 500; }
.findings li code, .caveats li code {
  font-family: var(--mono); font-size: 11.5px;
  background: var(--panel); padding: 1px 5px; border-radius: 3px; color: var(--amber);
}

/* 服务价值指数卡 */
.sv-grid { display: grid; gap: 4px; margin: 10px 0 8px; }
.sv-row {
  display: grid; grid-template-columns: 32px 28px 90px 1fr 92px 130px;
  align-items: center; gap: 10px;
  padding: 6px 8px; border-radius: 4px;
  background: rgba(86,200,232,0.04);
  font-size: 13px;
}
.sv-row:hover { background: rgba(86,200,232,0.08); }
.sv-rank { font-family: var(--mono); font-size: 11px; color: var(--muted); }
.sv-flag { font-size: 18px; line-height: 1; }
.sv-name { font-weight: 500; color: var(--text); }
.sv-bar { height: 8px; background: rgba(86,200,232,0.10); border-radius: 4px; overflow: hidden; }
.sv-fill { display: block; height: 100%; background: linear-gradient(90deg, #56C8E8 0%, #F5A623 100%); }
.sv-val { font-family: var(--mono); font-size: 13px; color: var(--amber); text-align: right; }
.sv-meta { font-family: var(--mono); font-size: 11px; color: var(--muted); }
.sv-source { font-size: 11.5px; color: var(--muted); margin-top: 8px; }
.sv-source a { color: var(--cyan); text-decoration: none; border-bottom: 1px dashed var(--cyan); }

/* ============================================================
   Earth 视图 —— GIBS 图层卡片 + AOI
   ============================================================ */
.earth-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 14px; margin-top: 14px;
}
.layer-card {
  background: var(--panel-2); border: 1px solid var(--line);
  border-radius: 8px; overflow: hidden;
  display: flex; flex-direction: column;
}
.layer-card .lc-thumb {
  height: 110px; background: #060910; display: flex;
  align-items: center; justify-content: center;
  border-bottom: 1px solid var(--line);
}
.layer-card .lc-thumb svg { width: 100%; height: 100%; display: block; }
.layer-card .lc-body { padding: 12px 14px; flex: 1; }
.layer-card .lc-name { font-size: 14px; font-weight: 500; margin-bottom: 2px; }
.layer-card .lc-src { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-bottom: 6px; }
.layer-card .lc-desc { font-size: 12.5px; color: var(--text); line-height: 1.5; }
.aoi-row {
  display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px;
}
.aoi-btn {
  font-family: var(--mono); font-size: 12px; cursor: pointer;
  padding: 5px 12px; border-radius: 5px;
  color: var(--text); background: var(--panel-2);
  border: 1px solid var(--line);
}
.aoi-btn[aria-pressed="true"] {
  color: var(--bg); background: var(--cyan); border-color: var(--cyan); font-weight: 500;
}
.earth-foot {
  margin-top: 12px; padding: 12px 14px;
  background: var(--panel-2); border-left: 3px solid var(--amber);
  border-radius: 5px; font-size: 12.5px; color: var(--text);
}
.earth-foot code { font-family: var(--mono); font-size: 11.5px; color: var(--amber); }
.earth-foot a { color: var(--cyan); text-decoration: none; border-bottom: 1px dashed var(--cyan); }
.earth-foot a:hover { color: var(--amber); border-bottom-color: var(--amber); }

/* Earth stage: 全尺寸世界地图 + AOI 详情卡 (左右布局) */
.earth-stage {
  display: grid;
  grid-template-columns: 1fr 320px;
  gap: 14px;
  margin-top: 14px;
}
@media (max-width: 900px) {
  .earth-stage { grid-template-columns: 1fr; }
}
.earth-map-wrap {
  background: var(--panel-2);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 12px 14px;
  overflow: hidden;
}
.earth-map-title {
  font-family: var(--mono);
  font-size: 11.5px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 8px;
}
#earth-world-map-host {
  width: 100%;
  display: block;
}
#earth-world-map-host svg {
  width: 100%;
  height: auto;
  display: block;
  border-radius: 4px;
}
.aoi-region rect { transition: fill-opacity 0.2s ease, stroke-width 0.2s ease; }
.aoi-region:hover rect { fill-opacity: 0.22 !important; stroke-width: 1.5 !important; }
.earth-aoi-card {
  background: var(--panel-2);
  border: 1px solid var(--line);
  border-left: 3px solid var(--cyan);
  border-radius: 8px;
  padding: 14px 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  font-size: 13px;
  align-self: start;
}
.earth-aoi-card[data-aoi="taiwan"],
.earth-aoi-card[data-aoi="korea"] { border-left-color: #E4574D; }
.earth-aoi-card[data-aoi="redsea"],
.earth-aoi-card[data-aoi="gulf"] { border-left-color: #F5A623; }
.earth-aoi-card[data-aoi="ukraine"] { border-left-color: #56C8E8; }
.eac-label {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}
.eac-name {
  font-size: 18px;
  font-weight: 600;
  color: var(--cyan);
  margin-bottom: 2px;
  font-family: var(--mono);
  letter-spacing: 0.02em;
}
.eac-row {
  display: grid;
  grid-template-columns: 80px 1fr;
  gap: 8px;
  align-items: baseline;
  padding: 4px 0;
  border-bottom: 1px dashed var(--line);
}
.eac-row:last-of-type { border-bottom: none; }
.eac-k {
  font-family: var(--mono);
  font-size: 11.5px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.eac-v {
  font-family: var(--mono);
  font-size: 12.5px;
  color: var(--text);
  text-align: right;
  font-variant-numeric: tabular-nums;
}
.eac-foot {
  margin-top: 4px;
  font-size: 11px;
  color: var(--muted);
  font-style: italic;
  padding-top: 6px;
  border-top: 1px solid var(--line);
}

/* ============================================================
   Reports 视图 —— KPI + 时间线 + SVG 增长曲线
   ============================================================ */
.reports-timeline { margin-top: 14px; }
.report-row {
  display: grid; grid-template-columns: 110px 1fr auto auto;
  align-items: center; gap: 14px;
  padding: 12px 14px; border: 1px solid var(--line);
  border-radius: 7px; background: var(--panel-2);
  margin-bottom: 8px;
  font-size: 13px;
}
.report-row .rr-date {
  font-family: var(--mono); font-size: 13px; color: var(--amber);
  font-variant-numeric: tabular-nums;
}
.report-row .rr-name { font-weight: 500; }
.report-row .rr-meta { font-family: var(--mono); font-size: 11.5px; color: var(--muted); }
.report-row .rr-total {
  font-family: var(--mono); font-size: 14px; color: var(--cyan);
  font-variant-numeric: tabular-nums; min-width: 70px; text-align: right;
}
.report-row a.btn-open {
  font-family: var(--mono); font-size: 12px;
  text-decoration: none; color: var(--bg); background: var(--cyan);
  padding: 4px 12px; border-radius: 5px; font-weight: 500;
}
.report-row a.btn-open[data-deprecated] {
  background: var(--amber); color: var(--bg);
  position: relative;
}
.report-row a.btn-open[data-deprecated]:hover::after {
  content: "⚠️ 老 URL,7 月起 redirect 到 Orbital Console";
  position: absolute; bottom: 110%; right: 0; white-space: nowrap;
  background: var(--bg-2); color: var(--amber); border: 1px solid var(--amber);
  padding: 4px 8px; border-radius: 4px; font-size: 11px; z-index: 10;
}
.growth-chart-wrap {
  margin-top: 14px; padding: 16px;
  background: var(--panel-2); border: 1px solid var(--line);
  border-radius: 8px;
}
.growth-chart-wrap h3 { font-size: 14px; margin-bottom: 8px; }
.growth-chart-wrap .src { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-top: 6px; }

@media (max-width: 720px) {
  header { gap: 12px; }
  main { padding: 12px; }
  .timectl { margin-left: 0; }
}
@media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
</style>
</head>
<body>

<header>
  <div class="brand">ORBITAL<span class="dot">·</span>CONSOLE</div>
  <nav id="tabs" aria-label="视图切换"></nav>
</header>

<!-- 任务时钟条:UTC / 数据时刻 / TLE 龄期 / 数据源 / 时间控制器 —— 全站唯一时间真相 -->
<div id="mission-strip">
  <span>UTC <b id="ms-utc">--:--:--</b></span>
  <span>数据时刻 <b id="ms-epoch">--</b></span>
  <span>TLE 龄期 <span id="ms-age" class="chip ok">--</span></span>
  <span>CelesTrak <span id="ms-src" class="chip ok">OK</span></span>
  <span>在轨 <b id="ms-count">--</b> 颗</span>
  <div class="timectl" role="group" aria-label="时间控制">
    <button data-speed="1"  aria-pressed="true">LIVE</button>
    <button data-speed="8"  aria-pressed="false">×8</button>
    <button data-speed="60" aria-pressed="false">×60</button>
    <button data-speed="0"  aria-pressed="false">暂停</button>
  </div>
</div>

<main id="views"></main>

<script type="module">
import Coverage from "./coverage.js";
// import ZTLE from "./tle-unpack.js";   // 接真实数据时打开

/* ============================================================
   1. 共享应用状态 + 事件总线
   所有视图读同一个 App.simTime,时间控制器改的也是它。
   ============================================================ */
const App = {
  simTime: Date.now(),       // 仿真时间(ms);LIVE 时跟随真实时钟
  speed: 1,                  // 0=暂停 1=LIVE 8/60=快进
  dataEpoch: null,           // 本批 TLE 的中位 epoch
  satCount: null,
  bus: new EventTarget(),
  emit(type, detail) { this.bus.dispatchEvent(new CustomEvent(type, { detail })); },
  on(type, fn) { this.bus.addEventListener(type, fn); },
};

let lastTick = performance.now();
function tick(now) {
  const dt = now - lastTick; lastTick = now;
  if (App.speed > 0) {
    App.simTime += dt * App.speed;
    if (App.speed === 1) App.simTime = Date.now();  // LIVE 锚定真实时钟,避免漂移
  }
  document.getElementById("ms-utc").textContent =
    new Date(App.simTime).toISOString().slice(11, 19) + (App.speed === 1 ? "" : App.speed === 0 ? " ⏸" : ` ×${App.speed}`);
  App.emit("tick", { simTime: App.simTime });
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);

document.querySelectorAll(".timectl button").forEach(btn => {
  btn.addEventListener("click", () => {
    App.speed = Number(btn.dataset.speed);
    document.querySelectorAll(".timectl button").forEach(b =>
      b.setAttribute("aria-pressed", String(b === btn)));
    App.emit("speedchange", { speed: App.speed });
  });
});

/** 数据到位后调用一次,任务条自动点亮(接 ZTLE 时用) */
window.setDataStatus = function ({ epoch, count, sourceOk = true }) {
  App.dataEpoch = epoch; App.satCount = count;
  const ageDays = (Date.now() - epoch.getTime()) / 86400e3;
  document.getElementById("ms-epoch").textContent = epoch.toISOString().slice(0, 16).replace("T", " ");
  document.getElementById("ms-count").textContent = count.toLocaleString();
  const chip = document.getElementById("ms-age");
  chip.textContent = ageDays.toFixed(1) + " d";
  chip.className = "chip " + (ageDays > 7 ? "stale" : ageDays > 3 ? "warn" : "ok");
  document.getElementById("ms-src").className = "chip " + (sourceOk ? "ok" : "stale");
};

/* ============================================================
   2. 视图注册表 + hash 路由
   ============================================================ */
const views = [];
function registerView(v) { views.push(v); }

function currentRoute() {
  const h = location.hash.replace(/^#\/?/, "") || "live";
  const [id, query = ""] = h.split("?");
  return { id, params: new URLSearchParams(query) };
}

function renderTabs() {
  const nav = document.getElementById("tabs");
  nav.innerHTML = "";
  for (const v of views) {
    const a = document.createElement("a");
    a.href = "#/" + v.id;
    a.textContent = v.label;
    a.dataset.view = v.id;
    nav.appendChild(a);
  }
}

let activeView = null;
function route() {
  const { id, params } = currentRoute();
  const target = views.find(v => v.id === id) || views[0];
  document.querySelectorAll("#tabs a").forEach(a =>
    a.toggleAttribute && a.setAttribute("aria-current", a.dataset.view === target.id ? "page" : "false"));
  if (activeView && activeView !== target) {
    activeView.unmount?.();
    document.getElementById("view-" + activeView.id)?.classList.remove("active");
  }
  let el = document.getElementById("view-" + target.id);
  if (!el) {
    el = document.createElement("section");
    el.id = "view-" + target.id;
    el.className = "view";
    document.getElementById("views").appendChild(el);
    target.mount(el, params);          // 懒挂载:首次进入才初始化
    target._mounted = true;
  } else if (target.onParams) {
    target.onParams(params);
  }
  el.classList.add("active");
  activeView = target;
  document.title = target.label + " · Orbital Console";
}

// 7 大洲简化轮廓 (lat, lon) — 内联,零依赖
/* 大陆简化轮廓 (内联 ~200 个 lat/lon 点 = 7 大洲 + 6 岛屿)
   数据来源:手绘简化,只用于 canvas 背景参考,不要求地理精确。
   7 大洲:北美 / 中美 / 南美 / 欧亚 / 非洲 / 澳洲 / 格陵兰
   岛屿:大不列颠 / 新西兰 / 马达加斯加
   渲染:fill rgba(86,200,232,0.08) + stroke rgba(86,200,232,0.4) 0.5px */
const CONTINENTS = [
  // 北美 (阿拉斯加 → 中美)
  [[71,-156],[70,-141],[60,-140],[50,-125],[40,-124],[33,-118],[27,-97],[25,-80],[18,-88],[10,-83],[7,-77]],
  // 中美缝
  [[18,-95],[15,-90],[10,-84],[8,-78]],
  // 南美
  [[12,-72],[10,-65],[0,-50],[-15,-39],[-25,-45],[-40,-55],[-55,-68],[-50,-75],[-30,-71],[-10,-78],[5,-77]],
  // 欧亚大陆
  [[71,60],[73,130],[65,170],[55,165],[45,145],[35,140],[25,120],[10,105],[8,80],[20,70],[25,55],[35,35],[45,35],[55,50],[70,60]],
  // 非洲
  [[35,-5],[32,32],[12,43],[0,42],[-15,40],[-30,25],[-35,18],[-22,14],[0,9],[10,-15],[25,-16],[33,-8]],
  // 澳洲
  [[-10,130],[-12,145],[-20,150],[-35,150],[-39,145],[-35,130],[-30,115],[-22,114],[-15,125]],
  // 格陵兰
  [[83,-33],[80,-20],[70,-22],[60,-45],[70,-55],[80,-65]],
  // 大不列颠
  [[58,-5],[55,-2],[51,1],[50,1],[55,-8]],
  // 新西兰
  [[-35,173],[-37,175],[-41,174],[-46,170],[-42,172]],
  // 马达加斯加
  [[-12,49],[-15,50],[-22,48],[-25,45],[-20,44],[-15,46]],
];

function drawContinents(ctx, project) {
  ctx.fillStyle = "rgba(86, 200, 232, 0.08)";
  ctx.strokeStyle = "rgba(86, 200, 232, 0.4)";
  ctx.lineWidth = 0.7;
  for (const ring of CONTINENTS) {
    if (ring.length < 3) continue;
    ctx.beginPath();
    const [x0, y0] = project(ring[0][0], ring[0][1]);
    ctx.moveTo(x0, y0);
    for (let i = 1; i < ring.length; i++) {
      const [x, y] = project(ring[i][0], ring[i][1]);
      ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
  }
}

const LiveView = {
  el: null, cv: null, ctx: null, tip: null,
  raf: 0, sats: [], cityCells: null, cellInfo: null, cellGrid: null, cellRows: 0, cellCols: 0, cellDeg: 0,

  mount(el) {
    this.el = el;
    el.innerHTML = `
      <div class="panel">
        <h2>实时轨道</h2>
        <p class="hint">等距柱状投影世界地图;代表性卫星由 <code>App.simTime</code> 驱动。
        Hover 任一城市查看当前可见卫星数(用 Coverage.computeCoverageGrid 在 1° 网格上快速估算)。
        数据源:Walker 合成星座 × 3 壳(Starlink 53°/Polar 87.9°/Qianfan 89°)。</p>
        <div class="live-canvas-wrap">
          <canvas id="live-canvas" width="1440" height="720"></canvas>
          <div class="live-tooltip" id="live-tip"></div>
        </div>
        <div class="live-readout">
          <div class="kpi"><div class="v" id="live-tracked">--</div><div class="k">演示星座卫星数</div></div>
          <div class="kpi"><div class="v" id="live-lat">--</div><div class="k">代表卫星纬度</div></div>
          <div class="kpi"><div class="v" id="live-lon">--</div><div class="k">代表卫星经度</div></div>
          <div class="kpi"><div class="v" id="live-city">--</div><div class="k">最近城市上空过顶</div></div>
        </div>
      </div>`;
    this.cv = el.querySelector("#live-canvas");
    this.ctx = this.cv.getContext("2d");
    this.tip = el.querySelector("#live-tip");
    this.sats = Coverage.walkerConstellation(SHELLS.starlink);
    // 预算网格(城市 hover 时查询)
    const cov = Coverage.computeCoverageGrid(this.sats, { minElevDeg: 25, gridDeg: 1 });
    this.cellGrid = cov.grid; this.cellRows = cov.rows; this.cellCols = cov.cols; this.cellDeg = cov.gridDeg;
    // 鼠标 hover 城市
    this.cv.addEventListener("mousemove", (e) => this.onHover(e));
    this.cv.addEventListener("mouseleave", () => this.tip.classList.remove("show"));

    // 3 个壳总演示卫星数
    const totalDemoSats = SHELLS.starlink.planes * SHELLS.starlink.satsPerPlane
                       + SHELLS.polar.planes * SHELLS.polar.satsPerPlane
                       + SHELLS.qianfan.planes * SHELLS.qianfan.satsPerPlane;
    document.getElementById("live-tracked").textContent = totalDemoSats.toLocaleString();
    this.scheduleRender();
    App.on("tick", () => this.scheduleRender());
  },

  onHover(e) {
    const rect = this.cv.getBoundingClientRect();
    const x = (e.clientX - rect.left) / rect.width * this.cv.width;
    const y = (e.clientY - rect.top)  / rect.height * this.cv.height;
    // 找最近城市
    let best = null, bestD = Infinity;
    for (const c of CITIES) {
      const [px, py] = this.project(c.lat, c.lon);
      const d = Math.hypot(px - x, py - y);
      if (d < bestD) { bestD = d; best = c; }
    }
    if (!best || bestD > 36) { this.tip.classList.remove("show"); return; }
    const visible = this.visibleAt(best.lat, best.lon);
    this.tip.innerHTML =
      `<b style="color:var(--amber)">${best.name}</b> &nbsp; ${visible} 颗可见 &nbsp; <span style="color:var(--muted)">${best.lat.toFixed(1)}°, ${best.lon.toFixed(1)}°</span>`;
    this.tip.style.left = (best.lon >= 0 ? e.clientX - rect.left : this.cv.clientWidth - (e.clientX - rect.left)) + "px";
    this.tip.style.top  = ((best.lat < 0 ? (e.clientY - rect.top) - 8 : (e.clientY - rect.top) - 8)) + "px";
    // 实际定位用绝对坐标
    this.tip.style.left = (this.tip.offsetLeft === 0 ? 0 : this.tip.offsetLeft) + "px";
    this.tip.style.left = (this._lp?.x ?? 0) + "px";
    this._lp = null;
    // 简化:用 CSS 锚到画布直接位置
    const px = (best.lat >= 0 ? 0.08 : 0.92);
    const py = (best.lat >= 0 ? 0.85 : 0.15);
    this.tip.style.left = (this.project(best.lat, best.lon)[0] / this.cv.width * 100) + "%";
    this.tip.style.top  = (this.project(best.lat, best.lon)[1] / this.cv.height * 100) + "%";
    this.tip.classList.add("show");
  },

  visibleAt(lat, lon) {
    if (!this.cellGrid) return 0;
    const row = Math.min(this.cellRows - 1, Math.max(0, Math.floor((90 - lat) / this.cellDeg)));
    const col = ((Math.floor((lon + 180) / this.cellDeg) % this.cellCols) + this.cellCols) % this.cellCols;
    return this.cellGrid[row * this.cellCols + col] || 0;
  },

  // 等距柱状投影 helper
  project(lat, lon) {
    const x = (lon + 180) / 360 * this.cv.width;
    const y = (90 - lat) / 180 * this.cv.height;
    return [x, y];
  },

  scheduleRender() {
    cancelAnimationFrame(this.raf);
    this.raf = requestAnimationFrame(() => this.render());
  },

  render() {
    const ctx = this.ctx, W = this.cv.width, H = this.cv.height;
    // 背景
    ctx.fillStyle = "#060910"; ctx.fillRect(0, 0, W, H);

    // 大陆轮廓 (低饱和小色块,作为视觉背景参考)
    drawContinents(ctx, this.project.bind(this));

    // 经纬网格
    ctx.strokeStyle = "rgba(122,138,163,.18)"; ctx.lineWidth = 1;
    ctx.beginPath();
    for (let lon = -150; lon <= 150; lon += 30) {
      const x = (lon + 180) / 360 * W; ctx.moveTo(x, 0); ctx.lineTo(x, H);
    }
    for (let lat = -60; lat <= 60; lat += 30) {
      const y = (90 - lat) / 180 * H; ctx.moveTo(0, y); ctx.lineTo(W, y);
    }
    ctx.stroke();

    // 赤道 + 本初子午线高亮
    ctx.strokeStyle = "rgba(245,166,35,.35)"; ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(0, H / 2); ctx.lineTo(W, H / 2);
    ctx.moveTo(W / 2, 0); ctx.lineTo(W / 2, H);
    ctx.stroke();

    // 城市点(从 grid 拿可见数绘制星点)
    for (const c of CITIES) {
      const [x, y] = this.project(c.lat, c.lon);
      const v = this.visibleAt(c.lat, c.lon);
      const radius = 3 + Math.min(7, v / 4);
      const grad = ctx.createRadialGradient(x, y, 0, x, y, radius * 3);
      grad.addColorStop(0, v > 0 ? "rgba(86,200,232,.9)" : "rgba(122,138,163,.4)");
      grad.addColorStop(1, "rgba(86,200,232,0)");
      ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(x, y, radius * 3, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#FFF"; ctx.beginPath(); ctx.arc(x, y, 2.5, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "rgba(213,222,236,.85)";
      ctx.font = "11px 'IBM Plex Mono', monospace";
      ctx.textAlign = "left";
      ctx.fillText(c.name + " · " + v, x + 8, y - 4);
    }

    // 全星座动画:1,584 颗合成卫星(starlink shell 1, 72 planes × 22 sats/plane)
    const period = 90 * 60 * 1000;
    const omega = SHELLS.starlink.inclDeg * Math.PI / 180;
    const tFrac = (App.simTime % period) / period;  // 0..1
    const planes = SHELLS.starlink.planes;
    const satsPerPlane = SHELLS.starlink.satsPerPlane;
    const phasing = 1;

    // 用首颗星作为"代表卫星"(面板读数用)
    const phase = tFrac * 2 * Math.PI;
    const satLat = Math.asin(Math.sin(omega) * Math.sin(phase)) * 180 / Math.PI;
    const dLon0 = Math.atan2(Math.cos(omega) * Math.sin(phase), Math.cos(phase)) * 180 / Math.PI;
    const satLon = ((dLon0 + 180) % 360 + 360) % 360 - 180;

    // 轨道圈(沿当前 RAAN 整圈) — 用第 0 plane
    ctx.strokeStyle = "rgba(86,200,232,.18)"; ctx.lineWidth = 1;
    ctx.beginPath();
    let first = true;
    for (let t = 0; t <= period; t += period / 60) {
      const p = (t / period) * 2 * Math.PI;
      const la = Math.asin(Math.sin(omega) * Math.sin(p)) * 180 / Math.PI;
      const lo = (((Math.atan2(Math.cos(omega) * Math.sin(p), Math.cos(p)) * 180 / Math.PI) + 180) % 360 + 360) % 360 - 180;
      const [px, py] = this.project(la, lo);
      if (first) { ctx.moveTo(px, py); first = false; } else ctx.lineTo(px, py);
    }
    ctx.stroke();

    // 渲染全部演示星座卫星 — 多壳混合,自然分散到整个世界
    // 3 个壳分层:starlink(53° 中纬带) + polar(87.9° 极区) + qianfan(89° 极区)
    const SHELLS_LIST = [SHELLS.starlink, SHELLS.polar, SHELLS.qianfan];
    const dpr = window.devicePixelRatio || 1;
    const dotR = 3.4 * Math.max(1, Math.sqrt(dpr));
    const glowR = 8.5 * Math.max(1, Math.sqrt(dpr));
    for (let shellIdx = 0; shellIdx < SHELLS_LIST.length; shellIdx++) {
      const shell = SHELLS_LIST[shellIdx];
      const sOmega = shell.inclDeg * Math.PI / 180;
      const sPlanes = shell.planes;
      const sP = shell.satsPerPlane;
      const totalSats = sPlanes * sP;
      // 不同壳不同颜色基调
      const palette = [
        { r: 134, g: 232, b: 255 }, // cyan (starlink)
        { r: 192, g: 224, b: 255 }, // 浅蓝白 (polar)
        { r: 255, g: 196, b: 134 }, // 暖琥珀 (qianfan)
      ];
      const pal = palette[shellIdx];
      // 每壳相对相位略错开,避免 3 壳同时画同一带
      const sPhase = phase + shellIdx * 0.37;
      for (let i = 0; i < totalSats; i++) {
        const p = Math.floor(i / sP);
        const u = (2 * Math.PI * i / totalSats) + sPhase;
        const la = Math.asin(Math.sin(sOmega) * Math.sin(u)) * 180 / Math.PI;
        const loRel = Math.atan2(Math.cos(sOmega) * Math.sin(u), Math.cos(u)) * 180 / Math.PI;
        const lo = (((360 / sPlanes) * p + loRel + 540) % 360 + 360) % 360 - 180;
        const [sx, sy] = this.project(la, lo);
        const latNorm = Math.abs(la) / Math.max(1e-6, Math.abs(sOmega * 180 / Math.PI));
        const r = Math.round(pal.r + (pal.r === 134 ? 58 : pal.r === 192 ? 20 : -30) * latNorm);
        const g = pal.g;
        const b = pal.b;
        ctx.fillStyle = `rgba(${r}, ${g}, ${b}, 0.40)`;
        ctx.beginPath(); ctx.arc(sx, sy, glowR, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = `rgba(${r}, ${g}, ${b}, 0.70)`;
        ctx.beginPath(); ctx.arc(sx, sy, glowR * 0.45, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = `rgba(${r}, ${g}, ${b}, 1.0)`;
        ctx.beginPath(); ctx.arc(sx, sy, dotR, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = "rgba(255,255,255,0.9)";
        ctx.beginPath(); ctx.arc(sx, sy, dotR * 0.35, 0, Math.PI * 2); ctx.fill();
      }
    }

    // 代表卫星高亮(第 0 plane 第 0 sat) — 大一号的橙点
    const [hx, hy] = this.project(satLat, satLon);
    const satGrad = ctx.createRadialGradient(hx, hy, 0, hx, hy, 18);
    satGrad.addColorStop(0, "rgba(245,166,35,1)");
    satGrad.addColorStop(0.4, "rgba(245,166,35,.5)");
    satGrad.addColorStop(1, "rgba(245,166,35,0)");
    ctx.fillStyle = satGrad; ctx.beginPath(); ctx.arc(hx, hy, 18, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = "#F5A623"; ctx.beginPath(); ctx.arc(hx, hy, 4, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = "#FFF"; ctx.lineWidth = 1.5; ctx.stroke();

    // 实时面板读数
    if (this.el) {
      this.el.querySelector("#live-lat").textContent = satLat.toFixed(1) + "°";
      this.el.querySelector("#live-lon").textContent = satLon.toFixed(1) + "°";
      // 找最近城市
      let best = CITIES[0], bestD = Infinity;
      for (const c of CITIES) {
        const d = Math.hypot(c.lat - satLat, c.lon - satLon);
        if (d < bestD) { bestD = d; best = c; }
      }
      this.el.querySelector("#live-city").textContent = best.name + " (" + bestD.toFixed(0) + "°)";
    }
  },

  unmount() { cancelAnimationFrame(this.raf); },
};

/* ============================================================
   5. Coverage 视图(完整实现,从 zip 保留)

const CoverageView = {
  el: null, sats: [], elev: 25, shellKey: "starlink", raf: 0,

  mount(el, params) {
    this.el = el;
    el.innerHTML = `
      <div class="panel">
        <h2>覆盖热力图 · 最低仰角滑块</h2>
        <p class="hint">几何地平线(ε=0°)是宣传图里的覆盖圈;真实服务受用户终端最低仰角限制。
        拖动滑块,看覆盖如何缩水。演示为 Walker 合成星座,接入 SGP4 真实星历后此面板逻辑不变。</p>
        <div class="ctlrow">
          <label>最低仰角 ε = <b id="cov-elev-v" style="font-family:var(--mono);color:var(--amber)">25°</b></label>
          <input type="range" id="cov-elev" min="0" max="60" step="1" value="25"
                 aria-label="最低仰角(度)">
          <span class="preset" id="cov-presets" role="group" aria-label="星座预设"></span>
        </div>
        <div class="kpis">
          <div class="kpi"><div class="v" id="k-cover">--</div><div class="k">全球面积覆盖率</div></div>
          <div class="kpi"><div class="v" id="k-mean">--</div><div class="k">平均同时可见(颗)</div></div>
          <div class="kpi"><div class="v" id="k-radius">--</div><div class="k">单星足迹半径</div></div>
          <div class="kpi"><div class="v" id="k-frac">--</div><div class="k">单星足迹 / 地表</div></div>
        </div>
        <canvas id="cov-canvas" width="1440" height="720"></canvas>
        <div class="legend"><span>0</span><span class="bar"></span><span id="legend-max">max</span><span>颗同时可见</span></div>
      </div>`;

    const presets = el.querySelector("#cov-presets");
    for (const [key, s] of Object.entries(SHELLS)) {
      const b = document.createElement("button");
      b.textContent = s.label;
      b.dataset.key = key;
      b.addEventListener("click", () => { this.setShell(key); this.pushURL(); });
      presets.appendChild(b);
    }
    el.querySelector("#cov-elev").addEventListener("input", (e) => {
      this.elev = Number(e.target.value);
      el.querySelector("#cov-elev-v").textContent = this.elev + "°";
      this.scheduleRender();
    });
    el.querySelector("#cov-elev").addEventListener("change", () => this.pushURL());

    this.applyParams(params, /*silent*/ true);
    this.setShell(this.shellKey);
  },

  applyParams(params, silent) {
    if (!params) return;
    const e = Number(params.get("elev"));
    if (Number.isFinite(e) && e >= 0 && e <= 60) this.elev = e;
    const s = params.get("shell");
    if (s && SHELLS[s]) this.shellKey = s;
    if (this.el && !silent) {
      this.el.querySelector("#cov-elev").value = this.elev;
      this.el.querySelector("#cov-elev-v").textContent = this.elev + "°";
      this.setShell(this.shellKey);
    }
  },

  pushURL() {
    history.replaceState(null, "", `#/coverage?elev=${this.elev}&shell=${this.shellKey}`);
  },

  setShell(key) {
    this.shellKey = key;
    this.el.querySelectorAll("#cov-presets button").forEach(b =>
      b.setAttribute("aria-pressed", String(b.dataset.key === key)));
    // 真实接入:this.sats = worker 传回的 [{lat, lon, altKm}, ...]
    this.sats = Coverage.walkerConstellation(SHELLS[key]);
    this.el.querySelector("#cov-elev").value = this.elev;
    this.el.querySelector("#cov-elev-v").textContent = this.elev + "°";
    this.scheduleRender();
  },

  scheduleRender() {
    cancelAnimationFrame(this.raf);
    this.raf = requestAnimationFrame(() => this.render());
  },

  render() {
    const shell = SHELLS[this.shellKey];
    const g = Coverage.computeCoverageGrid(this.sats, { minElevDeg: this.elev, gridDeg: 1 });
    const { grid, rows, cols, stats } = g;

    this.el.querySelector("#k-cover").textContent = (stats.coveredFraction * 100).toFixed(1) + "%";
    this.el.querySelector("#k-mean").textContent = stats.meanVisible.toFixed(1);
    this.el.querySelector("#k-radius").textContent =
      Coverage.footprintRadiusKm(shell.altKm, this.elev).toFixed(0) + " km";
    this.el.querySelector("#k-frac").textContent =
      (Coverage.footprintAreaFraction(shell.altKm, this.elev) * 100).toFixed(2) + "%";
    this.el.querySelector("#legend-max").textContent = stats.maxCount;

    // 等距柱状投影渲染:每格 4×4 px
    const cv = this.el.querySelector("#cov-canvas");
    const ctx = cv.getContext("2d");
    const img = ctx.createImageData(cols * 4, rows * 4);
    const px = img.data;
    const maxC = Math.max(1, stats.maxCount);
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const t = Math.pow(grid[r * cols + c] / maxC, 0.55);   // γ 提亮低值
        const [R, G, B] = heat(t);
        for (let dy = 0; dy < 4; dy++) {
          let o = (((r * 4 + dy) * cols * 4) + c * 4) * 4;
          for (let dx = 0; dx < 4; dx++, o += 4) {
            px[o] = R; px[o + 1] = G; px[o + 2] = B; px[o + 3] = 255;
          }
        }
      }
    }
    ctx.putImageData(img, 0, 0);
    // 经纬网格线(每 30°)
    ctx.strokeStyle = "rgba(122,138,163,.25)";
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (let lon = -150; lon <= 150; lon += 30) {
      const x = (lon + 180) / 360 * cv.width;
      ctx.moveTo(x, 0); ctx.lineTo(x, cv.height);
    }
    for (let lat = -60; lat <= 60; lat += 30) {
      const y = (90 - lat) / 180 * cv.height;
      ctx.moveTo(0, y); ctx.lineTo(cv.width, y);
    }
    ctx.stroke();
  },

  unmount() { cancelAnimationFrame(this.raf); },
};

/** 深空→轨道青热力色标 */
function heat(t) {
  if (t <= 0) return [6, 9, 16];
  const stops = [
    [0.00, [6, 9, 16]], [0.15, [17, 34, 51]], [0.4, [27, 95, 122]],
    [0.7, [47, 163, 199]], [0.9, [86, 200, 232]], [1.0, [191, 240, 255]],
  ];
  for (let i = 1; i < stops.length; i++) {
    if (t <= stops[i][0]) {
      const [t0, c0] = stops[i - 1], [t1, c1] = stops[i];
      const k = (t - t0) / (t1 - t0);
      return c0.map((v, j) => Math.round(v + (c1[j] - v) * k));
    }
  }
  return [191, 240, 255];
}

// 把 [lonW, latS, lonE, latN] 映射到 SVG (viewBox 800x400)
function bboxToRect(bbox, vbW = 800, vbH = 400) {
  const [w, s, e, n] = bbox;
  const x = ((w + 180) / 360) * vbW;
  const y = ((90 - n) / 180) * vbH;
  const wpx = ((e - w) / 360) * vbW;
  const hpx = ((n - s) / 180) * vbH;
  return { x, y, w: wpx, h: hpx };
}

    <text x="6" y="204" fill="rgba(150,180,200,0.5)" font-family="IBM Plex Mono,monospace" font-size="9">60°S</text>
  </svg>`;
}

// 格式化 AOI bbox → 人类可读
function formatBbox(bbox) {
  const [w, s, e, n] = bbox;
  const fmt = (v, pos, neg) => `${Math.abs(v).toFixed(1)}°${v >= 0 ? pos : neg}`;
  return `${fmt(w, 'E', 'W')} – ${fmt(e, 'E', 'W')} · ${fmt(s, 'S', 'N')} – ${fmt(n, 'S', 'N')}`;
}

// AOI 关注区中心 + 半径,用于"过顶卫星数"显示
function aoiCenter(bbox) {
  const [w, s, e, n] = bbox;
  return { lon: ((w + e) / 2).toFixed(1), lat: ((s + n) / 2).toFixed(1) };
}

// 根据 AOI 模拟过顶卫星数 (用 bbox 面积粗估,real 数据需 ZTLE 投影)
function estimateOverpass(bbox) {
  if (bbox[0] === -180 && bbox[2] === 180) return { sats: "12,041", passes: "all 4 consts" };
  const [w, s, e, n] = bbox;
  const area = Math.abs((e - w) * (n - s));
  // 全球面积 ~ 360*180 = 64800
  const ratio = area / 64800;
  const sats = Math.round(12041 * ratio * 1.4); // 1.4x overlap (multiple passes/day)
  const passes = Math.round(sats * 6); // ~6 passes/sat/day
  return { sats: sats.toLocaleString(), passes: passes.toLocaleString() };
}

function earthMount(el) {
  const layerCards = LAYERS.map(l => `
    <div class="layer-card">

        <div class="lc-name">${l.name}</div>
        <div class="lc-src">${l.src}</div>
        <div class="lc-desc">${l.desc}</div>
      </div>
    </div>`).join("");
  const aoiBtns = AOIS.map((a, i) =>
    `<button class="aoi-btn" data-key="${a.key}" aria-pressed="${i === 0 ? "true" : "false"}">${a.label}</button>`).join("");
  el.innerHTML = `
    <div class="panel">
      <h2>影像与事件</h2>
      <p class="hint">NASA GIBS 全色影像 (MODIS / VIIRS / Himawari) + NASA FIRMS 火点数据。
      点击 AOI 关注区按钮或地图上的彩色框,即可在右侧看到该区域的 bbox / 中心坐标 / 估算过顶卫星数与火点状态。</p>
      <div class="earth-grid">${layerCards}</div>
      <div class="aoi-row" role="group" aria-label="关注区">${aoiBtns}</div>

      <div class="earth-stage">
        <div class="earth-map-wrap">
          <div class="earth-map-title">世界地图 · AOI 高亮</div>
          <div id="earth-world-map-host">${worldMapSVG({ highlightKey: "global" })}</div>
        </div>
        <aside class="earth-aoi-card" id="earth-aoi-card" data-aoi="global">
          <div class="eac-label">AOI 详情</div>
          <div class="eac-name">全球</div>
          <div class="eac-row"><span class="eac-k">BBox</span><span class="eac-v" id="eac-bbox">180°W – 180°E · 85°S – 85°N</span></div>
          <div class="eac-row"><span class="eac-k">中心</span><span class="eac-v" id="eac-center">0.0°, 0.0°</span></div>
          <div class="eac-row"><span class="eac-k">过顶卫星</span><span class="eac-v" id="eac-sats">12,041 (all 4 consts)</span></div>
          <div class="eac-row"><span class="eac-k">24h 过顶</span><span class="eac-v" id="eac-passes">~72,246 次</span></div>
          <div class="eac-row"><span class="eac-k">GIBS 图层</span><span class="eac-v">MODIS TrueColor · VIIRS DNB · FIRMS</span></div>
          <div class="eac-row"><span class="eac-k">火点状态</span><span class="eac-v" id="eac-fires">— (需 MAP_KEY)</span></div>
          <div class="eac-foot">点击左侧彩色框 / 上方按钮切换 AOI</div>
        </aside>
      </div>

      <div class="earth-foot">
        <b>关键发现:</b> NASA GIBS 提供 30m 分辨率、24h 滚动瓦片,可无需 API key 使用 WMTS endpoint;
        火点数据来自 NASA FIRMS 实时 feed,<a href="https://firms.modaps.eosdis.nasa.gov/api/area/" target="_blank" rel="noopener">免费 MAP_KEY 申请</a> (2 分钟 email 即可),
        拿到后在 <code>window.MAP_KEY = 'xxx'</code> 注入,FIRMS 火点数据会自动激活,本卡"火点状态"会显示该 AOI 过去 24h 火点数。
      </div>
    </div>`;

  // 更新 AOI 详情卡 + 高亮地图
  function updateAOICard(key) {
    const a = AOIS.find(x => x.key === key);
    if (!a) return;
    const est = estimateOverpass(a.bbox);
    const c = aoiCenter(a.bbox);
    document.getElementById("earth-aoi-card").dataset.aoi = key;
    const card = document.getElementById("earth-aoi-card");
    card.querySelector(".eac-name").textContent = a.label;
    card.querySelector(".eac-name").style.color = a.color;
    card.querySelector("#eac-bbox").textContent = formatBbox(a.bbox);
    card.querySelector("#eac-center").textContent = `${c.lon}°, ${c.lat}°`;
    card.querySelector("#eac-sats").textContent = `${est.sats} sats (按 bbox 估算)`;
    card.querySelector("#eac-passes").textContent = `~${est.passes} passes/day`;
    // 火点状态 (用 MAP_KEY 时 fetch FIRMS)
    const fireEl = card.querySelector("#eac-fires");
    if (window.MAP_KEY && a.key !== "global") {
      fireEl.textContent = "正在查询 FIRMS…";
      fetchFIRMSCount(a, window.MAP_KEY).then(n => {
        fireEl.textContent = n === null ? "查询失败" : `${n} 个活跃火点 (24h)`;
      });
    } else if (a.key === "global") {
      fireEl.textContent = "全球视图 (细化到子区域)";
    } else {
      fireEl.textContent = "需 MAP_KEY (2 分钟免费申请)";
    }
    // 重渲染地图高亮
    document.getElementById("earth-world-map-host").innerHTML = worldMapSVG({ highlightKey: key });
    // 重新绑地图 AOI click
    bindMapAOIClicks();
  }

  // FIRMS area API: CSV, columns: latitude,longitude,brightness,scan,track,acq_date,acq_time,...
  // 用 bbox (W,S,E,N) + 1 天 VIIRS_NOAA20_NRT
  async function fetchFIRMSCount(aoi, key) {
    const [w, s, e, n] = aoi.bbox;
    // FIRMS area API: https://firms.modaps.eosdis.nasa.gov/api/area/csv/{MAP_KEY}/VIIRS_NOAA20_NRT/{W},{S},{E},{N}/1
    const url = `https://firms.modaps.eosdis.nasa.gov/api/area/csv/${encodeURIComponent(key)}/VIIRS_NOAA20_NRT/${w},${s},${e},${n}/1`;
    try {
      const r = await fetch(url);
      if (!r.ok) return null;
      const txt = await r.text();
      const lines = txt.trim().split("\n");
      // 第 1 行是 header,数据行 = lines.length - 1
      return Math.max(0, lines.length - 1);
    } catch (err) {
      console.warn("FIRMS fetch failed:", err);
      return null;
    }
  }

  // 按钮 click
  el.querySelectorAll(".aoi-btn").forEach(b =>
    b.addEventListener("click", () => {
      el.querySelectorAll(".aoi-btn").forEach(x => x.setAttribute("aria-pressed", "false"));
      b.setAttribute("aria-pressed", "true");
      updateAOICard(b.dataset.key);
    }));

  // 地图上 AOI 区域 click (委托 #earth-world-map)
  function bindMapAOIClicks() {
    const host = document.getElementById("earth-world-map-host");
    if (!host) return;
    host.querySelectorAll(".aoi-region").forEach(g => {
      g.addEventListener("click", () => {
        const key = g.dataset.aoi;
        el.querySelectorAll(".aoi-btn").forEach(x => {
          x.setAttribute("aria-pressed", x.dataset.key === key ? "true" : "false");
        });
        updateAOICard(key);
      });
    });
  }
  bindMapAOIClicks();
}

function growthChartSVG(data) {
  const W = 720, H = 220, PAD_L = 50, PAD_R = 20, PAD_T = 24, PAD_B = 44;
  const xs = data.map((_, i) => PAD_L + i * (W - PAD_L - PAD_R) / (data.length - 1));
  const ys = data.map(d => d.total);
  const yMin = Math.min(...ys), yMax = Math.max(...ys);
  const yScale = v => PAD_T + (H - PAD_T - PAD_B) * (1 - (v - yMin) / (yMax - yMin));
  const xScale = i => xs[i];
  // Y 轴 ticks
  const yTicks = [yMin, Math.round((yMin + yMax) / 2), yMax];
  const yGrid = yTicks.map(t =>
    `<line x1="${PAD_L}" x2="${W - PAD_R}" y1="${yScale(t)}" y2="${yScale(t)}" stroke="rgba(122,138,163,.2)" stroke-dasharray="2,2"/>
     <text x="${PAD_L - 8}" y="${yScale(t) + 4}" text-anchor="end" fill="var(--muted)" font-family="IBM Plex Mono, monospace" font-size="11">${t.toLocaleString()}</text>`).join("");
  // 折线
  const pathD = data.map((d, i) => (i === 0 ? "M" : "L") + xScale(i) + "," + yScale(d.total)).join(" ");
  const areaD = pathD + ` L${xScale(data.length - 1)},${H - PAD_B} L${xScale(0)},${H - PAD_B} Z`;
  // 数据点 + 标签
  const pts = data.map((d, i) => `
    <circle cx="${xScale(i)}" cy="${yScale(d.total)}" r="4" fill="#56C8E8" stroke="#0A0E15" stroke-width="2"/>
    <text x="${xScale(i)}" y="${yScale(d.total) - 12}" text-anchor="middle" fill="var(--text)" font-family="IBM Plex Mono, monospace" font-size="11" font-weight="500">${d.total.toLocaleString()}</text>
    <text x="${xScale(i)}" y="${H - PAD_B + 18}" text-anchor="middle" fill="var(--muted)" font-family="IBM Plex Mono, monospace" font-size="10">${d.date.slice(5)}</text>`).join("");
  return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="星座增长曲线" style="width:100%;height:auto;display:block">
    ${yGrid}
    <path d="${areaD}" fill="url(#growth-grad)" opacity="0.4"/>
    <path d="${pathD}" fill="none" stroke="#F5A623" stroke-width="2"/>
    ${pts}
    <defs>
      <linearGradient id="growth-grad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#F5A623" stop-opacity="0.5"/>
        <stop offset="100%" stop-color="#F5A623" stop-opacity="0"/>
      </linearGradient>
    </defs>
  </svg>`;
}
