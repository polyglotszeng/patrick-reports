<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 · 页面找不到了</title>
<style>
/* Inherit the same design tokens as the homepage */
:root {
  --color-brand: #f97316;
  --color-bg-deep: #0a0a0a;
  --color-bg-base: #0f0f0f;
  --color-bg-elevated: #161616;
  --color-bg-card: #1a1a1a;
  --color-text-primary: #fafafa;
  --color-text-secondary: #a3a3a3;
  --color-text-muted: #525252;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Helvetica Neue", sans-serif;
  background: var(--color-bg-deep);
  color: var(--color-text-primary);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.card {
  max-width: 520px;
  width: 100%;
  background: var(--color-bg-card);
  border: 1px solid rgba(249, 115, 22, 0.18);
  border-radius: 16px;
  padding: 40px 32px;
  text-align: center;
  box-shadow: 0 12px 40px rgba(0,0,0,0.4);
}
.code {
  font-size: 88px;
  font-weight: 800;
  line-height: 1;
  margin: 0 0 8px 0;
  background: linear-gradient(135deg, var(--color-brand), #fbbf24);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  letter-spacing: -2px;
}
.title {
  font-size: 22px;
  font-weight: 600;
  margin: 0 0 12px 0;
}
.desc {
  font-size: 14px;
  line-height: 1.6;
  color: var(--color-text-secondary);
  margin: 0 0 28px 0;
}
.path {
  font-family: "SF Mono", Menlo, Consolas, monospace;
  font-size: 12px;
  background: var(--color-bg-elevated);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 6px;
  padding: 8px 12px;
  margin: 0 0 28px 0;
  color: var(--color-text-muted);
  word-break: break-all;
}
.actions {
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
}
a.btn {
  display: inline-block;
  padding: 10px 20px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 500;
  text-decoration: none;
  transition: transform 0.1s, background 0.1s;
}
a.btn.primary {
  background: var(--color-brand);
  color: #0a0a0a;
}
a.btn.primary:hover { background: #fb923c; transform: translateY(-1px); }
a.btn.ghost {
  background: var(--color-bg-elevated);
  color: var(--color-text-primary);
  border: 1px solid rgba(255,255,255,0.08);
}
a.btn.ghost:hover { background: var(--color-bg-hover); transform: translateY(-1px); }
.faq {
  margin-top: 32px;
  padding-top: 24px;
  border-top: 1px solid rgba(255,255,255,0.06);
  text-align: left;
}
.faq h3 {
  font-size: 13px;
  font-weight: 600;
  color: var(--color-text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin: 0 0 12px 0;
}
.faq ul { list-style: none; padding: 0; margin: 0; }
.faq li { margin-bottom: 8px; font-size: 13px; color: var(--color-text-secondary); }
.faq li a { color: var(--color-brand); text-decoration: none; }
.faq li a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="card">
  <div class="code">404</div>
  <h1 class="title">页面找不到了</h1>
  <p class="desc">这个地址可能已经移动、被删除，或者从来就不存在。</p>
  <div class="path" id="path">/</div>
  <div class="actions">
    <a class="btn primary" href="/">回到首页</a>
    <a class="btn ghost" href="/worldmonitor/satellite-ops/">Satellite Ops</a>
  </div>
  <div class="faq">
    <h3>常用入口</h3>
    <ul>
      <li>📡 <a href="/worldmonitor/satellite-ops/">Satellite Ops · 全球卫星实时看板</a></li>
      <li>🌍 <a href="/worldmonitor/">WorldMonitor 总览</a></li>
      <li>📊 <a href="/worldmonitor/dashboard">WorldMonitor Dashboard</a></li>
      <li>🚀 <a href="/openswarm-investor-briefing-2026-06-13">OpenSwarm 投资人简报</a></li>
    </ul>
  </div>
</div>
<script>
  // 显示用户实际访问的路径
  document.getElementById('path').textContent = location.pathname + location.search;
</script>
</body>
</html>
