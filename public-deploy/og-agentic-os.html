<!DOCTYPE html>
<html><head><title>OG</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1200px; height: 630px; background: #0a1428; color: #fff; font-family: ui-monospace, Menlo, monospace; overflow: hidden; position: relative; }
.bg-grid { position: absolute; inset: 0; background-image: linear-gradient(rgba(213,255,63,.05) 1px, transparent 1px), linear-gradient(90deg, rgba(213,255,63,.05) 1px, transparent 1px); background-size: 60px 60px; }
.glow { position: absolute; top: -200px; right: -200px; width: 600px; height: 600px; background: radial-gradient(circle, rgba(213,255,63,.15), transparent 70%); }
.eyebrow { position: absolute; top: 60px; left: 80px; font-size: 18px; letter-spacing: 8px; color: #ec4a2d; font-weight: 700; text-transform: uppercase; }
.title { position: absolute; top: 110px; left: 80px; font-size: 92px; line-height: 0.95; font-weight: 900; letter-spacing: -3px; }
.title em { color: #d5ff3f; font-style: normal; }
.title u { text-decoration: none; color: #ec4a2d; border-bottom: 8px solid #ec4a2d; }
.sub { position: absolute; top: 380px; left: 80px; font-size: 26px; line-height: 1.35; color: rgba(255,255,255,.75); max-width: 980px; }
.badges { position: absolute; bottom: 80px; left: 80px; display: flex; gap: 14px; }
.badge { background: rgba(213,255,63,.15); border: 2px solid #d5ff3f; color: #d5ff3f; padding: 10px 18px; font-size: 16px; font-weight: 700; letter-spacing: 2px; }
.cta { position: absolute; bottom: 70px; right: 80px; background: #d5ff3f; color: #0a1428; padding: 22px 38px; font-size: 22px; font-weight: 900; letter-spacing: 1px; }
.brand { position: absolute; top: 60px; right: 80px; font-size: 18px; letter-spacing: 4px; color: rgba(255,255,255,.6); font-weight: 700; }
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="glow"></div>
<div class="brand">PATRICK'S HERMES AGENT OS</div>
<div class="eyebrow">Open Source · MIT · 2026</div>
<h1 class="title">Same engine.<br><em>Yours forever.</em><br><u>Not locked.</u></h1>
<p class="sub">19 cron jobs · 60+ skills · 3-layer memory · 5-tool loop. Free, open source Agentic OS for solo builders, SEO nerds, and AI tinkerers.</p>
<div class="badges">
  <div class="badge">HERMES CORE</div>
  <div class="badge">FREE FOREVER</div>
  <div class="badge">MIT LICENSE</div>
</div>
<div class="cta">⚡ 1-CMD INSTALL →</div>
</body></html>
