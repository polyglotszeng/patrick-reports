<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Orbital Console · 全球卫星统一看板</title>
<meta name="description" content="实时卫星轨道、覆盖分析与星座对比的统一看板演示">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0A0E15; --panel: #101623; --panel-2: #151D2E; --line: #1D2736;
  --text: #D5DEEC; --muted: #7A8AA3;
  --amber: #F5A623; --cyan: #56C8E8; --violet: #B48CF2;
  --red: #E4574D; --green: #6BCB77;
  --sans: "Space Grotesk", system-ui, sans-serif;
  --mono: "IBM Plex Mono", ui-monospace, monospace;
}
* { box-sizing: border-box; margin: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 15px; line-height: 1.6; }
a { color: var(--cyan); }
:focus-visible { outline: 2px solid var(--amber); outline-offset: 2px; }

header { display: flex; align-items: center; gap: 24px; padding: 0 20px; height: 56px;
  border-bottom: 1px solid var(--line); background: var(--panel); }
.brand { font-weight: 600; letter-spacing: .04em; white-space: nowrap; }
.brand .dot { color: var(--amber); }
nav { display: flex; gap: 4px; overflow-x: auto; }
nav a { display: block; padding: 6px 14px; color: var(--muted); text-decoration: none;
  font-size: 14px; border-radius: 6px; white-space: nowrap; }
nav a:hover { color: var(--text); background: var(--panel-2); }
nav a[aria-current="page"] { color: var(--bg); background: var(--cyan); font-weight: 500; }

#mission-strip { display: flex; align-items: center; gap: 18px; flex-wrap: wrap;
  padding: 8px 20px; border-bottom: 1px solid var(--line); background: var(--bg);
  font-family: var(--mono); font-size: 12.5px; color: var(--muted); }
#mission-strip b { color: var(--text); font-weight: 500; }
.chip { display: inline-block; padding: 1px 8px; border-radius: 4px; border: 1px solid var(--line); font-size: 11.5px; }
.chip.ok { color: var(--green); border-color: rgba(107,203,119,.4); }
.chip.warn { color: var(--amber); border-color: rgba(245,166,35,.4); }
.timectl { display: flex; gap: 2px; margin-left: auto; }
.timectl button { font-family: var(--mono); font-size: 11.5px; padding: 2px 10px; cursor: pointer;
  color: var(--muted); background: transparent; border: 1px solid var(--line); border-radius: 4px; }
.timectl button[aria-pressed="true"] { color: var(--bg); background: var(--amber); border-color: var(--amber); font-weight: 500; }

main { padding: 20px; max-width: 1280px; margin: 0 auto; }
.view { display: none; }
.view.active { display: block; }
.panel { background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
  padding: 18px 20px; margin-bottom: 16px; }
.panel h2 { font-size: 17px; font-weight: 600; margin-bottom: 6px; }
.panel p.hint { color: var(--muted); font-size: 13.5px; }
canvas.map { width: 100%; border-radius: 8px; border: 1px solid var(--line); display: block; background: #060910; cursor: crosshair; }

.ctlrow { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; margin: 10px 0 8px; }
.ctlrow label { font-size: 13px; color: var(--muted); display: flex; align-items: center; gap: 8px; }
input[type=range] { accent-color: var(--amber); width: 200px; }
.toggle { display: inline-flex; align-items: center; gap: 6px; font-size: 12.5px; font-family: var(--mono);
  color: var(--muted); cursor: pointer; padding: 3px 10px; border: 1px solid var(--line); border-radius: 5px; user-select: none; }
.toggle input { accent-color: var(--cyan); }
.toggle[data-on="true"] { color: var(--text); }
.swatch { display: inline-block; width: 9px; height: 9px; border-radius: 50%; }

.kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin: 14px 0; }
.kpi { background: var(--panel-2); border-radius: 8px; padding: 10px 14px; }
.kpi .v { font-family: var(--mono); font-size: 20px; color: var(--cyan); }
.kpi .k { font-size: 12px; color: var(--muted); }

.legend { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted); margin-top: 8px; font-family: var(--mono); flex-wrap: wrap; }
.legend .bar { height: 8px; width: 160px; border-radius: 4px;
  background: linear-gradient(90deg,#060910,#112233,#1B5F7A,#2FA3C7,#56C8E8,#BFF0FF); }

#sat-info { font-family: var(--mono); font-size: 12.5px; color: var(--muted); margin-top: 8px; min-height: 22px; }
#sat-info b { color: var(--amber); }
#overhead-out { font-family: var(--mono); font-size: 12.5px; margin-top: 6px; color: var(--muted); }
#overhead-out b { color: var(--cyan); }
button.act { font-family: var(--mono); font-size: 12px; cursor: pointer; padding: 4px 12px;
  border-radius: 5px; color: var(--bg); background: var(--cyan); border: 1px solid var(--cyan); font-weight: 500; }
select { font-family: var(--mono); font-size: 12.5px; background: var(--panel-2); color: var(--text);
  border: 1px solid var(--line); border-radius: 5px; padding: 3px 8px; }

table.cmp { width: 100%; border-collapse: collapse; font-size: 13.5px; margin-top: 10px; }
table.cmp th { text-align: left; color: var(--muted); font-weight: 500; font-size: 12.5px;
  padding: 6px 10px; border-bottom: 1px solid var(--line); }
table.cmp td { font-family: var(--mono); font-size: 13px; padding: 8px 10px; border-bottom: 1px solid var(--line); }
table.cmp td:first-child { font-family: var(--sans); }
.bar-bg { background: var(--panel-2); border-radius: 4px; height: 10px; min-width: 90px; overflow: hidden; }
.bar-fg { height: 100%; border-radius: 4px; }

.about p { color: var(--muted); font-size: 14px; margin-bottom: 10px; }
.about code { font-family: var(--mono); font-size: 12.5px; color: var(--cyan); background: var(--panel-2); padding: 1px 6px; border-radius: 4px; }
.about h3 { font-size: 14.5px; margin: 14px 0 4px; color: var(--text); }

footer { text-align: center; color: var(--muted); font-size: 12px; padding: 8px 0 24px; font-family: var(--mono); }

@media (max-width: 720px) { header { gap: 12px; } main { padding: 12px; } .timectl { margin-left: 0; } }
@media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
</style>
</head>
<body>

<header>
  <div class="brand">ORBITAL<span class="dot">·</span>CONSOLE</div>
  <nav id="tabs" aria-label="视图切换"></nav>
</header>

<div id="mission-strip">
  <span>UTC <b id="ms-utc">--:--:--</b></span>
  <span>仿真基准 <b id="ms-epoch">--</b></span>
  <span>数据 <span id="ms-age" class="chip warn">演示星座</span></span>
  <span>在轨 <b id="ms-count">--</b> 颗</span>
  <div class="timectl" role="group" aria-label="时间控制">
    <button data-speed="1" aria-pressed="true">LIVE</button>
    <button data-speed="8" aria-pressed="false">×8</button>
    <button data-speed="60" aria-pressed="false">×60</button>
    <button data-speed="600" aria-pressed="false">×600</button>
    <button data-speed="0" aria-pressed="false">暂停</button>
  </div>
</div>

<main id="views"></main>
<footer>Orbital Console demo · 合成 Walker 星座 · 解析圆轨道传播 · 单文件零依赖(海岸线来自 CDN,失败时自动降级)</footer>

<script>
"use strict";
/* ============================================================
   0. 常量与数学
   ============================================================ */
const RE = 6371.0, MU = 398600.4418, WE = 7.2921159e-5; // km, km³/s², rad/s
const DEG = Math.PI / 180, R2D = 180 / Math.PI;

function footprintCentralAngle(altKm, minElevDeg) {
  const eps = minElevDeg * DEG;
  const x = RE / (RE + altKm) * Math.cos(eps);
  return x >= 1 ? 0 : Math.acos(x) - eps;
}
const footprintRadiusKm = (a, e) => RE * footprintCentralAngle(a, e);
const footprintAreaFraction = (a, e) => (1 - Math.cos(footprintCentralAngle(a, e))) / 2;
const wrapLon = (d) => ((d + 180) % 360 + 360) % 360 - 180;

/* ============================================================
   1. 合成 Walker 星座(带轨道要素,可随时间传播)
   演示用;接真实数据时换成 ZTLE + SGP4(见"关于"页)。
   ============================================================ */
const SHELLS = [
  { key: "starlink", label: "Starlink 壳1", color: "#56C8E8", planes: 72, spp: 22, incl: 53,   alt: 550 },
  { key: "polar",    label: "极轨宽带型",   color: "#F5A623", planes: 36, spp: 20, incl: 87.9, alt: 1200 },
  { key: "sso",      label: "千帆 SSO 型",  color: "#B48CF2", planes: 28, spp: 36, incl: 89,   alt: 800 },
];

const sats = [];   // {shell, name, raan, u0, inc, n, alt}
for (const sh of SHELLS) {
  const inc = sh.incl * DEG;
  const a = RE + sh.alt;
  const n = Math.sqrt(MU / (a * a * a));           // rad/s
  for (let p = 0; p < sh.planes; p++) {
    const raan = (2 * Math.PI / sh.planes) * p;
    for (let k = 0; k < sh.spp; k++) {
      const u0 = (2 * Math.PI / sh.spp) * k + (2 * Math.PI * p) / (sh.planes * sh.spp);
      sats.push({ shell: sh, name: `${sh.label.split(" ")[0].toUpperCase()}-${p + 1}·${k + 1}`,
                  raan, u0, inc, n, alt: sh.alt });
    }
  }
}

/** 单星在 unix 秒 t 时的星下点(度)。 */
function subpoint(s, t) {
  const u = s.u0 + s.n * t;
  const lat = Math.asin(Math.sin(s.inc) * Math.sin(u)) * R2D;
  const lon = wrapLon((s.raan + Math.atan2(Math.cos(s.inc) * Math.sin(u), Math.cos(u)) - WE * t) * R2D);
  return [lat, lon];
}

/* ============================================================
   2. 覆盖网格(与 coverage.js 相同算法,内联)
   ============================================================ */
function computeCoverageGrid(positions, minElevDeg, gridDeg) {
  const rows = Math.round(180 / gridDeg), cols = Math.round(360 / gridDeg);
  const grid = new Uint16Array(rows * cols);
  const lamCache = new Map();
  const lamOf = (alt) => {
    const k = Math.round(alt);
    let v = lamCache.get(k);
    if (v === undefined) { v = footprintCentralAngle(k, minElevDeg) * R2D; lamCache.set(k, v); }
    return v;
  };
  const rowOfLat = (lat) => Math.min(rows - 1, Math.max(0, Math.floor((90 - lat) / gridDeg)));

  for (const s of positions) {
    const lam = lamOf(s.altKm);
    if (lam <= 0) continue;
    const rTop = rowOfLat(Math.min(90, s.lat + lam));
    const rBot = rowOfLat(Math.max(-90, s.lat - lam));
    const cosLam = Math.cos(lam * DEG), sinLs = Math.sin(s.lat * DEG), cosLs = Math.cos(s.lat * DEG);
    for (let r = rTop; r <= rBot; r++) {
      const phi = 90 - (r + 0.5) * gridDeg;
      const denom = Math.cos(phi * DEG) * cosLs;
      let hw;
      if (denom < 1e-9) hw = Math.abs(phi - s.lat) <= lam ? 180 : -1;
      else {
        const c = (cosLam - Math.sin(phi * DEG) * sinLs) / denom;
        if (c >= 1) continue;
        hw = c <= -1 ? 180 : Math.acos(c) * R2D;
      }
      if (hw < 0) continue;
      const base = r * cols;
      if (hw >= 180) { for (let c = 0; c < cols; c++) grid[base + c]++; continue; }
      const c0 = Math.floor((s.lon - hw + 180) / gridDeg), c1 = Math.floor((s.lon + hw + 180) / gridDeg);
      for (let c = c0; c <= c1; c++) grid[base + ((c % cols) + cols) % cols]++;
    }
  }
  let covered = 0, total = 0, sum = 0, maxCount = 0;
  for (let r = 0; r < rows; r++) {
    const w = Math.cos((90 - (r + 0.5) * gridDeg) * DEG);
    for (let c = 0; c < cols; c++) {
      const v = grid[r * cols + c];
      total += w; sum += v * w;
      if (v > 0) covered += w;
      if (v > maxCount) maxCount = v;
    }
  }
  return { grid, rows, cols, stats: { maxCount, coveredFraction: covered / total, meanVisible: sum / total } };
}

/* ============================================================
   3. 太阳与昼夜晨昏线
   ============================================================ */
function sunSubpoint(tMs) {
  const d = new Date(tMs);
  const start = Date.UTC(d.getUTCFullYear(), 0, 0);
  const doy = (tMs - start) / 86400e3;
  const decl = -23.44 * Math.cos(2 * Math.PI * (doy + 10) / 365.24);
  const hours = d.getUTCHours() + d.getUTCMinutes() / 60 + d.getUTCSeconds() / 3600;
  const lon = wrapLon((12 - hours) * 15);
  return { lat: decl, lon };
}
/** 夜半球多边形(经度→晨昏线纬度),供 canvas 填充。 */
function nightPath(ctx, W, H, sun) {
  const tanD = Math.tan(sun.lat * DEG);
  ctx.beginPath();
  if (Math.abs(tanD) < 1e-4) {           // 春秋分:夜为经度半球
    const x0 = ((wrapLon(sun.lon + 90) + 180) / 360) * W;
    const wHalf = W / 2;
    ctx.rect(x0, 0, Math.min(wHalf, W - x0), H);
    if (x0 + wHalf > W) ctx.rect(0, 0, x0 + wHalf - W, H);
  } else {
    for (let i = 0; i <= 360; i++) {
      const lon = -180 + i;
      const phi = Math.atan(-Math.cos((lon - sun.lon) * DEG) / tanD) * R2D;
      const x = (lon + 180) / 360 * W, y = (90 - phi) / 180 * H;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    const yPole = sun.lat > 0 ? H : 0;   // 北半球夏季 → 南极圈永夜
    ctx.lineTo(W, yPole); ctx.lineTo(0, yPole);
  }
  ctx.closePath();
}

/* ============================================================
   4. 共享状态、时间控制、海岸线
   ============================================================ */
const App = { simTime: Date.now(), speed: 1 };
document.querySelectorAll(".timectl button").forEach(btn => {
  btn.addEventListener("click", () => {
    App.speed = Number(btn.dataset.speed);
    document.querySelectorAll(".timectl button").forEach(b => b.setAttribute("aria-pressed", String(b === btn)));
  });
});
document.getElementById("ms-count").textContent = sats.length.toLocaleString();
document.getElementById("ms-epoch").textContent = new Date().toISOString().slice(0, 16).replace("T", " ");

let landGeo = null;   // GeoJSON MultiPolygon
(async () => {
  try {
    const [topo] = await Promise.all([
      fetch("https://cdn.jsdelivr.net/npm/world-atlas@2/land-110m.json").then(r => r.json()),
      new Promise((res, rej) => {
        const s = document.createElement("script");
        s.src = "https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js";
        s.onload = res; s.onerror = rej; document.head.appendChild(s);
      }),
    ]);
    landGeo = window.topojson.feature(topo, topo.objects.land);
  } catch { /* 降级:无海岸线,仅经纬网 */ }
})();

function drawBase(ctx, W, H, withNight) {
  ctx.fillStyle = "#060910"; ctx.fillRect(0, 0, W, H);
  if (landGeo) {
    ctx.fillStyle = "#16202F"; ctx.strokeStyle = "#2A3A50"; ctx.lineWidth = 1;
    ctx.beginPath();
    for (const f of landGeo.features) {
      const polys = f.geometry.type === "Polygon" ? [f.geometry.coordinates] : f.geometry.coordinates;
      for (const poly of polys) for (const ring of poly) {
        ring.forEach(([lon, lat], i) => {
          const x = (lon + 180) / 360 * W, y = (90 - lat) / 180 * H;
          i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        });
        ctx.closePath();
      }
    }
    ctx.fill(); ctx.stroke();
  }
  ctx.strokeStyle = "rgba(122,138,163,.18)"; ctx.lineWidth = 1; ctx.beginPath();
  for (let lon = -150; lon <= 150; lon += 30) { const x = (lon + 180) / 360 * W; ctx.moveTo(x, 0); ctx.lineTo(x, H); }
  for (let lat = -60; lat <= 60; lat += 30) { const y = (90 - lat) / 180 * H; ctx.moveTo(0, y); ctx.lineTo(W, y); }
  ctx.stroke();
  if (withNight) {
    const sun = sunSubpoint(App.simTime);
    ctx.save(); ctx.fillStyle = "rgba(3,6,14,.55)";
    nightPath(ctx, W, H, sun); ctx.fill(); ctx.restore();
    const sx = (sun.lon + 180) / 360 * W, sy = (90 - sun.lat) / 180 * H;
    ctx.fillStyle = "#F5A623"; ctx.beginPath(); ctx.arc(sx, sy, 4, 0, 7); ctx.fill();
    ctx.strokeStyle = "rgba(245,166,35,.5)"; ctx.beginPath(); ctx.arc(sx, sy, 8, 0, 7); ctx.stroke();
  }
}

/* ============================================================
   5. 路由框架
   ============================================================ */
const views = [];
const registerView = (v) => views.push(v);
let activeView = null;

function route() {
  const h = location.hash.replace(/^#\/?/, "") || "live";
  const [id, query = ""] = h.split("?");
  const target = views.find(v => v.id === id) || views[0];
  document.querySelectorAll("#tabs a").forEach(a =>
    a.setAttribute("aria-current", a.dataset.view === target.id ? "page" : "false"));
  if (activeView && activeView !== target) {
    activeView.hide?.();
    document.getElementById("view-" + activeView.id)?.classList.remove("active");
  }
  let el = document.getElementById("view-" + target.id);
  if (!el) {
    el = document.createElement("section");
    el.id = "view-" + target.id; el.className = "view";
    document.getElementById("views").appendChild(el);
    target.mount(el, new URLSearchParams(query));
  }
  el.classList.add("active");
  target.show?.(new URLSearchParams(query));
  activeView = target;
  document.title = target.label + " · Orbital Console";
}
window.addEventListener("hashchange", route);

/* ============================================================
   6. 视图:实时 Live
   ============================================================ */
const LiveView = {
  id: "live", label: "实时",
  selected: null, night: true, tracks: true, visible: new Set(SHELLS.map(s => s.key)),
  observer: null,

  mount(el) {
    this.el = el;
    const shellToggles = SHELLS.map(sh => `
      <label class="toggle" data-on="true"><input type="checkbox" checked data-shell="${sh.key}">
      <span class="swatch" style="background:${sh.color}"></span>${sh.label}
      <span style="color:var(--muted)">${sh.planes * sh.spp}</span></label>`).join("");
    el.innerHTML = `
      <div class="panel">
        <h2>实时轨道 · ${sats.length.toLocaleString()} 颗</h2>
        <p class="hint">解析圆轨道传播,时间条 ×8/×60/×600 直接驱动。点击任意卫星查看轨道并绘制一圈地面轨迹;昼夜线随仿真时间移动。</p>
        <div class="ctlrow">
          ${shellToggles}
          <label class="toggle" data-on="true"><input type="checkbox" checked id="lv-night">昼夜线</label>
          <label class="toggle" data-on="true"><input type="checkbox" checked id="lv-tracks">选中轨迹</label>
        </div>
        <canvas class="map" id="lv-canvas" width="1440" height="720"></canvas>
        <div id="sat-info">点击地图上的卫星查看详情</div>
        <div class="ctlrow" style="margin-top:12px">
          <button class="act" id="lv-locate">现在我头顶有什么?</button>
          <select id="lv-city" aria-label="选择城市">
            <option value="34.05,-118.24">洛杉矶</option><option value="39.90,116.40">北京</option>
            <option value="31.23,121.47">上海</option><option value="51.51,-0.13">伦敦</option>
            <option value="-33.87,151.21">悉尼</option><option value="64.13,-21.90">雷克雅未克</option>
          </select>
          <span style="font-size:12px;color:var(--muted)">最低仰角 25°</span>
        </div>
        <div id="overhead-out"></div>
      </div>`;

    el.querySelectorAll("[data-shell]").forEach(cb => cb.addEventListener("change", (e) => {
      e.target.checked ? this.visible.add(e.target.dataset.shell) : this.visible.delete(e.target.dataset.shell);
      e.target.closest(".toggle").dataset.on = e.target.checked;
    }));
    const bind = (id, key) => el.querySelector(id).addEventListener("change", (e) => {
      this[key] = e.target.checked; e.target.closest(".toggle").dataset.on = e.target.checked;
    });
    bind("#lv-night", "night"); bind("#lv-tracks", "tracks");

    const cv = el.querySelector("#lv-canvas");
    cv.addEventListener("click", (e) => this.pick(e, cv));
    el.querySelector("#lv-locate").addEventListener("click", () => {
      const [lat, lon] = el.querySelector("#lv-city").value.split(",").map(Number);
      this.observer = { lat, lon, name: el.querySelector("#lv-city").selectedOptions[0].text };
      if (navigator.geolocation) navigator.geolocation.getCurrentPosition(
        (pos) => { this.observer = { lat: pos.coords.latitude, lon: pos.coords.longitude, name: "你的位置" }; },
        () => {}, { timeout: 3000 });
    });
  },

  pick(e, cv) {
    const rect = cv.getBoundingClientRect();
    const mx = (e.clientX - rect.left) / rect.width * cv.width;
    const my = (e.clientY - rect.top) / rect.height * cv.height;
    const t = App.simTime / 1000;
    let best = null, bestD = 12 * 12;
    for (const s of sats) {
      if (!this.visible.has(s.shell.key)) continue;
      const [lat, lon] = subpoint(s, t);
      const dx = (lon + 180) / 360 * cv.width - mx, dy = (90 - lat) / 180 * cv.height - my;
      const d = dx * dx + dy * dy;
      if (d < bestD) { bestD = d; best = s; }
    }
    this.selected = best;
    const info = this.el.querySelector("#sat-info");
    if (best) {
      const period = 2 * Math.PI / best.n / 60;
      info.innerHTML = `<b>${best.name}</b> · 高度 ${best.alt} km · 倾角 ${best.shell.incl}° · 周期 ${period.toFixed(1)} min · 足迹半径(ε=25°) ${footprintRadiusKm(best.alt, 25).toFixed(0)} km`;
    } else info.textContent = "点击地图上的卫星查看详情";
  },

  frame() {
    const cv = this.el.querySelector("#lv-canvas");
    const ctx = cv.getContext("2d");
    const W = cv.width, H = cv.height;
    drawBase(ctx, W, H, this.night);
    const t = App.simTime / 1000;

    if (this.selected && this.tracks) {
      const s = this.selected, T = 2 * Math.PI / s.n;
      ctx.strokeStyle = "rgba(245,166,35,.8)"; ctx.lineWidth = 1.5; ctx.beginPath();
      let prevX = null;
      for (let i = 0; i <= 180; i++) {
        const [lat, lon] = subpoint(s, t + (i / 180) * T);
        const x = (lon + 180) / 360 * W, y = (90 - lat) / 180 * H;
        (prevX === null || Math.abs(x - prevX) > W / 2) ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        prevX = x;
      }
      ctx.stroke();
    }
    for (const s of sats) {
      if (!this.visible.has(s.shell.key)) continue;
      const [lat, lon] = subpoint(s, t);
      const x = (lon + 180) / 360 * W, y = (90 - lat) / 180 * H;
      ctx.fillStyle = s === this.selected ? "#FFFFFF" : s.shell.color;
      ctx.fillRect(x - 1, y - 1, s === this.selected ? 5 : 2, s === this.selected ? 5 : 2);
    }
    if (this.observer) {
      const o = this.observer;
      const ox = (o.lon + 180) / 360 * W, oy = (90 - o.lat) / 180 * H;
      ctx.strokeStyle = "#6BCB77"; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(ox, oy, 6, 0, 7); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(ox - 10, oy); ctx.lineTo(ox + 10, oy); ctx.moveTo(ox, oy - 10); ctx.lineTo(ox, oy + 10); ctx.stroke();
      let count = 0, bestEl = -90, bestSat = null;
      for (const s of sats) {
        if (!this.visible.has(s.shell.key)) continue;
        const [lat, lon] = subpoint(s, t);
        const g = Math.acos(Math.min(1, Math.sin(lat * DEG) * Math.sin(o.lat * DEG) +
          Math.cos(lat * DEG) * Math.cos(o.lat * DEG) * Math.cos((lon - o.lon) * DEG)));
        if (g < footprintCentralAngle(s.alt, 25)) {
          count++;
          const r = RE + s.alt;
          const elv = Math.atan2(Math.cos(g) - RE / r, Math.sin(g)) * R2D;
          if (elv > bestEl) { bestEl = elv; bestSat = s; }
        }
      }
      this.el.querySelector("#overhead-out").innerHTML = count
        ? `${o.name}上空(仰角>25°):<b>${count}</b> 颗可见,最高 <b>${bestSat.name}</b>(仰角 ${bestEl.toFixed(0)}°)`
        : `${o.name}上空(仰角>25°):当前 0 颗——等几分钟或按 ×60 快进看看`;
    }
  },
};
registerView(LiveView);

/* ============================================================
   7. 视图:覆盖分析(最低仰角滑块)
   ============================================================ */
const CoverageView = {
  id: "coverage", label: "覆盖分析", elev: 25, shellIdx: 0, raf: 0,

  mount(el, params) {
    this.el = el;
    el.innerHTML = `
      <div class="panel">
        <h2>覆盖热力图 · 最低仰角滑块</h2>
        <p class="hint">ε=0° 是宣传图里的几何地平线覆盖圈;真实服务受用户终端最低仰角限制。拖动滑块看覆盖如何缩水——这是"号称覆盖"与"可用覆盖"的差距。</p>
        <div class="ctlrow">
          <label>最低仰角 ε = <b id="cv-ev" style="font-family:var(--mono);color:var(--amber)">25°</b></label>
          <input type="range" id="cv-elev" min="0" max="60" step="1" value="25" aria-label="最低仰角">
          <span id="cv-shells"></span>
        </div>
        <div class="kpis">
          <div class="kpi"><div class="v" id="cv-k1">--</div><div class="k">全球面积覆盖率</div></div>
          <div class="kpi"><div class="v" id="cv-k2">--</div><div class="k">平均同时可见(颗)</div></div>
          <div class="kpi"><div class="v" id="cv-k3">--</div><div class="k">单星足迹半径</div></div>
          <div class="kpi"><div class="v" id="cv-k4">--</div><div class="k">单星足迹 / 地表</div></div>
        </div>
        <canvas class="map" id="cv-canvas" width="1440" height="720" style="cursor:default"></canvas>
        <div class="legend"><span>0</span><span class="bar"></span><span id="cv-max">max</span><span>颗同时可见 · 快照取自当前仿真时刻</span></div>
      </div>`;
    const box = el.querySelector("#cv-shells");
    SHELLS.forEach((sh, i) => {
      const b = document.createElement("button");
      b.className = "toggle"; b.style.cursor = "pointer"; b.textContent = sh.label;
      b.dataset.idx = i;
      b.addEventListener("click", () => { this.shellIdx = i; this.sync(); this.redraw(); });
      box.appendChild(b);
    });
    el.querySelector("#cv-elev").addEventListener("input", (e) => {
      this.elev = Number(e.target.value);
      el.querySelector("#cv-ev").textContent = this.elev + "°";
      cancelAnimationFrame(this.raf);
      this.raf = requestAnimationFrame(() => this.redraw());
    });
    el.querySelector("#cv-elev").addEventListener("change", () =>
      history.replaceState(null, "", `#/coverage?elev=${this.elev}&shell=${this.shellIdx}`));
    const e0 = Number(params.get("elev")); if (Number.isFinite(e0) && e0 >= 0 && e0 <= 60) this.elev = e0;
    const s0 = Number(params.get("shell")); if (Number.isFinite(s0) && SHELLS[s0]) this.shellIdx = s0;
    this.sync();
  },

  sync() {
    this.el.querySelector("#cv-elev").value = this.elev;
    this.el.querySelector("#cv-ev").textContent = this.elev + "°";
    this.el.querySelectorAll("#cv-shells .toggle").forEach(b =>
      b.dataset.on = String(Number(b.dataset.idx) === this.shellIdx));
  },

  show() { this.redraw(); },

  redraw() {
    const sh = SHELLS[this.shellIdx];
    const t = App.simTime / 1000;
    const positions = sats.filter(s => s.shell === sh)
      .map(s => { const [lat, lon] = subpoint(s, t); return { lat, lon, altKm: s.alt }; });
    const g = computeCoverageGrid(positions, this.elev, 1);
    this.el.querySelector("#cv-k1").textContent = (g.stats.coveredFraction * 100).toFixed(1) + "%";
    this.el.querySelector("#cv-k2").textContent = g.stats.meanVisible.toFixed(1);
    this.el.querySelector("#cv-k3").textContent = footprintRadiusKm(sh.alt, this.elev).toFixed(0) + " km";
    this.el.querySelector("#cv-k4").textContent = (footprintAreaFraction(sh.alt, this.elev) * 100).toFixed(2) + "%";
    this.el.querySelector("#cv-max").textContent = g.stats.maxCount;

    const cv = this.el.querySelector("#cv-canvas"), ctx = cv.getContext("2d");
    const W = cv.width, H = cv.height, cw = W / g.cols, chh = H / g.rows;
    ctx.fillStyle = "#060910"; ctx.fillRect(0, 0, W, H);
    const maxC = Math.max(1, g.stats.maxCount);
    for (let r = 0; r < g.rows; r++) for (let c = 0; c < g.cols; c++) {
      const v = g.grid[r * g.cols + c];
      if (!v) continue;
      const tt = Math.pow(v / maxC, 0.55);
      ctx.fillStyle = heat(tt);
      ctx.fillRect(c * cw, r * chh, cw + .5, chh + .5);
    }
    if (landGeo) {  // 海岸线描边叠在热力上
      ctx.strokeStyle = "rgba(213,222,236,.35)"; ctx.lineWidth = 1; ctx.beginPath();
      for (const f of landGeo.features) {
        const polys = f.geometry.type === "Polygon" ? [f.geometry.coordinates] : f.geometry.coordinates;
        for (const poly of polys) for (const ring of poly) {
          ring.forEach(([lon, lat], i) => {
            const x = (lon + 180) / 360 * W, y = (90 - lat) / 180 * H;
            i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
          });
          ctx.closePath();
        }
      }
      ctx.stroke();
    }
  },
};
registerView(CoverageView);

function heat(t) {
  const stops = [[0,[6,9,16]],[.15,[17,34,51]],[.4,[27,95,122]],[.7,[47,163,199]],[.9,[86,200,232]],[1,[191,240,255]]];
  for (let i = 1; i < stops.length; i++) if (t <= stops[i][0]) {
    const [t0, c0] = stops[i-1], [t1, c1] = stops[i], k = (t - t0) / (t1 - t0);
    const c = c0.map((v, j) => Math.round(v + (c1[j] - v) * k));
    return `rgb(${c[0]},${c[1]},${c[2]})`;
  }
  return "rgb(191,240,255)";
}

/* ============================================================
   8. 视图:星座对比
   ============================================================ */
registerView({
  id: "compare", label: "星座对比",
  mount(el) { this.el = el; el.innerHTML = `<div class="panel"><h2>三壳层对比(ε = 25°)</h2>
    <p class="hint">同一时刻快照下,各合成壳层的可用覆盖对比。条形按本表最大值归一。</p>
    <div id="cmp-body"></div></div>`; },
  show() {
    const t = App.simTime / 1000;
    const rows = SHELLS.map(sh => {
      const positions = sats.filter(s => s.shell === sh)
        .map(s => { const [lat, lon] = subpoint(s, t); return { lat, lon, altKm: s.alt }; });
      const g = computeCoverageGrid(positions, 25, 1);
      return { sh, n: positions.length, cov: g.stats.coveredFraction * 100,
               mean: g.stats.meanVisible, r: footprintRadiusKm(sh.alt, 25),
               period: 2 * Math.PI / Math.sqrt(MU / Math.pow(RE + sh.alt, 3)) / 60 };
    });
    const maxMean = Math.max(...rows.map(r => r.mean));
    this.el.querySelector("#cmp-body").innerHTML = `
      <table class="cmp"><thead><tr>
        <th>星座</th><th>卫星</th><th>高度</th><th>倾角</th><th>周期</th>
        <th>足迹半径</th><th>全球覆盖</th><th>平均可见</th><th></th>
      </tr></thead><tbody>${rows.map(r => `
        <tr>
          <td><span class="swatch" style="background:${r.sh.color};margin-right:6px"></span>${r.sh.label}</td>
          <td>${r.n.toLocaleString()}</td><td>${r.sh.alt} km</td><td>${r.sh.incl}°</td>
          <td>${r.period.toFixed(0)} min</td><td>${r.r.toFixed(0)} km</td>
          <td>${r.cov.toFixed(1)}%</td><td>${r.mean.toFixed(1)} 颗</td>
          <td><div class="bar-bg"><div class="bar-fg" style="width:${(r.mean / maxMean * 100).toFixed(0)}%;background:${r.sh.color}"></div></div></td>
        </tr>`).join("")}</tbody></table>
      <p class="hint" style="margin-top:10px">注意高度的双刃剑:1200 km 壳层单星足迹半径是 550 km 壳层的 ~1.6 倍,
      用 720 颗就能拿到与 1584 颗相近的覆盖率——代价是更高的链路时延与更严的碎片留轨要求。</p>`;
  },
});

/* ============================================================
   9. 视图:关于
   ============================================================ */
registerView({
  id: "about", label: "关于",
  mount(el) {
    el.innerHTML = `<div class="panel about">
      <h2>这是什么</h2>
      <p>把"实时卫星看板"(satellite-ops)与"覆盖分析报告"(starlink-coverage)合并为一个站点的演示:
      同一条数据管线、同一个时间基准、五类视图。本页为零依赖单文件,所有轨道均为合成 Walker 星座 +
      解析圆轨道传播,用于展示交互与信息架构。</p>
      <h3>接入真实数据(三步)</h3>
      <p>1 — 服务端定时运行 <code>pack_tles.py fetch starlink data/starlink.ztle</code>,
      把 CelesTrak TLE 打包为 71 字节/颗的二进制(10,652 颗 ≈ 0.9 MB,gzip 0.53 MB,逐字节可回译);</p>
      <p>2 — 浏览器用 <code>tle-unpack.js</code> 在 Web Worker 中解码并重建 TLE 两行,
      喂给 satellite.js 的 SGP4,替换本页 <code>subpoint()</code>;</p>
      <p>3 — 覆盖视图的 <code>computeCoverageGrid()</code> 输入换成 SGP4 星历,滑块逻辑不变
      (10,652 颗 @1° 网格实测 ~75 ms,可实时拖动)。</p>
      <h3>覆盖公式</h3>
      <p>足迹地心半角 λ = acos( Re/(Re+h) · cos ε ) − ε。550 km 高度下:
      ε=0° → 半径 2557 km;ε=25° → 941 km;ε=40° → 573 km。宣传覆盖圈与可用覆盖圈的差距即由此而来。</p>
      <h3>路线图</h3>
      <p>GIBS 影像层与 FIRMS 火点(地球观测视图)· AOI 天基活动摘要卡 ·
      TLE 龄期告警 · 历史快照存档与星座增长曲线 · 对比滑块(双星座 A/B)。</p>
    </div>`;
  },
});

/* ============================================================
   10. 主循环与启动
   ============================================================ */
const nav = document.getElementById("tabs");
for (const v of views) {
  const a = document.createElement("a");
  a.href = "#/" + v.id; a.textContent = v.label; a.dataset.view = v.id;
  nav.appendChild(a);
}
route();

let lastTick = performance.now();
function loop(now) {
  const dt = now - lastTick; lastTick = now;
  if (App.speed > 0) {
    App.simTime += dt * App.speed;
    if (App.speed === 1) App.simTime = Date.now();
  }
  document.getElementById("ms-utc").textContent =
    new Date(App.simTime).toISOString().slice(11, 19) +
    (App.speed === 1 ? "" : App.speed === 0 ? " ⏸" : " ×" + App.speed);
  if (activeView === LiveView && LiveView.el) LiveView.frame();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
